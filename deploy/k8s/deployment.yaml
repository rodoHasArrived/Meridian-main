apiVersion: apps/v1
kind: Deployment
metadata:
  name: meridian
  namespace: meridian
  labels:
    app.kubernetes.io/name: meridian
    app.kubernetes.io/component: collector
spec:
  replicas: 1
  # Single replica remains the default recommendation.
  # Scale beyond one replica only when Coordination.Mode=SharedStorage is enabled
  # and all replicas share the same coordination-capable volume under DataRoot.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: meridian
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meridian
        app.kubernetes.io/component: collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: meridian-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: meridian
          image: ghcr.io/rodohasarrived/meridian:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: meridian-config
            - secretRef:
                name: meridian-secrets
          args: ["--ui", "--http-port", "8080", "--watch-config"]
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/appsettings.json
              subPath: appsettings.json
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meridian-data
        - name: config
          configMap:
            name: meridian-appsettings
            optional: true
