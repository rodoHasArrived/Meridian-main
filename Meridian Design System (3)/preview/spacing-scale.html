<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); color: var(--fg); }
  .row { display: grid; grid-template-columns: 70px 1fr 80px; align-items: center; gap: 12px; margin-bottom: 8px; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg); }
  .bar { background: #2AB2D4; height: 10px; border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-align: right; }
</style>
</head>
<body class="bg-app">
  <div class="row"><span class="tok">1</span><span class="bar" style="width: 4px;"></span><span class="px">4px · 0.25rem</span></div>
  <div class="row"><span class="tok">2</span><span class="bar" style="width: 8px;"></span><span class="px">8px · 0.5rem</span></div>
  <div class="row"><span class="tok">3</span><span class="bar" style="width: 12px;"></span><span class="px">12px · 0.75rem</span></div>
  <div class="row"><span class="tok">4</span><span class="bar" style="width: 16px;"></span><span class="px">16px · 1rem</span></div>
  <div class="row"><span class="tok">5</span><span class="bar" style="width: 20px;"></span><span class="px">20px · 1.25rem</span></div>
  <div class="row"><span class="tok">6</span><span class="bar" style="width: 24px;"></span><span class="px">24px · 1.5rem</span></div>
  <div class="row"><span class="tok">8</span><span class="bar" style="width: 32px;"></span><span class="px">32px · 2rem</span></div>
  <div class="row"><span class="tok">12</span><span class="bar" style="width: 48px;"></span><span class="px">48px · 3rem</span></div>
</body>
</html>
