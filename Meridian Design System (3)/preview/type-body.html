<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Type: Body (IBM Plex Sans)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; }
  .row { display: grid; grid-template-columns: 140px 1fr; align-items: baseline; gap: 16px; margin-bottom: 10px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .sample { color: var(--fg); }
</style>
</head>
<body class="bg-app">
  <div class="row"><span class="label">Plex Sans 600 · 18</span><span class="sample" style="font-weight:600; font-size:18px;">Session detail</span></div>
  <div class="row"><span class="label">Plex Sans 500 · 14</span><span class="sample" style="font-weight:500; font-size:14px;">Open positions</span></div>
  <div class="row"><span class="label">Plex Sans 400 · 14</span><span class="sample" style="font-size:14px;">Working and partially filled orders remain visible in real time.</span></div>
  <div class="row"><span class="label">Plex Sans 400 · 12</span><span class="sample" style="font-size:12px; color: var(--fg-muted);">api-gateway · 14:32:07</span></div>
  <div class="row"><span class="label">Eyebrow · 10</span><span class="eyebrow">TRADING LANE</span></div>
</body>
</html>
