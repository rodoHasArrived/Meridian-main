<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Charts: Exposure sparklines</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); color: #FFFFFF; }
  .card { background: #0B1520; border: 1px solid #2A4566; border-radius: 8px; padding: 16px; }
  .head { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: #A8B5C4; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #2A4566; }
  .head b { color: #FFF; margin-right: 10px; }
  .rows { display: grid; gap: 1px; background: #2A4566; border: 1px solid #2A4566; border-radius: 4px; overflow: hidden; }
  .row { display: grid; grid-template-columns: 80px 1fr 100px 90px 60px; align-items: center; gap: 14px; padding: 10px 14px; background: #0B1520; font-family: var(--font-mono); font-size: 12px; font-variant-numeric: tabular-nums; }
  .row .sym { color: #FFF; font-weight: 500; }
  .row svg { height: 28px; width: 100%; display: block; }
  .row .val { text-align: right; color: #FFF; }
  .row .pct.up { text-align: right; color: #26BF86; }
  .row .pct.dn { text-align: right; color: #DE5878; }
  .row .wt { text-align: right; color: #A8B5C4; font-size: 10px; }
</style>
</head>
<body class="bg-app">
<div class="card">
  <div class="head"><b>POSITIONS</b>intraday · 1min · net $1.24M</div>
  <div class="rows" id="list"></div>
</div>
<script>
  const rows = [
    ["AAPL",  [40,42,38,45,48,46,52,50,55,58,54,60,62,65,64,68,70,72,70,74], "+$320",  "+1.74%", "15.1%", "up"],
    ["MSFT",  [50,52,50,48,54,56,58,55,60,62,60,64,66,65,68,70,72,70,73,76], "+$189",  "+0.92%", "16.8%", "up"],
    ["NVDA",  [30,35,38,42,40,48,52,55,58,55,62,65,68,72,70,75,78,82,85,88], "+$619",  "+3.02%", "17.0%", "up"],
    ["TSLA",  [70,68,66,68,64,60,58,62,58,54,50,52,48,46,42,44,40,38,36,34], "−$94",   "−2.41%", " 7.1%", "dn"],
    ["SPY",   [60,58,55,54,52,50,48,46,44,42,44,42,40,38,40,42,44,46,48,52], "+$180",  "+0.29%", "41.3%", "up"],
    ["IWM",   [55,54,52,48,50,46,44,42,40,44,46,48,45,42,40,44,46,48,50,48], "−$42",   "−0.18%", " 2.7%", "dn"]
  ];
  const list = document.getElementById('list');
  rows.forEach(([sym, data, val, pct, wt, dir]) => {
    const max = Math.max(...data), min = Math.min(...data), range = Math.max(1, max-min);
    const pts = data.map((v,i) => `${(i/(data.length-1))*100},${28 - ((v-min)/range)*24 - 2}`).join(' ');
    const color = dir === 'up' ? '#26BF86' : '#DE5878';
    const fill = dir === 'up' ? '#26BF86' : '#DE5878';
    const area = `0,28 ${pts} 100,28`;
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <span class="sym">${sym}</span>
      <svg viewBox="0 0 100 28" preserveAspectRatio="none">
        <polygon points="${area}" fill="${fill}" opacity="0.15"/>
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/>
      </svg>
      <span class="val">${val}</span>
      <span class="pct ${dir}">${pct}</span>
      <span class="wt">${wt}</span>`;
    list.appendChild(row);
  });
</script>
</body>
</html>
