<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); color: var(--fg); }
  .group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .eyebrow { margin-bottom: 6px; display: block; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-muted); }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; border: 1px solid transparent; font-family: var(--font-mono); }
  .b-outline { background: transparent; color: var(--fg-muted); border-color: #1F344C; }
  .b-live    { background: rgba(42,178,212,.10); color:#2AB2D4; border-color: rgba(42,178,212,.35); }
  .b-paper   { background: rgba(96,165,250,.10); color:#60A5FA; border-color: rgba(96,165,250,.35); }
  .b-research{ background: rgba(128,162,200,.10); color:#93B4DA; border-color: rgba(128,162,200,.35); }
  .b-success { background: rgba(38,191,134,.08); color:#26BF86; border-color: rgba(38,191,134,.30); }
  .b-warning { background: rgba(214,158,56,.08); color:#D69E38; border-color: rgba(214,158,56,.30); }
  .b-danger  { background: rgba(222,88,120,.08); color:#DE5878; border-color: rgba(222,88,120,.30); }
  .dot { width: 5px; height: 5px; border-radius: 999px; background: currentColor; }
</style>
</head>
<body class="bg-app">
  <span class="eyebrow">Environment</span>
  <div class="group">
    <span class="badge b-live"><span class="dot"></span>LIVE</span>
    <span class="badge b-paper"><span class="dot"></span>PAPER</span>
    <span class="badge b-research"><span class="dot"></span>RESEARCH</span>
  </div>
  <span class="eyebrow">Status</span>
  <div class="group">
    <span class="badge b-success">Healthy</span>
    <span class="badge b-warning">Observe</span>
    <span class="badge b-danger">Constrained</span>
    <span class="badge b-outline">Trading</span>
  </div>
</body>
</html>
