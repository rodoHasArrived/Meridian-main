<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 20px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .card { background: #0D1722; border: 1px solid #1F344C; border-radius: 8px; padding: 14px 16px; min-height: 90px; display: flex; flex-direction: column; gap: 6px; }
  .label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-muted); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg); }
</style>
</head>
<body class="bg-app">
  <div class="grid">
    <div class="card" style="box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 1px rgba(0,0,0,.25);">
      <div class="label">panel</div><div class="val">inset highlight + 1px drop</div>
    </div>
    <div class="card" style="box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,.30);">
      <div class="label">workstation</div><div class="val">default surface elevation</div>
    </div>
    <div class="card" style="box-shadow: 0 2px 8px rgba(0,0,0,.40), 0 0 0 1px rgba(255,255,255,0.02) inset;">
      <div class="label">floating</div><div class="val">dropdowns · popovers only</div>
    </div>
  </div>
</body>
</html>
