<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Data table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; font-family: var(--font-sans); color: var(--fg); }
  .wrap { border: 1px solid #1F344C; border-radius: 8px; overflow: hidden; background: #0D1722; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: hsl(213 34% 13%); }
  th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-muted); border-bottom: 1px solid #1F344C; font-family: var(--font-mono); }
  th.r, td.r { text-align: right; }
  td { padding: 7px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--fg); border-bottom: 1px solid hsl(208 38% 22% / .35); font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: hsl(213 40% 18% / .4); }
  .success { color: #26BF86; }
  .danger { color: #DE5878; }
  .muted { color: var(--fg-muted); }
  .tag { display:inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid currentColor; }
</style>
</head>
<body class="bg-app">
  <div class="wrap">
    <table>
      <thead><tr>
        <th>Symbol</th><th>Side</th><th class="r">Qty</th><th class="r">Avg</th><th class="r">Mark</th><th class="r">Day P&L</th><th class="r">Unreal</th><th class="r">Wt</th>
      </tr></thead>
      <tbody>
        <tr><td>AAPL</td><td><span class="tag success">LONG</span></td><td class="r">100</td><td class="r">184.22</td><td class="r">187.42</td><td class="r success">+320.00</td><td class="r success">+320.00</td><td class="r muted">15.1%</td></tr>
        <tr><td>MSFT</td><td><span class="tag success">LONG</span></td><td class="r">50</td><td class="r">412.10</td><td class="r">415.88</td><td class="r success">+189.00</td><td class="r success">+189.00</td><td class="r muted">16.8%</td></tr>
        <tr><td>NVDA</td><td><span class="tag success">LONG</span></td><td class="r">25</td><td class="r">820.15</td><td class="r">844.92</td><td class="r success">+619.25</td><td class="r success">+619.25</td><td class="r muted">17.0%</td></tr>
        <tr><td>TSLA</td><td><span class="tag danger">SHORT</span></td><td class="r">40</td><td class="r">174.20</td><td class="r">176.55</td><td class="r danger">−94.00</td><td class="r danger">−94.00</td><td class="r muted">7.1%</td></tr>
        <tr><td>SPY</td><td><span class="tag danger">SHORT</span></td><td class="r">120</td><td class="r">512.30</td><td class="r">510.80</td><td class="r success">+180.00</td><td class="r success">+180.00</td><td class="r muted">41.3%</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
