<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Colors: Brand & Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); color: var(--fg); }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .swatch { border-radius: 12px; padding: 18px 18px 16px; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .name { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: .75; }
  .tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.24em; opacity: .8; }
</style>
</head>
<body class="bg-app">
  <div class="row">
    <div class="swatch" style="background:#2AB2D4; color:#081423;">
      <span class="tag">PRIMARY · SIGNAL</span>
      <div><div class="name">Cyan</div><div class="hex">#2AB2D4 · hsl(198 78% 52%)</div></div>
    </div>
    <div class="swatch" style="background:#D69E38; color:#1A1407;">
      <span class="tag">ACCENT · CAUTION</span>
      <div><div class="name">Amber</div><div class="hex">#D69E38 · hsl(36 80% 58%)</div></div>
    </div>
  </div>
</body>
</html>
