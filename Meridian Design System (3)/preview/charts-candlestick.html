<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Charts: Candlestick / OHLC</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); color: #FFF; background: var(--bg); background-image: var(--bg-ambient); }
  .card { background: #0B1520; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }

  /* ----- header ----- */
  .head {
    display: grid; grid-template-columns: auto 1fr auto; align-items: center;
    gap: 18px; padding: 14px 18px; border-bottom: 1px solid var(--border-color);
    background: #05101B;
  }
  .sym-block { display: flex; align-items: baseline; gap: 12px; }
  .ticker { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: #FFF; letter-spacing: 0.02em; }
  .ticker .code { color: #2AB2D4; }
  .name { font-size: 12px; color: var(--fg-muted); }
  .name .ex { font-family: var(--font-mono); color: #BEC8D4; margin-right: 6px; padding: 2px 6px; background: #0B1520; border: 1px solid var(--border-color); border-radius: 3px; font-size: 10px; }

  .price-block { display: flex; align-items: baseline; gap: 14px; justify-self: end; }
  .last { font-family: var(--font-mono); font-size: 26px; color: #FFF; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
  .delta { font-family: var(--font-mono); font-size: 13px; font-variant-numeric: tabular-nums; }
  .delta.up { color: #26BF86; }
  .delta.down { color: #DE5878; }
  .delta .arrow { display: inline-block; transform: translateY(-1px); margin-right: 2px; }
  .delta-pill { font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 3px; background: rgba(38,191,134,0.14); color: #26BF86; border: 1px solid rgba(38,191,134,0.35); }

  .actions { display: flex; gap: 6px; align-items: center; }
  .seg { display: inline-flex; background: #0B1520; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
  .seg button { background: transparent; border: 0; color: var(--fg-muted); padding: 6px 10px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; }
  .seg button.on { background: rgba(42,178,212,0.14); color: #2AB2D4; }
  .icon-btn { width: 28px; height: 28px; display: grid; place-items: center; color: var(--fg-muted); border: 1px solid var(--border-color); border-radius: 4px; background: #0B1520; cursor: pointer; }
  .icon-btn:hover { color: #FFF; border-color: #2A4566; }

  /* ----- ohlc strip ----- */
  .ohlc {
    display: flex; gap: 22px; padding: 10px 18px;
    background: #08131F; border-bottom: 1px solid var(--border-color);
    font-family: var(--font-mono); font-size: 11px; align-items: center;
  }
  .ohlc .item { display: flex; align-items: baseline; gap: 6px; }
  .ohlc .k { color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.14em; font-size: 10px; }
  .ohlc .v { color: #FFF; font-variant-numeric: tabular-nums; font-size: 12px; }
  .ohlc .v.up { color: #26BF86; }
  .ohlc .v.down { color: #DE5878; }
  .ohlc .sep { width: 1px; height: 16px; background: var(--border-color); }
  .ohlc .right { margin-left: auto; color: var(--fg-muted); font-size: 10.5px; }
  .ohlc .right b { color: #BEC8D4; font-weight: 500; }

  /* ----- indicator chips ----- */
  .indicators {
    display: flex; gap: 8px; padding: 8px 18px; border-bottom: 1px solid var(--border-color);
    background: #0B1520;
  }
  .ind-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10.5px;
    padding: 3px 8px; border-radius: 3px;
    border: 1px solid var(--border-color); background: #08131F;
    color: #DEE6EF;
  }
  .ind-chip .sw { width: 10px; height: 2px; border-radius: 1px; }
  .ind-chip .x { color: var(--fg-muted); margin-left: 2px; cursor: pointer; }
  .ind-chip.add { color: var(--fg-muted); border-style: dashed; cursor: pointer; }
  .ind-chip.add:hover { color: #2AB2D4; border-color: #2AB2D4; }

  /* ----- chart svg ----- */
  .chart-wrap { position: relative; }
  svg.chart { display: block; width: 100%; height: auto; background: #08131F; }

  /* ----- footer / scale ----- */
  .footer {
    display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;
    padding: 10px 18px; border-top: 1px solid var(--border-color); background: #05101B;
  }
  .tf { display: inline-flex; gap: 0; }
  .tf button { background: transparent; border: 0; color: var(--fg-muted); font-family: var(--font-mono); font-size: 11px; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
  .tf button.on { background: rgba(42,178,212,0.14); color: #2AB2D4; }
  .tf button:hover:not(.on) { color: #BEC8D4; }
  .tf .div { width: 1px; height: 14px; background: var(--border-color); margin: 0 6px; align-self: center; }
  .scale-info { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-muted); }
  .scale-info b { color: #BEC8D4; font-weight: 500; }
</style>
</head>
