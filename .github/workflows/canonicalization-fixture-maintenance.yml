name: Canonicalization Fixture Maintenance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-report:
    name: Fixture Drift Report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate canonicalization drift report
      run: |
        python3 scripts/report_canonicalization_drift.py \
          --repo-root . \
          --output canonicalization-drift-report.md || true
        cat canonicalization-drift-report.md >> $GITHUB_STEP_SUMMARY

    - name: Upload maintenance report
      uses: actions/upload-artifact@v7
      with:
        name: canonicalization-drift-report
        path: canonicalization-drift-report.md
        retention-days: 14
