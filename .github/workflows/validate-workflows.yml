name: Validate Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'
      - '.github/labeler.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-yaml:
    name: Validate YAML Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install PyYAML
      run: pip install pyyaml

    - name: Validate workflow YAML files
      run: |
        EXIT_CODE=0
        echo "Validating workflow YAML files..."
        for file in .github/workflows/*.yml .github/workflows/*.yaml; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            if python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              echo "  ✓ Valid"
            else
              echo "  ✗ Invalid YAML syntax"
              EXIT_CODE=1
            fi
          fi
        done
        
        echo ""
        echo "Validating configuration YAML files..."
        for file in .github/*.yml .github/*.yaml; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            if python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              echo "  ✓ Valid"
            else
              echo "  ✗ Invalid YAML syntax"
              EXIT_CODE=1
            fi
          fi
        done
        
        exit $EXIT_CODE

    - name: Validate issue template YAML files
      run: |
        EXIT_CODE=0
        echo "Validating issue template YAML files..."
        for file in .github/ISSUE_TEMPLATE/*.yml .github/ISSUE_TEMPLATE/*.yaml; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            if python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              echo "  ✓ Valid"
            else
              echo "  ✗ Invalid YAML syntax"
              EXIT_CODE=1
            fi
          fi
        done
        
        exit $EXIT_CODE

    - name: Validate prompt YAML files
      run: |
        EXIT_CODE=0
        echo "Validating AI assistant prompt YAML files..."
        for file in .github/prompts/*.yml .github/prompts/*.yaml; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            if python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              echo "  ✓ Valid"
            else
              echo "  ✗ Invalid YAML syntax"
              EXIT_CODE=1
            fi
          fi
        done
        
        exit $EXIT_CODE

    - name: Validate composite action YAML files
      run: |
        EXIT_CODE=0
        echo "Validating composite action YAML files..."
        shopt -s globstar nullglob
        files=(.github/actions/**/action.yml .github/actions/**/action.yaml)
        if [ ${#files[@]} -eq 0 ]; then
          echo "  (no composite action files found)"
        fi
        for file in "${files[@]}"; do
          echo "Checking $file..."
          if python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
            echo "  ✓ Valid"
          else
            echo "  ✗ Invalid YAML syntax"
            EXIT_CODE=1
          fi
        done
        
        exit $EXIT_CODE

  validate-actions:
    name: Validate GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Validate action references
      run: |
        echo "Checking for action references..."
        EXIT_CODE=0
        SAFE_ENV_PATTERN="[[:space:]]*[A-Z_][A-Z0-9_]*:[[:space:]]*\\$\\{"
        
        # Check for deprecated actions
        if grep -r "actions/checkout@v[1-4]" .github/workflows/; then
          echo "⚠️  Warning: Found deprecated checkout action versions"
          echo "   Consider upgrading to actions/checkout@v5"
        fi

        if grep -r "actions/setup-dotnet@v[1-4]" .github/workflows/; then
          echo "⚠️  Warning: Found deprecated setup-dotnet action versions"
          echo "   Consider upgrading to actions/setup-dotnet@v5.2.0"
        fi

        if grep -r "actions/setup-dotnet@v5\.[0-1]\." .github/workflows/ .github/actions/; then
          echo "⚠️  Warning: setup-dotnet version below v5.2.0 found (inconsistency with reusable workflow)"
          echo "   Pin all direct setup-dotnet references to actions/setup-dotnet@v5.2.0"
        fi

        if grep -r "actions/github-script@v[1-7]" .github/workflows/; then
          echo "⚠️  Warning: Found deprecated github-script action versions"
          echo "   Consider upgrading to actions/github-script@v8"
        fi
        
        # Check for potentially insecure patterns
        EXPR_OPEN='${''{' # avoid GitHub Actions expression parsing
        UNSAFE_TITLE=$(grep -rh "${EXPR_OPEN}.*github.event.issue.title" .github/workflows/ 2>/dev/null | \
          grep -Ev "$SAFE_ENV_PATTERN" 2>/dev/null || true)
        if [ -n "$UNSAFE_TITLE" ]; then
          echo "$UNSAFE_TITLE"
          echo "❌ Error: Potential script injection via issue title"
          EXIT_CODE=1
        fi

        UNSAFE_COMMENT=$(grep -rh "${EXPR_OPEN}.*github.event.comment.body" .github/workflows/ 2>/dev/null | \
          grep -Ev "$SAFE_ENV_PATTERN" 2>/dev/null || true)
        if [ -n "$UNSAFE_COMMENT" ]; then
          echo "$UNSAFE_COMMENT"
          echo "❌ Error: Potential script injection via comment body"
          EXIT_CODE=1
        fi
        
        if [ $EXIT_CODE -eq 0 ]; then
          echo "✓ No security issues found"
        fi

        exit $EXIT_CODE

    - name: Run actionlint
      uses: rhysd/actionlint@v1.7.12

  check-permissions:
    name: Check Workflow Permissions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Analyze permissions
      run: |
        echo "Checking workflow permissions..."
        
        # List workflows with write permissions
        echo "Workflows with write permissions:"
        grep -l "write" .github/workflows/*.yml | while read -r file; do
          echo "  - $(basename "$file")"
          grep -A 5 "permissions:" "$file" | head -10
        done
        
        echo ""
        echo "✓ Permission audit complete"

  validate-schedules:
    name: Validate Cron Schedules
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Check schedule syntax
      run: |
        echo "Validating cron schedules..."
        
        # Extract and display all cron schedules
        echo "Configured schedules:"
        grep -r "cron:" .github/workflows/ | while read -r line; do
          echo "  $line"
        done
        
        echo ""
        echo "✓ Schedule syntax check complete"
        echo ""
        echo "Note: Ensure cron schedules are distributed to avoid rate limits"

  summary:
    name: Validation Summary
    needs: [validate-yaml, validate-actions, check-permissions, validate-schedules]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always()

    steps:
    - name: Generate summary
      run: |
        {
          echo "## Workflow Validation Summary"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| YAML Syntax | ${{ needs.validate-yaml.result }} |"
          echo "| Action References | ${{ needs.validate-actions.result }} |"
          echo "| Permissions | ${{ needs.check-permissions.result }} |"
          echo "| Schedules | ${{ needs.validate-schedules.result }} |"

          if [[ "${{ needs.validate-yaml.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-actions.result }}" == "failure" ]]; then
            echo ""
            echo "❌ Workflow validation failed. Please review the logs above."
          else
            echo ""
            echo "✅ All workflow validations passed!"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        if [[ "${{ needs.validate-yaml.result }}" == "failure" ]] || \
           [[ "${{ needs.validate-actions.result }}" == "failure" ]]; then
          exit 1
        fi
