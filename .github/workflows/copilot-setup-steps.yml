name: Copilot Environment Setup

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.csproj'
      - '**/*.fsproj'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/copilot-setup-steps.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel any in-progress run for the same ref so rapid pushes to main don't
# queue up redundant cache-warming runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Cold-cache runs (restore + Node + Playwright) can take ~15 min.
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ── .NET ──────────────────────────────────────────────────────────────
      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: '9.0.x'
          cache-suffix: 'copilot'

      - name: Restore .NET dependencies
        shell: bash
        run: dotnet restore Meridian.sln -p:EnableWindowsTargeting=true --verbosity minimal

      # ── Node / Playwright ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        continue-on-error: true
        shell: bash
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        shell: bash
        run: npx playwright install --with-deps chromium

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Write step summary
        if: always()
        shell: bash
        run: |
          echo "## Copilot Environment Setup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- .NET SDK installed and NuGet packages restored" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node.js installed and npm packages configured" >> "$GITHUB_STEP_SUMMARY"
          echo "- Playwright browser cache prepared" >> "$GITHUB_STEP_SUMMARY"
