name: Copilot Setup Steps

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.csproj'
      - '**/*.fsproj'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/copilot-setup-steps.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel any in-progress run for the same ref so rapid pushes to main don't
# queue up redundant cache-warming runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Cold-cache runs (restore + build + Node + Playwright) can take ~22 min;
    # give a little extra headroom.
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── .NET ──────────────────────────────────────────────────────────────
      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: '9.0.x'
          cache-suffix: 'copilot'

      - name: Restore .NET dependencies
        shell: bash
        run: dotnet restore Meridian.sln -p:EnableWindowsTargeting=true --verbosity minimal

      - name: Build solution
        id: build
        continue-on-error: true
        shell: bash
        run: dotnet build Meridian.sln -c Release --no-restore -p:EnableWindowsTargeting=true --verbosity minimal

      # ── Node / Playwright ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        shell: bash
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        shell: bash
        run: npx playwright install --with-deps chromium

      # ── Tests ─────────────────────────────────────────────────────────────
      # Only attempt tests when the build succeeded; --no-build with a failed
      # build produces misleading errors that obscure the real root cause.
      - name: Run C# tests
        if: steps.build.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          dotnet test tests/Meridian.Tests/Meridian.Tests.csproj \
            -c Release --no-build -p:EnableWindowsTargeting=true \
            --verbosity minimal \
            --logger "trx;LogFileName=test-results-csharp.trx" \
            --results-directory ./TestResults \
            --filter "Category!=Integration" \
            --blame-hang-timeout 60s

      - name: Run F# tests
        if: steps.build.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          dotnet test tests/Meridian.FSharp.Tests/Meridian.FSharp.Tests.fsproj \
            -c Release --no-build -p:EnableWindowsTargeting=true \
            --verbosity minimal \
            --logger "trx;LogFileName=test-results-fsharp.trx" \
            --results-directory ./TestResults \
            --blame-hang-timeout 60s

      # ── Post-run ──────────────────────────────────────────────────────────
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: copilot-test-results
          path: ./TestResults/
          retention-days: 3

      - name: Write step summary
        if: always()
        shell: bash
        run: |
          echo "## Copilot Setup Steps Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          BUILD_STATUS="${{ steps.build.outcome }}"
          echo "| Build | ${BUILD_STATUS^} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$BUILD_STATUS" != "success" ]]; then
            echo "> ⚠️ Build did not succeed — tests were skipped." >> "$GITHUB_STEP_SUMMARY"
          fi
