name: Pull Request Checks

on:
  pull_request:
    branches: [ "main", "develop" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/prompts/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false

jobs:
  # Lint and build-and-test run in parallel (no dependency between them)
  lint:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET with Cache
      uses: ./.github/actions/setup-dotnet-cache
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Meridian.sln /p:EnableWindowsTargeting=true --verbosity minimal

    - name: Check formatting
      run: dotnet format Meridian.sln --verify-no-changes --verbosity normal

    - name: Formatting fix hint
      if: failure()
      run: |
        echo "::error::Code formatting issues detected. Run 'make format' locally to fix."
        echo "## Formatting Fix" >> $GITHUB_STEP_SUMMARY
        echo "Run \`make format\` locally, then commit the changes." >> $GITHUB_STEP_SUMMARY

  build-and-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-dotnet-build.yml
    with:
      fetch-depth: 1
      collect-coverage: true
    secrets: inherit

  config-schema:
    name: Config Schema Check
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always() && needs.build-and-test.result == 'success'
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET with Cache
      uses: ./.github/actions/setup-dotnet-cache
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Meridian.sln /p:EnableWindowsTargeting=true --verbosity minimal

    - name: Regenerate checked-in config schema
      run: dotnet run --project src/Meridian -- --generate-config-schema --output config/appsettings.schema.json

    - name: Fail if schema changed
      run: git diff --exit-code -- config/appsettings.schema.json

    - name: Config schema failure hint
      if: failure()
      run: |
        echo "::error::config/appsettings.schema.json is out of date. Regenerate it with --generate-config-schema and commit the result."
        echo "## Config Schema Drift" >> $GITHUB_STEP_SUMMARY
        echo "The checked-in appsettings schema no longer matches the current configuration models." >> $GITHUB_STEP_SUMMARY

  ibapi-smoke:
    name: IBAPI Smoke Build
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always() && needs.build-and-test.result == 'success'
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET with Cache
      uses: ./.github/actions/setup-dotnet-cache
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Meridian.sln /p:EnableWindowsTargeting=true --verbosity minimal

    - name: Build infrastructure with IBAPI smoke package
      run: dotnet build src/Meridian.Infrastructure/Meridian.Infrastructure.csproj -c Release --no-restore /p:EnableWindowsTargeting=true /p:EnableIbApiSmoke=true -maxcpucount:1

    - name: IBAPI smoke failure hint
      if: failure()
      run: |
        echo "::error::The optional IBAPI smoke-build path failed. Check the community TWS-API package compatibility or the IBAPI-gated code path."
        echo "## IBAPI Smoke Build" >> $GITHUB_STEP_SUMMARY
        echo "The optional Interactive Brokers compile path did not build successfully." >> $GITHUB_STEP_SUMMARY

  # ─── Golden Fixture Canonicalization Tests ────────────────────────────
  golden-fixtures:
    name: Golden Fixture Tests
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always() && needs.build-and-test.result == 'success'
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET with Cache
      uses: ./.github/actions/setup-dotnet-cache
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Meridian.sln /p:EnableWindowsTargeting=true --verbosity minimal

    - name: Run golden fixture tests
      run: |
        dotnet test tests/Meridian.Tests \
          --filter "FullyQualifiedName~CanonicalizationGoldenFixture" \
          -c Release \
          /p:EnableWindowsTargeting=true \
          --logger "trx;LogFileName=golden-fixtures.trx" \
          --verbosity normal

    - name: Upload golden fixture results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: golden-fixture-results
        path: tests/Meridian.Tests/TestResults/golden-fixtures.trx
        retention-days: 7

    - name: Generate canonicalization drift report
      if: always()
      run: |
        python3 scripts/report_canonicalization_drift.py \
          --repo-root . \
          --output canonicalization-drift-report.md || true
        cat canonicalization-drift-report.md >> $GITHUB_STEP_SUMMARY

    - name: Upload canonicalization drift report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: canonicalization-drift-report
        path: canonicalization-drift-report.md
        retention-days: 7

    - name: Golden fixture failure hint
      if: failure()
      run: |
        echo "::error::Golden fixture canonicalization tests failed — this indicates a regression in symbol/venue canonicalization."
        echo "## Golden Fixture Regression" >> $GITHUB_STEP_SUMMARY
        echo "Canonicalization golden fixtures detected a regression. Check test output for details." >> $GITHUB_STEP_SUMMARY

  kernel-parity:
    name: Kernel Parity Suite
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always() && needs.build-and-test.result == 'success'
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Detect kernel-related changes
      id: kernel-filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          kernel:
            - 'src/Meridian.FSharp/**'
            - 'src/Meridian.FSharp.Ledger/**'
            - 'src/Meridian.Ledger/**'
            - 'src/Meridian.Risk/**'
            - 'src/Meridian.Application/**'
            - 'tests/Meridian.FSharp.Tests/**'
            - 'tests/Meridian.Tests/Application/FSharpParity/**'

    - name: Setup .NET with Cache
      if: steps.kernel-filter.outputs.kernel == 'true'
      uses: ./.github/actions/setup-dotnet-cache
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      if: steps.kernel-filter.outputs.kernel == 'true'
      run: dotnet restore Meridian.sln /p:EnableWindowsTargeting=true --verbosity minimal

    - name: Run C# kernel parity tests
      if: steps.kernel-filter.outputs.kernel == 'true'
      run: |
        dotnet test tests/Meridian.Tests \
          --filter "Category=KernelParity|FullyQualifiedName~KernelParity" \
          -c Release \
          /p:EnableWindowsTargeting=true \
          --logger "trx;LogFileName=kernel-parity-csharp.trx" \
          --verbosity normal

    - name: Run F# kernel parity tests
      if: steps.kernel-filter.outputs.kernel == 'true'
      run: |
        dotnet test tests/Meridian.FSharp.Tests \
          --filter "Category=KernelParity|FullyQualifiedName~KernelParity|DisplayName~KernelParity" \
          -c Release \
          /p:EnableWindowsTargeting=true \
          --logger "trx;LogFileName=kernel-parity-fsharp.trx" \
          --verbosity normal

    - name: Upload kernel parity results
      if: always() && steps.kernel-filter.outputs.kernel == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: kernel-parity-results
        path: |
          tests/Meridian.Tests/TestResults/kernel-parity-csharp.trx
          tests/Meridian.FSharp.Tests/TestResults/kernel-parity-fsharp.trx
        retention-days: 7

    - name: Skip note when no kernel files changed
      if: steps.kernel-filter.outputs.kernel != 'true'
      run: echo "Kernel parity suite skipped because this PR does not touch kernel-related paths." >> $GITHUB_STEP_SUMMARY

    - name: Kernel parity failure hint
      if: failure() && steps.kernel-filter.outputs.kernel == 'true'
      run: |
        echo "::error::Kernel parity suite failed. Investigate score/severity/reason mismatches or update expected divergence annotations."
        echo "## Kernel Parity Regression" >> $GITHUB_STEP_SUMMARY
        echo "Kernel-related changes must preserve C# and F# behavior parity unless an expected divergence is explicitly documented." >> $GITHUB_STEP_SUMMARY

  # ─── AI PR Review ──────────────────────────────────────────────────────

  ai-pr-review:
    name: AI PR Review
    runs-on: ubuntu-latest
    needs: [lint, build-and-test]
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Get PR diff summary
      id: diff
      run: |
        DIFF_STATS=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1)
        CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -30)
        echo "stats=$DIFF_STATS" >> $GITHUB_OUTPUT
        echo "files<<FILESEOF" >> $GITHUB_OUTPUT
        echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
        echo "FILESEOF" >> $GITHUB_OUTPUT

    - name: AI review summary
      id: ai-review
      continue-on-error: true
      uses: actions/ai-inference@v2
      with:
        model: gpt-4o-mini
        max-tokens: 1500
        prompt: |
          You are a senior .NET engineer reviewing a pull request for a market data collection application (.NET 9.0, C# 11, F# 8).

          Lint result: ${{ needs.lint.result }}
          Build & test result: ${{ needs.build-and-test.result }}

          Changed files:
          ${{ steps.diff.outputs.files }}

          Diff stats: ${{ steps.diff.outputs.stats }}

          Provide a brief PR review summary in markdown:
          1) **Risk Assessment** (Low/Medium/High) based on the files changed
          2) **Review Focus Areas** - what a human reviewer should pay attention to
          3) **Potential Issues** - any concerns based on the file types and build results
          4) If any checks failed, suggest likely causes

          Keep response under 200 words.

    - name: Post AI review to summary
      if: always()
      run: |
        echo "## AI PR Review" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -n "${{ steps.ai-review.outputs.response }}" ]; then
          echo "${{ steps.ai-review.outputs.response }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "_AI review was not available for this run._" >> $GITHUB_STEP_SUMMARY
        fi

  # ─── PR Summary ──────────────────────────────────────────────────────

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, build-and-test, config-schema, ibapi-smoke, golden-fixtures, kernel-parity, ai-pr-review]
    if: always()
    timeout-minutes: 30

    steps:
    - name: Generate PR summary
      run: |
        echo "## Pull Request Checks Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Code Formatting | ${{ needs.lint.result == 'success' && 'Passed' || (needs.lint.result == 'skipped' && 'Skipped' || 'Failed') }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build & Test | ${{ needs.build-and-test.result == 'success' && 'Passed' || (needs.build-and-test.result == 'skipped' && 'Skipped' || 'Failed') }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Config Schema | ${{ needs.config-schema.result == 'success' && 'Passed' || (needs.config-schema.result == 'skipped' && 'Skipped' || 'Failed') }} |" >> $GITHUB_STEP_SUMMARY
        echo "| IBAPI Smoke Build | ${{ needs.ibapi-smoke.result == 'success' && 'Passed' || (needs.ibapi-smoke.result == 'skipped' && 'Skipped' || 'Failed') }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Golden Fixtures | ${{ needs.golden-fixtures.result == 'success' && 'Passed' || (needs.golden-fixtures.result == 'skipped' && 'Skipped' || 'Failed') }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Kernel Parity | ${{ needs.kernel-parity.result == 'success' && 'Passed' || (needs.kernel-parity.result == 'skipped' && 'Skipped' || 'Failed') }} |" >> $GITHUB_STEP_SUMMARY
        echo "| AI PR Review | ${{ needs.ai-pr-review.result == 'success' && 'Completed' || (needs.ai-pr-review.result == 'skipped' && 'Skipped' || 'Unavailable') }} |" >> $GITHUB_STEP_SUMMARY


        if [[ "${{ needs.lint.result }}" == "failure" ]] || \
           [[ "${{ needs.build-and-test.result }}" == "failure" ]] || \
           [[ "${{ needs.config-schema.result }}" == "failure" ]] || \
           [[ "${{ needs.ibapi-smoke.result }}" == "failure" ]] || \
           [[ "${{ needs.golden-fixtures.result }}" == "failure" ]] || \
           [[ "${{ needs.kernel-parity.result }}" == "failure" ]]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ❌ Some checks failed" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
