# Consolidated diagram artifact workflow
# Replaces and combines:
#   - update-diagrams.yml (Graphviz/DOT → SVG + PNG)
#   - update-uml-diagrams.yml (PlantUML → PNG)

name: Update Diagram Artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'docs/diagrams/**/*.dot'
      - 'docs/diagrams/uml/*.puml'
      - 'scripts/generate-diagrams.mjs'
      - 'scripts/lib/ui-diagram-generator.mjs'
      - 'src/Meridian.Wpf/**/*.xaml'
      - 'src/Meridian.Wpf/**/*.cs'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-diagrams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate-diagrams:
    name: Regenerate diagram artifacts
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install diagram tooling
        run: npm ci

      - name: Generate auto-updated UI diagram sources
        run: npm run generate-diagrams

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Regenerate Graphviz artifacts from DOT
        run: |
          set -euo pipefail

          mapfile -t dot_files < <(find docs/diagrams -type f -name '*.dot' | sort)

          if [ ${#dot_files[@]} -eq 0 ]; then
            echo "No DOT files found in docs/diagrams"
            exit 0
          fi

          for file in "${dot_files[@]}"; do
            base="${file%.dot}"
            dot -Tsvg "$file" -o "${base}.svg"
            dot -Tpng "$file" -o "${base}.png"
            echo "Generated ${base}.svg"
            echo "Generated ${base}.png"
          done

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre-headless wget
          PLANTUML_VERSION="1.2024.8"
          sudo wget -q "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar" \
            -O /usr/local/share/plantuml.jar
          printf '#!/bin/sh\nexec java -jar /usr/local/share/plantuml.jar "$@"\n' \
            | sudo tee /usr/local/bin/plantuml > /dev/null
          sudo chmod +x /usr/local/bin/plantuml
          plantuml -version

      - name: Regenerate UML PNG artifacts
        run: |
          set -euo pipefail

          shopt -s nullglob
          puml_files=(docs/diagrams/uml/*.puml)

          if [ ${#puml_files[@]} -eq 0 ]; then
            echo "No PlantUML files found in docs/diagrams/uml"
            exit 0
          fi

          for file in "${puml_files[@]}"; do
            echo "Rendering ${file}"
            plantuml -tpng "$file"
          done

      - name: Commit regenerated diagram artifacts
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'docs(diagrams): regenerate diagram artifacts from sources'
          file_pattern: docs/diagrams/**/*.dot docs/diagrams/**/*.puml docs/diagrams/**/*.svg docs/diagrams/**/*.png
