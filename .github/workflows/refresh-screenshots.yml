# Refresh WPF Desktop Screenshots
#
# Builds the Meridian WPF workstation in fixture mode, captures the desktop
# screenshot catalog with scripts/dev/capture-desktop-screenshots.ps1, and
# commits updated PNGs under docs/screenshots/desktop/.
#
# Triggered:
#   - Weekly on Monday at 06:00 UTC
#   - On push to main when the WPF shell or desktop screenshot automation changes
#   - Manually via workflow_dispatch

name: Refresh UI Screenshots

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/refresh-screenshots.yml'
      - 'config/appsettings.sample.json'
      - 'scripts/dev/SharedBuild.ps1'
      - 'scripts/dev/desktop-workflows.json'
      - 'scripts/dev/run-desktop-workflow.ps1'
      - 'scripts/dev/capture-desktop-screenshots.ps1'
      - 'src/Meridian.Ui.Services/**'
      - 'src/Meridian.Ui.Shared/**'
      - 'src/Meridian.Wpf/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-screenshots-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  WPF_PROJECT: src/Meridian.Wpf/Meridian.Wpf.csproj
  WPF_CONFIGURATION: Release
  WPF_FRAMEWORK: net9.0-windows10.0.19041.0
  WPF_SCREENSHOT_OUTPUT: docs/screenshots/desktop

jobs:
  desktop-screenshots:
    name: Take WPF screenshots
    runs-on: windows-latest
    timeout-minutes: 40

    # Prevent recursive runs from the bot commit.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache-suffix: desktop-screenshots

      - name: Copy sample config
        shell: pwsh
        run: Copy-Item config\appsettings.sample.json config\appsettings.json -Force

      # Capture *all* desktop screenshots defined in scripts/dev/desktop-workflows.json
      # (screenshot-catalog + all manual workflows that includeInManual: true).
      - name: Capture desktop screenshot catalog
        shell: pwsh
        env:
          MDC_FIXTURE_MODE: '1'
        run: |
          pwsh -File scripts/dev/run-desktop-workflow.ps1 `
            -Workflow screenshot-catalog `
            -ProjectPath "${{ env.WPF_PROJECT }}" `
            -Configuration "${{ env.WPF_CONFIGURATION }}" `
            -Framework "${{ env.WPF_FRAMEWORK }}" `
            -ScreenshotDirectory "${{ env.WPF_SCREENSHOT_OUTPUT }}" 

      - name: Capture manual-overview screenshots
        shell: pwsh
        env:
          MDC_FIXTURE_MODE: '1'
        run: |
          pwsh -File scripts/dev/run-desktop-workflow.ps1 `
            -Workflow manual-overview `
            -ProjectPath "${{ env.WPF_PROJECT }}" `
            -Configuration "${{ env.WPF_CONFIGURATION }}" `
            -Framework "${{ env.WPF_FRAMEWORK }}" `
            -ScreenshotDirectory "${{ env.WPF_SCREENSHOT_OUTPUT }}/manuals/manual-overview" 

      - name: Capture manual-data-operations screenshots
        shell: pwsh
        env:
          MDC_FIXTURE_MODE: '1'
        run: |
          pwsh -File scripts/dev/run-desktop-workflow.ps1 `
            -Workflow manual-data-operations `
            -ProjectPath "${{ env.WPF_PROJECT }}" `
            -Configuration "${{ env.WPF_CONFIGURATION }}" `
            -Framework "${{ env.WPF_FRAMEWORK }}" `
            -ScreenshotDirectory "${{ env.WPF_SCREENSHOT_OUTPUT }}/manuals/manual-data-operations" 

      - name: Capture manual-research-and-trading screenshots
        shell: pwsh
        env:
          MDC_FIXTURE_MODE: '1'
        run: |
          pwsh -File scripts/dev/run-desktop-workflow.ps1 `
            -Workflow manual-research-and-trading `
            -ProjectPath "${{ env.WPF_PROJECT }}" `
            -Configuration "${{ env.WPF_CONFIGURATION }}" `
            -Framework "${{ env.WPF_FRAMEWORK }}" `
            -ScreenshotDirectory "${{ env.WPF_SCREENSHOT_OUTPUT }}/manuals/manual-research-and-trading" 

      - name: Capture manual-governance screenshots
        shell: pwsh
        env:
          MDC_FIXTURE_MODE: '1'
        run: |
          pwsh -File scripts/dev/run-desktop-workflow.ps1 `
            -Workflow manual-governance `
            -ProjectPath "${{ env.WPF_PROJECT }}" `
            -Configuration "${{ env.WPF_CONFIGURATION }}" `
            -Framework "${{ env.WPF_FRAMEWORK }}" `
            -ScreenshotDirectory "${{ env.WPF_SCREENSHOT_OUTPUT }}/manuals/manual-governance" 

      - name: Detect screenshot changes
        id: detect_changes
        shell: pwsh
        run: |
          git status --porcelain
          $changed = git status --porcelain -- "${{ env.WPF_SCREENSHOT_OUTPUT }}" | Measure-Object | Select-Object -ExpandProperty Count
          if ($changed -gt 0) {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Detected $changed changed file(s) under ${{ env.WPF_SCREENSHOT_OUTPUT }}"
          }
          else {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "No changes detected under ${{ env.WPF_SCREENSHOT_OUTPUT }}"
          }

      - name: Upload WPF screenshot diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wpf-desktop-screenshots
          path: |
            docs/screenshots/desktop/**/*.png
            artifacts/desktop-workflows/**/manifest.json
            artifacts/desktop-workflows/**/logs/*.log
            wpf-startup-stdout.log
            wpf-startup-stderr.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit WPF desktop screenshots
        if: steps.detect_changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'docs(screenshots): refresh WPF desktop screenshots'
          file_pattern: docs/screenshots/desktop/**/*.png
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Write workflow summary
        if: always()
        shell: pwsh
        run: |
          $lines = @(
            '## UI Screenshot Refresh'
            ''
            "Changes detected: **${{ steps.detect_changes.outputs.changed }}**"
            ''
            '### Output roots'
            ''
            "- ``${{ env.WPF_SCREENSHOT_OUTPUT }}/`` (catalog)"
            "- ``${{ env.WPF_SCREENSHOT_OUTPUT }}/manuals/`` (manual workflows)"
          )

          $lines | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
