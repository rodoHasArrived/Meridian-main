name: Maintenance Checks

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false

jobs:
  detect-changes:
    name: maintenance / route
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.route.outputs.mode }}
      docs_only: ${{ steps.route.outputs.docs_only }}
      workflow_changes: ${{ steps.route.outputs.workflow_changes }}
      ui_changes: ${{ steps.route.outputs.ui_changes }}
      ledger_changes: ${{ steps.route.outputs.ledger_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify maintenance route
        id: route
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" != "" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            BASE_REF="${{ github.event.before }}"
          else
            BASE_REF="$(git rev-list --max-count=2 HEAD | tail -1)"
          fi

          bash scripts/ai/route-maintenance.sh --classify-only --base "$BASE_REF" --head "${{ github.sha }}"

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          route = json.loads(Path(".ai/maintenance-route.json").read_text(encoding="utf-8"))
          for key in ("mode", "docs_only", "workflow_changes", "ui_changes", "ledger_changes"):
              value = route[key]
              if isinstance(value, bool):
                  value = str(value).lower()
              print(f"{key}={value}")
          PY

      - name: Upload route artifact
        uses: actions/upload-artifact@v7
        with:
          name: maintenance-route
          path: .ai/maintenance-route.json
          retention-days: 7

  maintenance-light:
    name: maintenance / light
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name != 'schedule' && needs.detect-changes.outputs.mode == 'light'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare AI agent environment
        run: bash scripts/ai/setup-ai-agent.sh --install-dotnet

      - name: Run routed maintenance
        run: |
          source .ai/env.sh
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          bash scripts/ai/route-maintenance.sh --base "$BASE_REF" --head "${{ github.sha }}"

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maintenance-light
          path: |
            .ai/maintenance-status.json
            .ai/maintenance-route.json
            .ai/docs-sync-report.md
            .ai/logs/
          retention-days: 7

  maintenance-full:
    name: maintenance / full
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'schedule' || github.event_name == 'push' || needs.detect-changes.outputs.mode == 'full'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare AI agent environment
        run: bash scripts/ai/setup-ai-agent.sh --install-dotnet

      - name: Run full maintenance
        run: |
          source .ai/env.sh
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            bash scripts/ai/maintenance-full.sh scheduled
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_REF="${{ github.event.pull_request.base.sha }}"
            else
              BASE_REF="${{ github.event.before }}"
            fi
            bash scripts/ai/route-maintenance.sh --base "$BASE_REF" --head "${{ github.sha }}"
          fi

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maintenance-full
          path: |
            .ai/maintenance-status.json
            .ai/maintenance-route.json
            .ai/logs/
          retention-days: 7

  doctor-environment:
    name: doctor / environment
    runs-on: ubuntu-latest
    needs: [detect-changes, maintenance-full]
    if: always() && (github.event_name == 'schedule' || needs.detect-changes.outputs.mode == 'full')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare AI agent environment
        run: bash scripts/ai/setup-ai-agent.sh --install-dotnet

      - name: Run doctor
        run: |
          source .ai/env.sh
          make doctor-ci

  docs-drift:
    name: docs / drift
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'schedule' || needs.detect-changes.outputs.docs_only == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run docs drift checks
        run: |
          mkdir -p .ai
          python3 build/scripts/docs/ai-docs-maintenance.py drift --summary
          python3 build/scripts/docs/ai-docs-maintenance.py sync-report --output .ai/docs-sync-report.md

      - name: Upload docs artifacts
        uses: actions/upload-artifact@v7
        with:
          name: docs-drift
          path: .ai/docs-sync-report.md
          retention-days: 7

  ledger-targeted:
    name: ledger / targeted
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ledger_changes == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare AI agent environment
        run: bash scripts/ai/setup-ai-agent.sh --install-dotnet

      - name: Run ledger-focused tests
        run: |
          source .ai/env.sh
          dotnet restore Meridian.sln /p:EnableWindowsTargeting=true --verbosity minimal
          dotnet test tests/Meridian.Backtesting.Tests/Meridian.Backtesting.Tests.csproj -c Release /p:EnableWindowsTargeting=true --filter "FullyQualifiedName~Ledger"
