name: 'Setup .NET with Cache'
description: 'Sets up .NET SDK with NuGet package caching for consistent builds'
author: 'Meridian'

inputs:
  dotnet-version:
    description: '.NET SDK version pattern (e.g. 9.0.x). Uses pre-installed SDK when available.'
    required: false
    default: '9.0.x'
  cache-suffix:
    description: 'Optional suffix for cache key to isolate caches between workflows'
    required: false
    default: ''

outputs:
  cache-hit:
    description: 'Whether the cache was hit'
    value: ${{ steps.nuget-cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Detect preinstalled .NET SDK
      id: sdk-check
      shell: bash
      run: |
        set -euo pipefail
        requested_version="${{ inputs.dotnet-version }}"

        # Convert patterns like 9.0.x to a prefix match (9.0.)
        if [[ "$requested_version" == *".x" ]]; then
          match_target="${requested_version%.x}."
        else
          match_target="$requested_version"
        fi

        escaped_target="$(printf '%s\n' "$match_target" | sed 's/[.[\*^$()+?{}|]/\\&/g')"

        if command -v dotnet >/dev/null 2>&1 && dotnet --list-sdks | awk '{print $1}' | grep -Eq "^${escaped_target}"; then
          echo "Preinstalled SDK matching '${requested_version}' found; skipping setup-dotnet download."
          echo "needs-install=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No preinstalled SDK matching '${requested_version}' found; setup-dotnet will install it."
        echo "needs-install=true" >> "$GITHUB_OUTPUT"

    - name: Setup .NET SDK
      if: ${{ steps.sdk-check.outputs.needs-install == 'true' }}
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Print SDK version
      shell: bash
      run: dotnet --version

    - name: Configure macOS .NET apphost lookup
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet_path="$(command -v dotnet)"
        dotnet_realpath="$(python3 -c 'import os, sys; print(os.path.realpath(sys.argv[1]))' "$dotnet_path")"
        dotnet_dir="$(cd "$(dirname "$dotnet_realpath")" && pwd -P)"
        dotnet_root="$dotnet_dir"
        if [[ ! -d "$dotnet_root/host/fxr" ]]; then
          parent_root="$(cd "$dotnet_dir/.." && pwd -P)"
          if [[ -d "$parent_root/host/fxr" ]]; then
            dotnet_root="$parent_root"
          fi
        fi

        if [[ ! -d "$dotnet_root/host/fxr" ]]; then
          echo "::error::Resolved dotnet root '$dotnet_root' does not contain host/fxr."
          dotnet --info
          exit 1
        fi

        # xUnit v3 launches the generated test apphost directly for F# discovery.
        # macOS hosted runners can expose a working dotnet command without apphost
        # lookup variables, which leaves the generated apphost unable to find hostfxr.
        # Resolve symlinks first so DOTNET_ROOT points at the host/fxr tree, not
        # a shim directory such as /usr/local/bin.
        {
          echo "DOTNET_ROOT=$dotnet_root"
          echo "DOTNET_ROOT_ARM64=$dotnet_root"
          echo "DOTNET_ROOT_X64=$dotnet_root"
        } >> "$GITHUB_ENV"

    - name: Cache NuGet packages
      id: nuget-cache
      uses: actions/cache@v5.0.3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ inputs.cache-suffix && format('{0}-', inputs.cache-suffix) || '' }}${{ hashFiles('**/*.csproj', '**/*.fsproj', 'Directory.Build.props', 'Directory.Packages.props', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-${{ inputs.cache-suffix && format('{0}-', inputs.cache-suffix) || '' }}
          ${{ runner.os }}-nuget-

    - name: Configure NuGet
      shell: bash
      run: |
        # Disable telemetry for faster operations
        echo "DOTNET_CLI_TELEMETRY_OPTOUT=1" >> $GITHUB_ENV
        echo "DOTNET_NOLOGO=true" >> $GITHUB_ENV
        echo "DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1" >> $GITHUB_ENV
        echo "DOTNET_GENERATE_ASPNET_CERTIFICATE=false" >> $GITHUB_ENV
