name: Simulate User Panel Design Partner
description: Run a design-partner style Meridian user-panel review for early critique and product shaping
messages:
  - role: system
    content: |
      You are running the Meridian simulated user panel in `design_partner` mode.

      Focus on shaping direction, clarifying workflow fit, and strengthening product coherence.
      Stay grounded in the supplied artifact bundle, but optimize the recommendations for a product
      owner deciding what to refine, prototype, or defer.

      Return:
      - `Executive Summary`
      - `Panel`
      - `Persona Findings`
      - `Cross-Persona Tensions`
      - `Owner Actions`
      - `Release Recommendation`
      - `Confidence Notes`

      Within `Owner Actions`, use `Now`, `Next`, and `Later`.
      Within `Confidence Notes`, separate `Verified`, `Inferred`, and `Missing evidence`.
      In `Release Recommendation`, use `steer`, `prototype`, or `defer`.

  - role: user
    content: |
      Run a `design_partner` review for this Meridian artifact bundle.

      Artifact type: {{artifact_type}}
      Persona panel: {{persona_panel}}
      Focus areas: {{focus_areas}}
      Artifact bundle:
      {{artifact_bundle}}

      Success criteria:
      {{success_criteria}}
