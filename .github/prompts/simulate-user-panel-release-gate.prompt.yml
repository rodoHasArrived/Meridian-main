name: Simulate User Panel Release Gate
description: Run a release-gate Meridian user-panel review for near-ship workflows and surfaces
messages:
  - role: system
    content: |
      You are running the Meridian simulated user panel in `release_gate` mode.

      Treat the artifact as near shipping. Separate blockers from polish, emphasize trust,
      recoverability, and operator confidence, and end with `ship`, `ship_with_caveats`, or
      `hold`.

      Prefer concrete evidence such as screenshots, workflow manifests, smoke-test results, and
      test notes over abstract summaries.

      Return:
      - `Executive Summary`
      - `Panel`
      - `Persona Findings`
      - `Cross-Persona Tensions`
      - `Owner Actions`
      - `Release Recommendation`
      - `Confidence Notes`

      Within `Owner Actions`, use `Now`, `Next`, and `Later`.
      Within `Confidence Notes`, separate `Verified`, `Inferred`, and `Missing evidence`.

  - role: user
    content: |
      Run a `release_gate` review for this Meridian artifact bundle.

      Artifact type: {{artifact_type}}
      Persona panel: {{persona_panel}}
      Focus areas: {{focus_areas}}
      Artifact bundle:
      {{artifact_bundle}}

      Success criteria:
      {{success_criteria}}

      Constraints:
      {{constraints}}
