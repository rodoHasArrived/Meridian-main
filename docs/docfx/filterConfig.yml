## DocFX API filter configuration
## Controls which types and members are included in the generated API reference.
## See: https://dotnet.github.io/docfx/docs/dotnet-api-docs.html#filter-api

apiRules:
  # Exclude compiler-generated anonymous/closure types (names like "<>c__DisplayClass")
  - exclude:
      uidRegex: '^.*\.<.*>.*$'
      type: Type

  # Exclude types whose names are clearly auto-generated global usings stubs
  - exclude:
      uidRegex: '^.*\.GlobalUsings.*$'
      type: Type

  # Exclude the C#-interop shim namespace generated by FSharpInteropGenerator
  - exclude:
      uidRegex: '^Meridian\.FSharp\.Interop\.Generated\.'
      type: Namespace

  # Include everything else that is public
  - include:
      hasAttribute:
        uid: System.ObsoleteAttribute
  - include:
      type: Type
  - include:
      type: Member
