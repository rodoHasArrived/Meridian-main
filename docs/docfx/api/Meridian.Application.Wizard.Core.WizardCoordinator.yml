    transitions are declared via <xref href="Meridian.Application.Wizard.Core.WizardCoordinator.AddTransition(Meridian.Application.Wizard.Core.WizardStepId%2cMeridian.Application.Wizard.Core.WizardStepId%2cSystem.Func%7bMeridian.Application.Wizard.Core.WizardContext%2cSystem.Boolean%7d)" data-throw-if-not-resolved="false"></xref>.

