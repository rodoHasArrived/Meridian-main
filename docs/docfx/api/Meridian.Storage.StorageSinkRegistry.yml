  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage
  summary: >-
    Registry for discovering and registering <xref href="Meridian.Storage.Interfaces.IStorageSink" data-throw-if-not-resolved="false"></xref> plugins

    that are decorated with <xref href="Meridian.Storage.StorageSinkAttribute" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Mirrors the <code>DataSourceRegistry</code> pattern from the provider layer (ADR-005).

    Usage in the composition root:


    <pre><code class="lang-csharp">var registry = new StorageSinkRegistry();

    registry.DiscoverFromAssemblies(typeof(JsonlStorageSink).Assembly);

    // registry.Sinks now contains JsonlStorageSink, ParquetStorageSink, etc.</code></pre>
  example: []
  syntax:
    content: public sealed class StorageSinkRegistry
    content.vb: Public NotInheritable Class StorageSinkRegistry
