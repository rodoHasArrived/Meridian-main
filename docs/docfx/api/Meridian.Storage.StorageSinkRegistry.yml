  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage
  summary: >-
    Registers all discovered sink implementation types into the service collection

    so that they can be resolved by <xref href="System.IServiceProvider" data-throw-if-not-resolved="false"></xref> during composition.
  remarks: >-
    Only registers types that are not already present in the collection, so calling

    this method after explicit registrations is safe.
  example: []
  syntax:
    content: public void RegisterServices(IServiceCollection services, ServiceLifetime lifetime = ServiceLifetime.Singleton)
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The DI service collection to populate.
    - id: lifetime
      type: Microsoft.Extensions.DependencyInjection.ServiceLifetime
      description: Service lifetime for registered sinks. Defaults to singleton.
    content.vb: Public Sub RegisterServices(services As IServiceCollection, lifetime As ServiceLifetime = ServiceLifetime.Singleton)
