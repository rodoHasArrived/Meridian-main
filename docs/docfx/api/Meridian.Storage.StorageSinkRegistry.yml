  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage
  summary: >-
    Scans the provided assemblies for concrete types decorated with

    <xref href="Meridian.Storage.StorageSinkAttribute" data-throw-if-not-resolved="false"></xref> that implement <xref href="Meridian.Storage.Interfaces.IStorageSink" data-throw-if-not-resolved="false"></xref>,

    and adds their metadata to the registry.
  remarks: >-
    Duplicate IDs (case-insensitive) are silently ignored so that scanning the

    same assembly twice is safe.
  example: []
  syntax:
    content: public void DiscoverFromAssemblies(params Assembly[] assemblies)
    parameters:
    - id: assemblies
      type: System.Reflection.Assembly[]
      description: One or more assemblies to scan.
    content.vb: Public Sub DiscoverFromAssemblies(ParamArray assemblies As Assembly())
