  assemblies:
  - Meridian.Contracts
  namespace: Meridian.Contracts.Domain
  summary: >-
    Zero-cost value object pairing a provider identifier with a raw, provider-specific

    symbol string. Represents the symbol exactly as the upstream provider exposes it —

    before any canonicalization is applied.
  remarks: >-
    <p>

    Use <xref href="Meridian.Contracts.Domain.ProviderSymbol" data-throw-if-not-resolved="false"></xref> at provider boundaries (ingestion adapters, backfill

    clients, symbol-search providers) where the raw, vendor-specific ticker must be carried

    alongside the provider identity. Examples:

    </p>

    <ul><li>Stooq yields <code>"AAPL.US"</code> for the symbol later canonicalized to <code>"AAPL"</code>.</li><li>Polygon yields <code>"X:BTCUSD"</code> for a crypto pair.</li><li>IB yields <code>"AAPL"</code> directly, but provider context is still needed for resolution.</li></ul>

    <p>

    The three symbol types form a strict hierarchy:

    </p>

    <ol><li><xref href="Meridian.Contracts.Domain.ProviderSymbol" data-throw-if-not-resolved="false"></xref> — raw, provider-scoped ticker (before mapping).</li><li><xref href="Meridian.Contracts.Domain.SymbolId" data-throw-if-not-resolved="false"></xref> — raw canonical ticker, provider-independent (e.g. after normalization).</li><li><xref href="Meridian.Contracts.Domain.CanonicalSymbol" data-throw-if-not-resolved="false"></xref> — fully resolved, system-wide canonical symbol (e.g. after the canonicalization pipeline).</li></ol>

    <p>

    Equality is case-insensitive on both <xref href="Meridian.Contracts.Domain.ProviderSymbol.Provider" data-throw-if-not-resolved="false"></xref> and <xref href="Meridian.Contracts.Domain.ProviderSymbol.Symbol" data-throw-if-not-resolved="false"></xref> fields.

    </p>
  example: []
