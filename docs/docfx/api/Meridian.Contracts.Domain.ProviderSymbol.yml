    content: 'public readonly struct ProviderSymbol : IEquatable<ProviderSymbol>, IComparable<ProviderSymbol>'
    content.vb: Public Structure ProviderSymbol Implements IEquatable(Of ProviderSymbol), IComparable(Of ProviderSymbol)
