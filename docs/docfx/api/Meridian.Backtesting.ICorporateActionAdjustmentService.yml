  summary: Adjusts historical bars for stock splits and dividends using Security Master data.
  example: []
  syntax:
    content: Task<IReadOnlyList<HistoricalBar>> AdjustAsync(IReadOnlyList<HistoricalBar> bars, string ticker, CancellationToken ct = default)
    parameters:
    - id: bars
      type: System.Collections.Generic.IReadOnlyList{Meridian.Contracts.Domain.Models.HistoricalBar}
      description: Original historical bars (not modified).
    - id: ticker
      type: System.String
      description: Ticker symbol to resolve to security ID.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.IReadOnlyList{Meridian.Contracts.Domain.Models.HistoricalBar}}
      description: New list of adjusted bars, or original bars if security not found or no actions recorded.
