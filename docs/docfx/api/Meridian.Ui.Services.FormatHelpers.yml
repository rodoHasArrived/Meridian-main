  namespace: Meridian.Ui.Services
  summary: >-
    Formats a last-update timestamp into a human-readable stale indicator.

    Returns the display text and whether the data should be considered stale.
  example: []
  syntax:
    content: public static StaleIndicatorResult FormatStaleIndicator(double? secondsSinceUpdate, double staleThresholdSeconds = 10)
    parameters:
    - id: secondsSinceUpdate
      type: System.Nullable{System.Double}
      description: Seconds since the last successful update, or null if never updated.
    - id: staleThresholdSeconds
      type: System.Double
      description: Number of seconds after which data is considered stale (default 10).
    return:
      type: Meridian.Ui.Services.StaleIndicatorResult
    content.vb: Public Shared Function FormatStaleIndicator(secondsSinceUpdate As Double?, staleThresholdSeconds As Double = 10) As StaleIndicatorResult
