  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.TwelveData
  summary: >-
    Historical data provider using the Twelve Data API (https://api.twelvedata.com).

    Provides OHLCV bars for US equities, ETFs, international stocks, forex, and crypto.

    Free tier: 800 requests/day, 8 requests/minute.

    Extends BaseHistoricalDataProvider for common functionality.
  example: []
  syntax:
    content: >-
      [DataSource("twelvedata", "Twelve Data", DataSourceType.Historical, DataSourceCategory.Premium, Priority = 22, Description = "Historical OHLCV via Twelve Data API (free/paid tiers)")]

      [ImplementsAdr("ADR-001", "TwelveData historical data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class TwelveDataHistoricalDataProvider : BaseHistoricalDataProvider, IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
    content.vb: >-
      <DataSource("twelvedata", "Twelve Data", DataSourceType.Historical, DataSourceCategory.Premium, Priority:=22, Description:="Historical OHLCV via Twelve Data API (free/paid tiers)")>

      <ImplementsAdr("ADR-001", "TwelveData historical data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

