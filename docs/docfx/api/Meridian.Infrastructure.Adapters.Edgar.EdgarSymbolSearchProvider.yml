  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Edgar
  summary: >-
    Symbol search provider backed by the SEC EDGAR public API.

    Uses the free <code>/files/company_tickers.json</code> endpoint — no API key required.

    The full company list (~13 000 entries) is fetched once and cached in-memory for the

    lifetime of the provider to stay well within the SEC's 10-request-per-second guidance.
  remarks: >-
    SEC EDGAR API reference: https://www.sec.gov/developer

    Polite-use requirements: include a User-Agent header identifying the application.
  example: []
  syntax:
    content: >-
      [DataSource("edgar-symbols", "EDGAR (Symbol Search)", DataSourceType.Historical, DataSourceCategory.Free, Priority = 20, Description = "SEC EDGAR company list — free, no credentials required")]

      [ImplementsAdr("ADR-001", "EDGAR symbol search provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class EdgarSymbolSearchProvider : IFilterableSymbolSearchProvider, ISymbolSearchProvider, IProviderMetadata, IDisposable
    content.vb: >-
      <DataSource("edgar-symbols", "EDGAR (Symbol Search)", DataSourceType.Historical, DataSourceCategory.Free, Priority:=20, Description:="SEC EDGAR company list — free, no credentials required")>

      <ImplementsAdr("ADR-001", "EDGAR symbol search provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class EdgarSymbolSearchProvider Implements IFilterableSymbolSearchProvider, ISymbolSearchProvider, IProviderMetadata, IDisposable
