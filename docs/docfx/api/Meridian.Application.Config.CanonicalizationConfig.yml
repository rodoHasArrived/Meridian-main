  assemblies:
  - Meridian.Core
  namespace: Meridian.Application.Config
  summary: >-
    Configuration for the deterministic canonicalization pipeline (Phase 2).

    Controls whether events are enriched with canonical symbols, venues, and condition codes

    before entering the <code>EventPipeline</code>.
  example: []
  syntax:
    content: public CanonicalizationConfig(bool Enabled = false, int Version = 1, string[]? PilotSymbols = null, bool EnableDualWrite = false, double UnresolvedAlertThresholdPercent = 0.1, string? ConditionCodesPath = null, string? VenueMappingPath = null)
    parameters:
    - id: Enabled
      type: System.Boolean
      description: Master switch for the canonicalization pipeline. Default is false.
    - id: Version
      type: System.Int32
      description: Canonicalization mapping version stamped on enriched events. Bumped when mapping tables change.
    - id: PilotSymbols
      type: System.String[]
      description: >-
        Optional list of symbols to canonicalize. When empty or null, all symbols are canonicalized.

        Use this for incremental rollout validation before enabling for the full universe.
    - id: EnableDualWrite
      type: System.Boolean
      description: >-
        When true, both raw and enriched events are persisted for parity validation.

        When false, only the enriched event is persisted.
    - id: UnresolvedAlertThresholdPercent
      type: System.Double
      description: >-
        Alert threshold for unresolved mapping rate per provider. Default is 0.1%.

        When exceeded for 5+ minutes, a warning is logged.
    - id: ConditionCodesPath
      type: System.String
      description: Path to condition-codes.json mapping file. Null uses built-in defaults.
    - id: VenueMappingPath
      type: System.String
      description: Path to venue-mapping.json mapping file. Null uses built-in defaults.
    content.vb: Public Sub New(Enabled As Boolean = False, Version As Integer = 1, PilotSymbols As String() = Nothing, EnableDualWrite As Boolean = False, UnresolvedAlertThresholdPercent As Double = 0.1, ConditionCodesPath As String = Nothing, VenueMappingPath As String = Nothing)
