      type: System.Uri
      description: The WebSocket URI to connect to.
    - id: configureSocket
      type: System.Action{System.Net.WebSockets.ClientWebSocket}
      description: Optional action to configure the ClientWebSocket before connecting.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task
