  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Services
  summary: >-
    File-system backed <xref href="Meridian.Execution.Services.IPaperSessionStore" data-throw-if-not-resolved="false"></xref>.

    Each session occupies its own directory under <xref href="Meridian.Execution.Services.JsonlFilePaperSessionStore.BaseDirectory" data-throw-if-not-resolved="false"></xref>:


    <pre><code class="lang-csharp">{BaseDirectory}/
      {sessionId}/
        session.json   — session metadata, atomically replaced on every change
        fills.jsonl    — one ExecutionReport JSON object per line (append-only)
        orders.jsonl   — one OrderState JSON object per line (append-only)</code></pre>

    Atomic writes for <code>session.json</code> use write-to-temp-then-rename semantics

    to guard against partial writes on crash.  JSONL appends are serialised through

    a global lock so concurrent callers never interleave partial lines.
