  summary: Creates a paper execution context.
  example: []
  syntax:
    content: public PaperExecutionContext(IOrderGateway gateway, ILiveFeedAdapter feed, IReadOnlySet<string> universe, decimal initialCash, Ledger? ledger = null)
    parameters:
    - id: gateway
      type: Meridian.Execution.Interfaces.IOrderGateway
      description: The paper trading gateway for order routing.
    - id: feed
      type: Meridian.Execution.Interfaces.ILiveFeedAdapter
      description: The live feed adapter for the session's universe.
    - id: universe
      type: System.Collections.Generic.IReadOnlySet{System.String}
      description: Symbols available in this session.
    - id: initialCash
      type: System.Decimal
      description: Starting cash balance for the paper portfolio.
    - id: ledger
      type: Meridian.Ledger.Ledger
      description: >-
        Optional ledger. When provided, every fill, commission, and opening capital

        posting is recorded as balanced double-entry journal entries.
