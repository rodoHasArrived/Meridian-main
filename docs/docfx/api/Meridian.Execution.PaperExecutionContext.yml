    to <xref href="Meridian.Execution.Services.PaperTradingPortfolio.ApplyCorporateActionsAsync(System.String%2cSystem.DateTimeOffset%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>.

