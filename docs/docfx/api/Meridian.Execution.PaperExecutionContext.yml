  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution
  summary: >-
    Concrete <xref href="Meridian.Execution.Interfaces.IExecutionContext" data-throw-if-not-resolved="false"></xref> for paper trading sessions.

    Wires a <xref href="Meridian.Execution.PaperTradingGateway" data-throw-if-not-resolved="false"></xref> together with a

    <xref href="Meridian.Execution.Services.PaperTradingPortfolio" data-throw-if-not-resolved="false"></xref> and an optional double-entry

    <xref href="Meridian.Ledger.Ledger" data-throw-if-not-resolved="false"></xref> for full accounting coverage.

    Enforced by ADR-015 (paper trading gateway — risk-free strategy validation).
  example: []
  syntax:
    content: 'public sealed class PaperExecutionContext : IExecutionContext'
    content.vb: Public NotInheritable Class PaperExecutionContext Implements IExecutionContext
