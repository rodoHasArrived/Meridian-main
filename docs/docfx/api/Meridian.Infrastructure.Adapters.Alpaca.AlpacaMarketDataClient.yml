  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Alpaca
  summary: >-
    Alpaca Market Data client (WebSocket) that implements the IMarketDataClient abstraction.

    Extends <xref href="Meridian.Infrastructure.Adapters.Core.WebSocketProviderBase" data-throw-if-not-resolved="false"></xref>, which centralises connection lifecycle,

    resilience (retry + circuit breaker), heartbeat monitoring, and automatic reconnection.

    ~80 LOC of WebSocket boilerplate removed compared to the previous direct implementation.


    Current support:

    - Trades: YES (streams "t" messages and forwards to TradeDataCollector)

    - Depth (L2): NO (Alpaca stock stream provides quotes/BBO, not full L2 updates; method returns -1)


    Notes:

    - Alpaca typically limits to 1 active stream connection per user per endpoint.

    - Authentication is performed by sending an "auth" message immediately after connect.
      The auth response arrives in the main receive loop (no separate handshake step).
  example: []
  syntax:
    content: >-
      [DataSource("alpaca", "Alpaca Markets", DataSourceType.Realtime, DataSourceCategory.Broker, Priority = 10, Description = "WebSocket streaming from Alpaca Markets")]

      [ImplementsAdr("ADR-001", "Alpaca streaming data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      [RequiresCredential("ALPACA_KEY_ID", EnvironmentVariables = new string[] { "ALPACA_KEY_ID", "ALPACA__KEYID" }, DisplayName = "API Key ID", Description = "Alpaca API key ID from https://app.alpaca.markets/brokerage/papers")]

      [RequiresCredential("ALPACA_SECRET_KEY", EnvironmentVariables = new string[] { "ALPACA_SECRET_KEY", "ALPACA__SECRETKEY" }, DisplayName = "API Secret Key", Description = "Alpaca API secret key from https://app.alpaca.markets/brokerage/papers")]

      public sealed class AlpacaMarketDataClient : WebSocketProviderBase, IMarketDataClient, IProviderMetadata, IAsyncDisposable
    content.vb: >-
      <DataSource("alpaca", "Alpaca Markets", DataSourceType.Realtime, DataSourceCategory.Broker, Priority:=10, Description:="WebSocket streaming from Alpaca Markets")>

      <ImplementsAdr("ADR-001", "Alpaca streaming data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      <RequiresCredential("ALPACA_KEY_ID", EnvironmentVariables:=New String() { "ALPACA_KEY_ID", "ALPACA__KEYID" }, DisplayName:="API Key ID", Description:="Alpaca API key ID from https://app.alpaca.markets/brokerage/papers")>

      <RequiresCredential("ALPACA_SECRET_KEY", EnvironmentVariables:=New String() { "ALPACA_SECRET_KEY", "ALPACA__SECRETKEY" }, DisplayName:="API Secret Key", Description:="Alpaca API secret key from https://app.alpaca.markets/brokerage/papers")>

