  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Alpaca
  summary: Sends provider-specific authentication messages after WebSocket connection.
  remarks: >-
    Alpaca does not use a pre-loop handshake. Authentication is performed by sending a

    single "auth" message; the auth success/failure response arrives in

    <xref href="Meridian.Infrastructure.Adapters.Alpaca.AlpacaMarketDataClient.HandleMessageAsync(System.String)" data-throw-if-not-resolved="false"></xref> as a status message (type "success" or "error").
  example: []
  syntax:
    content: protected override Task AuthenticateAsync(CancellationToken ct)
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
