  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Finnhub
  summary: >-
    Refactored symbol search provider using Finnhub API, now extending BaseSymbolSearchProvider.

    Provides symbol search and company profiles with generous free tier (60 calls/min).
  remarks: >-
    This refactored version eliminates ~200 lines of boilerplate code by leveraging

    the BaseSymbolSearchProvider abstract class for common functionality.
  example: []
  syntax:
    content: >-
      [DataSource("finnhub-symbols", "Finnhub (Symbol Search)", DataSourceType.Historical, DataSourceCategory.Free, Priority = 10, Description = "Symbol search and lookup via Finnhub API")]

      [ImplementsAdr("ADR-001", "Finnhub symbol search provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class FinnhubSymbolSearchProviderRefactored : BaseSymbolSearchProvider, IFilterableSymbolSearchProvider, ISymbolSearchProvider, IProviderMetadata, IDisposable
    content.vb: >-
      <DataSource("finnhub-symbols", "Finnhub (Symbol Search)", DataSourceType.Historical, DataSourceCategory.Free, Priority:=10, Description:="Symbol search and lookup via Finnhub API")>

      <ImplementsAdr("ADR-001", "Finnhub symbol search provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class FinnhubSymbolSearchProviderRefactored Inherits BaseSymbolSearchProvider Implements IFilterableSymbolSearchProvider, ISymbolSearchProvider, IProviderMetadata, IDisposable
