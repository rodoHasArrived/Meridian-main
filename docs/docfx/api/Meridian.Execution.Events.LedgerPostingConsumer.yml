  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Events
  summary: >-
    Background consumer that listens to <xref href="Meridian.Execution.Events.TradeExecutedEvent" data-throw-if-not-resolved="false"></xref> instances and

    posts corresponding double-entry journal entries to an attached <xref href="Meridian.Ledger" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This class implements the event-driven decoupling pattern described in the architectural

    enhancement plan. The portfolio layer publishes events; this consumer writes to the ledger

    asynchronously, removing the synchronous ledger dependency from hot execution paths.


    The channel is bounded (capacity configurable via constructor) and uses

    <xref href="System.Threading.Channels.BoundedChannelFullMode.DropOldest" data-throw-if-not-resolved="false"></xref> as a safety valve; callers should size

    the capacity appropriately for expected fill throughput.
  example: []
  syntax:
    content: 'public sealed class LedgerPostingConsumer : ITradeEventPublisher, IAsyncDisposable'
    content.vb: Public NotInheritable Class LedgerPostingConsumer Implements ITradeEventPublisher, IAsyncDisposable
  inheritance:
