  namespace: Meridian.Backtesting.Sdk
  summary: >-
    Provider-independent order request accepted by the backtest context.

    The simulator interprets the common fields directly and preserves any

    provider-specific extensions in <xref href="Meridian.Backtesting.Sdk.OrderRequest.ProviderParameters" data-throw-if-not-resolved="false"></xref>. Setting

    <xref href="Meridian.Backtesting.Sdk.OrderRequest.TakeProfitPrice" data-throw-if-not-resolved="false"></xref> and/or <xref href="Meridian.Backtesting.Sdk.OrderRequest.StopLossPrice" data-throw-if-not-resolved="false"></xref> creates

    contingent exit orders after the entry order fills.
