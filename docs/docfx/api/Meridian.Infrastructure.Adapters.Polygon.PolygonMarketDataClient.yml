  summary: Sends provider-specific authentication messages after WebSocket connection.
  remarks: >-
    Polygon requires a two-step handshake before the receive loop starts:

    1. Read the initial "connected" status message from the server.

    2. Send the API key and read the "auth_success" response.

    Both reads use <xref href="Meridian.Infrastructure.Adapters.Core.WebSocketProviderBase.ReadOneMessageAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> which reads

    directly from the socket before <xref href="Meridian.Infrastructure.Resilience.WebSocketConnectionManager.StartReceiveLoop(System.Func%7bSystem.String%2cSystem.Threading.Tasks.Task%7d%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>

    takes ownership.
