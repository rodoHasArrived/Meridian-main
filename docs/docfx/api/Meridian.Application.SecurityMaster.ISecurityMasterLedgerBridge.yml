  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.SecurityMaster
  summary: >-
    Posts contractual corporate action flows for <code class="paramref">securityId</code> into

    <code class="paramref">ledger</code> using <xref href="Meridian.Ledger.LedgerViewKind.SecurityMaster" data-throw-if-not-resolved="false"></xref>.

    Idempotent: entries whose <xref href="Meridian.Contracts.SecurityMaster.CorporateActionDto.CorpActId" data-throw-if-not-resolved="false"></xref> already appear

    as a <xref href="Meridian.Ledger.JournalEntry.JournalEntryId" data-throw-if-not-resolved="false"></xref> in the ledger are skipped.
  example: []
  syntax:
    content: Task PostCorporateActionsAsync(Guid securityId, string ticker, Ledger ledger, CancellationToken ct = default)
    parameters:
    - id: securityId
      type: System.Guid
    - id: ticker
      type: System.String
    - id: ledger
      type: Meridian.Ledger.Ledger
    - id: ct
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task
    content.vb: Function PostCorporateActionsAsync(securityId As Guid, ticker As String, ledger As Ledger, ct As CancellationToken = Nothing) As Task
