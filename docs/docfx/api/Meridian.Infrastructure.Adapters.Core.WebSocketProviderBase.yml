  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Abstract base class for WebSocket-based streaming market data providers.

    Consolidates connection lifecycle, heartbeat monitoring, and automatic reconnection

    logic that was previously duplicated across Alpaca, Polygon, NYSE, and StockSharp.


    Derived classes implement protocol-specific hooks:


    <ul><li><xref href="Meridian.Infrastructure.Adapters.Core.WebSocketProviderBase.AuthenticateAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> — send provider-specific auth messages</li><li><xref href="Meridian.Infrastructure.Adapters.Core.WebSocketProviderBase.HandleMessageAsync(System.String)" data-throw-if-not-resolved="false"></xref> — parse and route incoming messages</li><li><xref href="Meridian.Infrastructure.Adapters.Core.WebSocketProviderBase.ResubscribeAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> — re-subscribe symbols after reconnection</li><li><xref href="Meridian.Infrastructure.Adapters.Core.WebSocketProviderBase.BuildWebSocketUri" data-throw-if-not-resolved="false"></xref> — construct the provider-specific endpoint URI</li><li><xref href="Meridian.Infrastructure.Adapters.Core.WebSocketProviderBase.ConfigureWebSocket(System.Net.WebSockets.ClientWebSocket)" data-throw-if-not-resolved="false"></xref> — set provider-specific headers/options</li></ul>
  remarks: >-
    Connection management is delegated to <xref href="Meridian.Infrastructure.Resilience.WebSocketConnectionManager" data-throw-if-not-resolved="false"></xref>

    which provides resilience (retry + circuit breaker), heartbeat monitoring,

    and gated reconnection to prevent reconnection storms.
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Unified WebSocket provider base class for streaming data providers")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      public abstract class WebSocketProviderBase : IMarketDataClient, IProviderMetadata, IAsyncDisposable
    content.vb: >-
      <ImplementsAdr("ADR-001", "Unified WebSocket provider base class for streaming data providers")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      Public MustInherit Class WebSocketProviderBase Implements IMarketDataClient, IProviderMetadata, IAsyncDisposable
