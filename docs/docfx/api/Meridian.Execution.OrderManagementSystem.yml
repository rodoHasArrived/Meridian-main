  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution
  summary: >-
    Provides a read-only view of fill and partial-fill execution reports for consumption

    by portfolio trackers and audit subscribers.  Reports are published as each order

    transitions to <xref href="Meridian.Execution.Sdk.OrderStatus.Filled" data-throw-if-not-resolved="false"></xref> or <xref href="Meridian.Execution.Sdk.OrderStatus.PartiallyFilled" data-throw-if-not-resolved="false"></xref>.

    Consumers must drain this reader promptly to avoid backpressure.
  example: []
  syntax:
    content: public ChannelReader<ExecutionReport> ExecutionReports { get; }
