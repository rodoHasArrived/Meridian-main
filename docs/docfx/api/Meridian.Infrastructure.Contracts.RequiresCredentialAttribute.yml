  assemblies:
  - Meridian.ProviderSdk
  namespace: Meridian.Infrastructure.Contracts
  summary: >-
    Declares that a provider class requires a named credential at runtime.

    Apply one attribute per credential; providers with multiple credentials

    apply the attribute multiple times.
  remarks: >-
    <p>

    <xref href="Meridian.Infrastructure.Contracts.AttributeCredentialResolver" data-throw-if-not-resolved="false"></xref> scans these attributes at startup to build a

    per-provider <xref href="Meridian.Infrastructure.Contracts.ICredentialContext" data-throw-if-not-resolved="false"></xref>, eliminating the need to add a dedicated

    method to the legacy per-provider credential resolver for every new provider.

    </p>

    <p>

    The WPF <code>CredentialManagementPage</code> reads these attributes to render credential fields

    dynamically; <xref href="Meridian.Infrastructure.Contracts.RequiresCredentialAttribute.DisplayName" data-throw-if-not-resolved="false"></xref> and <xref href="Meridian.Infrastructure.Contracts.RequiresCredentialAttribute.Description" data-throw-if-not-resolved="false"></xref> are used as UI labels.

    </p>

    <p><b>Example:</b></p>

    <pre><code class="lang-csharp">[RequiresCredential("API_KEY",
        EnvironmentVariables = new[] { "MYBROKER_API_KEY", "MYBROKER__APIKEY" },
        DisplayName = "API Key",
        Description = "Found in your MyBroker dashboard under Settings → API.")]
    [RequiresCredential("SECRET_KEY",
        EnvironmentVariables = new[] { "MYBROKER_SECRET_KEY" },
        Optional = true,
        DisplayName = "API Secret (optional)")]
    public sealed class MyBrokerHistoricalDataProvider : BaseHistoricalDataProvider { ... }</code></pre>
  example: []
  syntax:
    content: >-
      [AttributeUsage(AttributeTargets.Class, AllowMultiple = true, Inherited = true)]

      public sealed class RequiresCredentialAttribute : Attribute
    content.vb: >-
      <AttributeUsage(AttributeTargets.Class, AllowMultiple:=True, Inherited:=True)>

      Public NotInheritable Class RequiresCredentialAttribute Inherits Attribute
