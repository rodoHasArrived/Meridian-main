  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Pipeline
  summary: >-
    High-throughput, backpressured pipeline that decouples producers from storage sinks.

    Includes periodic flushing, capacity monitoring, performance metrics, and optional

    Write-Ahead Log (WAL) integration for crash-safe durability.
  remarks: >-
    When a <xref href="Meridian.Storage.Archival.WriteAheadLog" data-throw-if-not-resolved="false"></xref> is provided, the pipeline ensures events are

    persisted to the WAL before being written to the primary storage sink. On startup,

    <xref href="Meridian.Application.Pipeline.EventPipeline.RecoverAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> replays any uncommitted WAL records to the sink, preventing

    data loss from crashes. The consumer writes each event to the WAL, then to the sink,

    and commits the WAL after each batch is flushed. Both <xref href="Meridian.Application.Pipeline.EventPipeline.TryPublish(Meridian.Domain.Events.MarketEvent%40)" data-throw-if-not-resolved="false"></xref> and

    <xref href="Meridian.Application.Pipeline.EventPipeline.PublishAsync(Meridian.Domain.Events.MarketEvent%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> defer WAL writes to the consumer to ensure each event is

    recorded exactly once, preventing duplicate records during recovery.
  example: []
  syntax:
    content: 'public sealed class EventPipeline : IMarketEventPublisher, IBackpressureSignal, IAsyncDisposable, IFlushable'
