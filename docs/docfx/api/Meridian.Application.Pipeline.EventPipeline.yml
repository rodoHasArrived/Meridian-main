  summary: Creates a new EventPipeline with configurable capacity and flush behavior.
  example: []
  syntax:
    content: public EventPipeline(IStorageSink sink, int capacity = 100000, BoundedChannelFullMode fullMode = BoundedChannelFullMode.DropOldest, TimeSpan? flushInterval = null, int batchSize = 100, bool enablePeriodicFlush = true, ILogger<EventPipeline>? logger = null, DroppedEventAuditTrail? auditTrail = null, WriteAheadLog? wal = null, IEventMetrics? metrics = null, TimeSpan? finalFlushTimeout = null, TimeSpan? sinkFlushTimeout = null, IEventValidator? validator = null, DeadLetterSink? deadLetterSink = null, PersistentDedupLedger? dedupLedger = null, int consumerCount = 1)
    parameters:
    - id: sink
      type: Meridian.Storage.Interfaces.IStorageSink
      description: The storage sink for persisting events.
    - id: capacity
      type: System.Int32
      description: Maximum number of events the queue can hold. Default is 100,000.
    - id: fullMode
      type: System.Threading.Channels.BoundedChannelFullMode
      description: Behavior when the queue is full. Default is DropOldest.
    - id: flushInterval
      type: System.Nullable{System.TimeSpan}
      description: Interval between periodic flushes. Default is 5 seconds.
    - id: batchSize
      type: System.Int32
      description: Number of events to batch before writing. Default is 100.
    - id: enablePeriodicFlush
      type: System.Boolean
      description: Whether to enable periodic flushing. Default is true.
    - id: logger
      type: Microsoft.Extensions.Logging.ILogger{Meridian.Application.Pipeline.EventPipeline}
      description: Optional logger for error reporting. When provided, enables logging for flush failures and disposal errors.
    - id: auditTrail
      type: Meridian.Application.Pipeline.DroppedEventAuditTrail
      description: Optional audit trail for tracking dropped events.
    - id: wal
      type: Meridian.Storage.Archival.WriteAheadLog
      description: >-
        Optional Write-Ahead Log for crash-safe durability. When provided, events
            are written to the WAL before the primary sink. Call <xref href="Meridian.Application.Pipeline.EventPipeline.RecoverAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> on startup
            to replay any uncommitted records from a prior crash.
    - id: metrics
      type: Meridian.Application.Monitoring.IEventMetrics
      description: Optional event metrics for tracking pipeline throughput.
    - id: finalFlushTimeout
      type: System.Nullable{System.TimeSpan}
      description: Optional timeout for the final flush during shutdown. Defaults to 30 seconds.
    - id: sinkFlushTimeout
      type: System.Nullable{System.TimeSpan}
      description: Optional per-call timeout for periodic sink flushes. Prevents a hung sink from stalling the pipeline indefinitely. Defaults to 60 seconds.
    - id: validator
      type: Meridian.Application.Pipeline.IEventValidator
      description: Optional event validator for pre-persistence validation.
    - id: deadLetterSink
      type: Meridian.Application.Pipeline.DeadLetterSink
      description: Optional dead-letter sink for rejected events.
    - id: dedupLedger
      type: Meridian.Application.Pipeline.PersistentDedupLedger
      description: Optional persistent deduplication ledger for suppressing duplicate events.
    - id: consumerCount
      type: System.Int32
      description: Requested number of consumer tasks for the slow path. Values greater than 1 are honored only when WAL, validation, dead-letter routing, and deduplication are disabled.
