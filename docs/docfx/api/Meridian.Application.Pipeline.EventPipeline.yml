  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Pipeline
  summary: >-
    Attempts to publish an event to the pipeline without blocking.

    Returns false if the queue is full (event will be dropped based on FullMode).
  remarks: >-
    WAL writes are deferred to the consumer task to preserve the non-blocking contract of

    this method. Events enqueued via this path carry <code>WalSequence == 0</code>; the consumer

    detects this and appends the event to the WAL before forwarding it to the storage sink,

    maintaining the same durability guarantee as <xref href="Meridian.Application.Pipeline.EventPipeline.PublishAsync(Meridian.Domain.Events.MarketEvent%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> at the cost of a

    slightly larger crash-recovery window. Callers that require the event to be WAL-persisted

    before this call returns should use <xref href="Meridian.Application.Pipeline.EventPipeline.PublishAsync(Meridian.Domain.Events.MarketEvent%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> instead.
  example: []
