  namespace: Meridian.Execution.Services
  summary: >-
    Root directory under which each session's files are stored.

    Session files are written to <code>{BaseDirectory}/{sessionId}/</code>.

    When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or empty, sessions are kept in-memory only

    and will not survive a process restart.
  example: []
  syntax:
