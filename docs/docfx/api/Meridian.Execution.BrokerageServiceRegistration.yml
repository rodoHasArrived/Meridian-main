  summary: >-
    Registers a specific <xref href="Meridian.Execution.Sdk.IBrokerageGateway" data-throw-if-not-resolved="false"></xref> implementation as a keyed named gateway.

    Use the same <code class="paramref">gatewayId</code> when configuring <xref href="Meridian.Execution.Sdk.BrokerageConfiguration.Gateway" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: 'public static IServiceCollection AddBrokerageGateway<TGateway>(this IServiceCollection services, string gatewayId) where TGateway : class, IBrokerageGateway'
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The DI service collection.
    - id: gatewayId
      type: System.String
      description: >-
        The gateway identifier (e.g., "alpaca", "ib"). Must match the value of

        <xref href="Meridian.Execution.Sdk.BrokerageConfiguration.Gateway" data-throw-if-not-resolved="false"></xref> when this gateway should be selected.
    typeParameters:
    - id: TGateway
      description: The concrete brokerage gateway type.
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection for chaining.
