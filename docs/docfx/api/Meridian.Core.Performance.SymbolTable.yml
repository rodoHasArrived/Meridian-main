    startLine: 19
  assemblies:
  - Meridian.Core
  namespace: Meridian.Core.Performance
  summary: Thread-safe symbol intern table that maps market symbol strings to compact integer IDs.
  remarks: >-
    The hot-path producer stores only the integer ID in <xref href="Meridian.Core.Performance.RawTradeEvent.SymbolHash" data-throw-if-not-resolved="false"></xref>

    and <xref href="Meridian.Core.Performance.RawQuoteEvent.SymbolHash" data-throw-if-not-resolved="false"></xref> to avoid string references on the

    critical publish path.  The consumer resolves the ID back to a symbol string for

    serialization via <xref href="Meridian.Core.Performance.SymbolTable.TryGetSymbol(System.Int32)" data-throw-if-not-resolved="false"></xref>.


    <p>

    IDs start at 1. ID 0 is reserved to represent an unregistered symbol.

    A single global <xref href="Meridian.Core.Performance.SymbolTable" data-throw-if-not-resolved="false"></xref> instance should be shared between

    the producer and consumer so both sides see the same ID→symbol mapping.

    </p>
  example: []
  syntax:
    content: public sealed class SymbolTable
    content.vb: Public NotInheritable Class SymbolTable
