  summary: Resolves an integer ID back to its symbol string.
  example: []
  syntax:
    content: public string? TryGetSymbol(int id)
    parameters:
    - id: id
      type: System.Int32
      description: Symbol ID previously returned by <xref href="Meridian.Core.Performance.SymbolTable.GetOrAdd(System.String)" data-throw-if-not-resolved="false"></xref>.
