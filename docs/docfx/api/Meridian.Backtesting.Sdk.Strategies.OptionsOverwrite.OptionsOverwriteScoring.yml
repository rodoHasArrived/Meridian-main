  summary: >-
    Runs all filters and scores all eligible candidates, returning the best one.

    Returns <code>null</code> when no candidate survives the filter stack.
  example: []
  syntax:
    content: public static OptionCandidateInfo? ChooseBestCall(IReadOnlyList<OptionCandidateInfo> candidates, OptionsOverwriteParams p, decimal underlyingPrice, int? daysToNextExDiv = null, decimal? nextDividendAmount = null, Func<double, int, double?>? ivSurfaceRef = null)
    parameters:
    - id: candidates
      type: System.Collections.Generic.IReadOnlyList{Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionCandidateInfo}
      description: All call candidates for the underlying.
    - id: p
      type: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionsOverwriteParams
      description: Strategy parameters.
    - id: underlyingPrice
      type: System.Decimal
      description: Current underlying price (for precise ITM / extrinsic checks).
    - id: daysToNextExDiv
      type: System.Nullable{System.Int32}
      description: Days to the next ex-dividend date, if known.
    - id: nextDividendAmount
      type: System.Nullable{System.Decimal}
      description: Expected dividend amount, if known.
    - id: ivSurfaceRef
      type: System.Func{System.Double,System.Int32,System.Nullable{System.Double}}
      description: >-
        Optional function that returns the model IV at a given (delta, dte) pair.

        Used only in <xref href="Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OverwriteScoringMode.Relative" data-throw-if-not-resolved="false"></xref> mode.
    return:
      type: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionCandidateInfo
