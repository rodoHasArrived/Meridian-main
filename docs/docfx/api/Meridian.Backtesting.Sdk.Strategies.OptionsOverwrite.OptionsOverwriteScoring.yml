  assemblies:
  - Meridian.Backtesting.Sdk
  namespace: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite
  summary: >-
    Scores by relative IV richness:


    <ol><li>Compute IV residual = opt.IV - surfaceIvRef (model IV at that delta/DTE)</li><li>Multiply by vega-dollar to get expected dollar richness</li><li>Penalise by spread (wide spreads reduce execution quality)</li><li>Add a log-depth bonus to prefer liquid names</li></ol>


    Falls back to <xref href="Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionsOverwriteScoring.ScoreBasic(Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionCandidateInfo)" data-throw-if-not-resolved="false"></xref> when IV or vega data is missing.
  example: []
  syntax:
    content: public static double ScoreRelative(OptionCandidateInfo opt, OptionsOverwriteParams p, double? ivSurfaceRef)
    parameters:
    - id: opt
      type: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionCandidateInfo
      description: Candidate option.
    - id: p
      type: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionsOverwriteParams
      description: Strategy parameters.
    - id: ivSurfaceRef
      type: System.Nullable{System.Double}
      description: >-
        Model IV at the same delta and DTE from a fitted IV surface.

        Pass <code>null</code> to fall back to basic scoring.
    return:
      type: System.Double
    content.vb: Public Shared Function ScoreRelative(opt As OptionCandidateInfo, p As OptionsOverwriteParams, ivSurfaceRef As Double?) As Double
