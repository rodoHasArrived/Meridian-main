  assemblies:
  - Meridian.Backtesting.Sdk
  namespace: Meridian.Backtesting.Sdk
  summary: >-
    Describes a scheduled asset-level event that should be applied during a backtest to improve

    portfolio accounting realism beyond pure trade and price data.
  example: []
  syntax:
    content: public AssetEvent(DateTimeOffset EffectiveAt, string Symbol, AssetEventType EventType, decimal CashPerShare = 0, decimal PositionFactor = 1, string? TargetSymbol = null, decimal? ReferencePrice = null, string? Description = null)
    parameters:
    - id: EffectiveAt
      type: System.DateTimeOffset
      description: Timestamp when the event becomes effective.
    - id: Symbol
      type: System.String
      description: Primary source symbol affected by the event.
    - id: EventType
      type: Meridian.Backtesting.Sdk.AssetEventType
      description: Type of economic event to apply.
    - id: CashPerShare
      type: System.Decimal
      description: >-
        Cash paid or charged per currently-held unit. Positive values credit holders and debit shorts.

        Negative values model fees, assessments, or other cash outflows.
    - id: PositionFactor
      type: System.Decimal
      description: >-
        Share-conversion factor applied to the current position. Examples: 2.0 for a 2-for-1 split,

        0.5 for a 1-for-2 reverse split, 0.75 for stock-for-stock merger consideration.
    - id: TargetSymbol
      type: System.String
      description: >-
        Optional destination symbol for mergers, acquisitions, renames, and other symbol migrations.

        When omitted, the existing symbol is retained.
    - id: ReferencePrice
      type: System.Nullable{System.Decimal}
      description: Optional price used for cash-in-lieu calculations and transformed last-price updates.
    - id: Description
      type: System.String
      description: Optional human-readable description for reporting and ledger entries.
    content.vb: Public Sub New(EffectiveAt As DateTimeOffset, Symbol As String, EventType As AssetEventType, CashPerShare As Decimal = 0, PositionFactor As Decimal = 1, TargetSymbol As String = Nothing, ReferencePrice As Decimal? = Nothing, Description As String = Nothing)
