  summary: >-
    Robinhood historical data provider configuration.

    Uses the unofficial Robinhood API; requires a personal access token.

    No official public API exists — set ROBINHOOD_ACCESS_TOKEN via environment variable.
  example: []
  syntax:
    content: public RobinhoodConfig(bool Enabled = false, int Priority = 35, int RateLimitPerHour = 100)
    parameters:
    - id: Enabled
      type: System.Boolean
      description: Enable this provider.
    - id: Priority
      type: System.Int32
      description: Priority in fallback chain (lower = tried first). Defaults to 35.
    - id: RateLimitPerHour
      type: System.Int32
      description: Maximum requests per hour. Defaults to 100 (conservative, undocumented limit).
