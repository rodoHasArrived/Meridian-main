  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Store
  summary: >-
    <xref href="Meridian.Storage.Interfaces.IMarketDataStore" data-throw-if-not-resolved="false"></xref> that aggregates results from multiple underlying stores

    and merges them in ascending <xref href="Meridian.Domain.Events.MarketEvent.Timestamp" data-throw-if-not-resolved="false"></xref> order.
  remarks: >-
    <p>

    Use this as the top-level store when data lives across different tiers or formats

    (e.g. JSONL hot tier + Parquet cold tier).  Each delegate store is queried

    independently; their results are merged via an N-way sorted merge so callers always

    receive a coherent time-ordered stream.

    </p>

    <p>

    The <xref href="Meridian.Contracts.Store.MarketDataQuery.Limit" data-throw-if-not-resolved="false"></xref> is applied <em>after</em> merging, so all

    delegates are queried until the combined limit is reached.

    </p>
  example: []
  syntax:
    content: 'public sealed class CompositeMarketDataStore : IMarketDataStore'
    content.vb: Public NotInheritable Class CompositeMarketDataStore Implements IMarketDataStore
