  namespace: Meridian.Execution.Sdk
  summary: >-
    Represents an individual execution lot (a parcel of shares or contracts acquired at a

    specific price and time). Lot-level tracking enables accurate capital-gains calculations

    under FIFO, LIFO, HIFO, or specific-lot identification methods.
  example: []
  syntax:
    content: public TaxLot(Guid LotId, string Symbol, long Quantity, decimal CostBasis, DateTimeOffset OpenedAt, string? FinancialAccountId = null)
    parameters:
    - id: LotId
      type: System.Guid
      description: Unique identifier for this lot.
    - id: Symbol
      type: System.String
      description: Instrument symbol.
    - id: Quantity
      type: System.Int64
      description: Number of shares/contracts in the lot (positive = long, negative = short).
    - id: CostBasis
      type: System.Decimal
      description: Per-share or per-contract cost basis at the time of acquisition.
    - id: OpenedAt
      type: System.DateTimeOffset
      description: Wall-clock timestamp when the lot was opened.
    - id: FinancialAccountId
      type: System.String
      description: Optional brokerage account ID this lot belongs to.
    content.vb: Public Sub New(LotId As Guid, Symbol As String, Quantity As Long, CostBasis As Decimal, OpenedAt As DateTimeOffset, FinancialAccountId As String = Nothing)
