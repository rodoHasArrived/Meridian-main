  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Shared
  summary: >-
    Observes a fire-and-forget task, ensuring any exception is logged

    rather than silently swallowed. Use this when a task cannot be awaited

    (e.g., called from a synchronous method or event handler) but failures

    must not go unnoticed.
  example: []
  syntax:
    content: public static void ObserveException(this Task task, ILogger? logger = null, string? operation = null)
    parameters:
    - id: task
      type: System.Threading.Tasks.Task
      description: The task to observe.
    - id: logger
      type: Serilog.ILogger
      description: Optional logger; falls back to a static default.
    - id: operation
      type: System.String
      description: A short description of the operation for log context.
    content.vb: Public Shared Sub ObserveException(task As Task, logger As ILogger = Nothing, operation As String = Nothing)
