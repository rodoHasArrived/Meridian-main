  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Wizard.Metadata
  summary: >-
    Immutable descriptor for a single data provider.

    Centralises signup URLs, environment variable names, capabilities and priority

    so that both <code>ConfigurationWizard</code> and <code>AutoConfigurationService</code>

    can share the same source of truth.
  example: []
  syntax:
    content: public ProviderDescriptor(string Name, string DisplayName, string[] RequiredEnvVars, string[] AlternativeEnvVars, string[] Capabilities, int Priority, string SignupUrl = "", string DocsUrl = "", string FreeTierDescription = "")
    parameters:
    - id: Name
      type: System.String
      description: Provider identifier (matches <xref href="Meridian.Application.Config.DataSourceKind" data-throw-if-not-resolved="false"></xref> names).
    - id: DisplayName
      type: System.String
      description: Human-readable name shown in the wizard UI.
    - id: RequiredEnvVars
      type: System.String[]
      description: >-
        Env-vars that must all be set for the provider to be considered "configured".

        Empty means no credentials required (e.g. Yahoo, Stooq).
    - id: AlternativeEnvVars
      type: System.String[]
      description: Alternative env-var names accepted in place of <code class="paramref">RequiredEnvVars</code>.
    - id: Capabilities
      type: System.String[]
      description: >-
        Provider capability tags: <code>RealTime</code>, <code>Historical</code>, <code>Trades</code>,

        <code>Quotes</code>, <code>L2Depth</code>, <code>Aggregates</code>, <code>Daily</code>, etc.
    - id: Priority
      type: System.Int32
      description: Lower value = higher preference during auto-configuration ordering.
    - id: SignupUrl
      type: System.String
      description: Where users sign up for a free or paid tier.
    - id: DocsUrl
      type: System.String
      description: Provider API documentation.
    - id: FreeTierDescription
      type: System.String
      description: Short description of the free plan limits.
    content.vb: Public Sub New(Name As String, DisplayName As String, RequiredEnvVars As String(), AlternativeEnvVars As String(), Capabilities As String(), Priority As Integer, SignupUrl As String = "", DocsUrl As String = "", FreeTierDescription As String = "")
