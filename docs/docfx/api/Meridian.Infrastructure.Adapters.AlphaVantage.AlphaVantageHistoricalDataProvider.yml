  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.AlphaVantage
  summary: >-
    Historical data provider using Alpha Vantage API (free tier with API key).

    Unique capability: Intraday historical data (1, 5, 15, 30, 60 min intervals).

    Coverage: US equities, global indices, forex, crypto.

    Free tier: 25 requests/day (severely limited), 5 calls/minute.

    Extends BaseHistoricalDataProvider for common functionality.
  example: []
  syntax:
    content: >-
      [DataSource("alphavantage", "Alpha Vantage (free tier)", DataSourceType.Historical, DataSourceCategory.Free, Priority = 25, Description = "Free tier historical OHLCV data via Alpha Vantage API")]

      [ImplementsAdr("ADR-001", "Alpha Vantage historical data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      [RequiresCredential("ALPHA_VANTAGE_API_KEY", EnvironmentVariables = new string[] { "ALPHA_VANTAGE_API_KEY", "ALPHAVANTAGE__APIKEY" }, DisplayName = "API Key", Description = "Alpha Vantage API key from https://www.alphavantage.co/support/#api-key")]

      public sealed class AlphaVantageHistoricalDataProvider : BaseHistoricalDataProvider, IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
    content.vb: >-
      <DataSource("alphavantage", "Alpha Vantage (free tier)", DataSourceType.Historical, DataSourceCategory.Free, Priority:=25, Description:="Free tier historical OHLCV data via Alpha Vantage API")>

      <ImplementsAdr("ADR-001", "Alpha Vantage historical data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      <RequiresCredential("ALPHA_VANTAGE_API_KEY", EnvironmentVariables:=New String() { "ALPHA_VANTAGE_API_KEY", "ALPHAVANTAGE__APIKEY" }, DisplayName:="API Key", Description:="Alpha Vantage API key from https://www.alphavantage.co/support/#api-key")>

