  - Meridian.Application
  namespace: Meridian.Application.SecurityMaster
  summary: >-
    Read-only bridge between <xref href="Meridian.Contracts.Domain.Enums.InstrumentType" data-throw-if-not-resolved="false"></xref> (market-data layer) and the

    F# <code>SecurityKind</code> asset-class strings (security master layer).


    <p>

    These two classification systems evolved independently: <xref href="Meridian.Contracts.Domain.Enums.InstrumentType" data-throw-if-not-resolved="false"></xref> is

    used by the data-collection pipeline and provider adapters, while the security master uses

    F# discriminated-union asset-class names. This static lookup provides a non-breaking,

    read-only mapping so routing code does not need to hardcode string comparisons.

    </p>
  example: []
  syntax:
    content: public static class SecurityKindMapping
    content.vb: Public Module SecurityKindMapping
