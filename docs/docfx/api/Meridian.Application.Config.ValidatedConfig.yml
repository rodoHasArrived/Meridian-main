  assemblies:
  - Meridian.Core
  namespace: Meridian.Application.Config
  summary: >-
    Represents a validated, normalized configuration that has passed through the full configuration pipeline.

    This is the single output type from all configuration entry points (wizard, auto-config, file load, hot reload).
  remarks: >-
    <p>The configuration pipeline ensures that:</p>

    <ul><li>Environment overlays have been applied</li><li>Environment variable overrides have been applied</li><li>Credentials have been resolved from all sources</li><li>Self-healing fixes have been applied (if enabled)</li><li>Validation has been performed</li></ul>
