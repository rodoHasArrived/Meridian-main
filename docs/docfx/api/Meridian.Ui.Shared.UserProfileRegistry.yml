  assemblies:
  - Meridian.Ui.Shared
  namespace: Meridian.Ui.Shared
  summary: >-
    Manages the set of user accounts available for authentication.


    <p>User accounts are sourced from environment variables using one of two approaches:</p>

    <ul><li>
        <b>Multi-user (recommended):</b> Set <code>MDC_USERS</code> to a JSON array of
        <xref href="Meridian.Ui.Shared.UserAccountConfig" data-throw-if-not-resolved="false"></xref> objects, e.g.:

        <pre><code class="lang-csharp">MDC_USERS=[{"username":"alice","password":"s3cr3t","role":"TradeDesk"},
               {"username":"bob","password":"p@ss","role":"Accounting"}]</code></pre>
      </li><li>
        <b>Single-user legacy (backward-compatible):</b> Set <code>MDC_USERNAME</code> and
        <code>MDC_PASSWORD</code>. These are mapped to a single <xref href="Meridian.Contracts.Auth.UserRole.Admin" data-throw-if-not-resolved="false"></xref> account.
      </li></ul>

    <p>When both are set, <code>MDC_USERS</code> takes precedence.</p>
