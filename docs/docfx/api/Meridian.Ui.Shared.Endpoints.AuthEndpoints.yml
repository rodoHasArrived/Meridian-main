  assemblies:
  - Meridian.Ui.Shared
  namespace: Meridian.Ui.Shared.Endpoints
  summary: >-
    Maps the login page, login API, logout API, and current-user info endpoints.


    <ul><li>GET  /login            – returns the login page HTML.</li><li>POST /api/auth/login   – validates credentials, sets a session cookie.</li><li>POST /api/auth/logout  – invalidates the session cookie.</li><li>GET  /api/auth/me      – returns the current user's username, role, and permissions.</li></ul>
  example: []
  syntax:
    content: public static void MapAuthEndpoints(this WebApplication app)
