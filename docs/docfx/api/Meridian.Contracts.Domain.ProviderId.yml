  namespace: Meridian.Contracts.Domain
  summary: >-
    Zero-cost value object representing a data-provider identifier.

    Prevents accidental interchange of provider IDs with <xref href="Meridian.Contracts.Domain.SymbolId" data-throw-if-not-resolved="false"></xref> or <xref href="Meridian.Contracts.Domain.VenueCode" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Provider IDs are canonically lowercase (e.g. <code>"alpaca"</code>, <code>"stooq"</code>).

    The constructor normalises the value to lowercase automatically.
