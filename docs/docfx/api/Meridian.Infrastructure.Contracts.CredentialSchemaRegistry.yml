  assemblies:
  - Meridian.ProviderSdk
  namespace: Meridian.Infrastructure.Contracts
  summary: Bulk index of credential schemas declared via <xref href="Meridian.Infrastructure.Contracts.RequiresCredentialAttribute" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    <xref href="Meridian.Infrastructure.Contracts.AttributeCredentialResolver" data-throw-if-not-resolved="false"></xref> is the lightweight path for resolving credentials

    for a single provider type. <xref href="Meridian.Infrastructure.Contracts.CredentialSchemaRegistry" data-throw-if-not-resolved="false"></xref> is the companion

    discovery/index surface for scenarios that need to enumerate many provider credential schemas

    at once, such as UI catalogs.

    </p>

    <p>

    Provider ID lookups are only available when a provider also declares

    <xref href="Meridian.Infrastructure.DataSources.DataSourceAttribute" data-throw-if-not-resolved="false"></xref>. Providers without a data-source attribute remain available

    through the type-based index.

    </p>
