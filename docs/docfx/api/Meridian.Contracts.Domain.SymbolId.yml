  assemblies:
  - Meridian.Contracts
  namespace: Meridian.Contracts.Domain
  summary: >-
    Zero-cost value object representing a raw, provider-independent market instrument symbol.

    This is the "Symbol (raw)" type in the typed symbol hierarchy.

    Prevents accidental interchange of symbols with other string-typed IDs

    (e.g. <xref href="Meridian.Contracts.Domain.ProviderId" data-throw-if-not-resolved="false"></xref> or <xref href="Meridian.Contracts.Domain.VenueCode" data-throw-if-not-resolved="false"></xref>).
  remarks: >-
    <p>

    The three symbol types form a strict hierarchy:

    </p>

    <ol><li><xref href="Meridian.Contracts.Domain.ProviderSymbol" data-throw-if-not-resolved="false"></xref> — raw, provider-scoped ticker (before mapping, e.g. <code>"AAPL.US"</code> from Stooq).</li><li><xref href="Meridian.Contracts.Domain.SymbolId" data-throw-if-not-resolved="false"></xref> — normalized ticker, provider-independent (e.g. <code>"AAPL"</code> after stripping exchange suffixes).</li><li><xref href="Meridian.Contracts.Domain.CanonicalSymbol" data-throw-if-not-resolved="false"></xref> — fully resolved, system-wide canonical symbol produced by the canonicalization pipeline.</li></ol>

    <p>

    Use this type on API boundaries and domain models instead of bare <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/reference-types">string</a>

    to make the compiler enforce that a symbol is never used where a provider ID or venue is expected.

    Equality and comparison are case-insensitive to match industry conventions.

    </p>
  example: []
  syntax:
    content: 'public readonly struct SymbolId : IEquatable<SymbolId>, IComparable<SymbolId>'
    content.vb: Public Structure SymbolId Implements IEquatable(Of SymbolId), IComparable(Of SymbolId)
