  assemblies:
  - Meridian.Backtesting.Sdk
  namespace: Meridian.Backtesting.Sdk.Strategies.AdvancedCarry
  summary: >-
    A carry-trade backtest strategy that supports three carry signal modes:


    <ul><li><xref href="Meridian.Backtesting.Sdk.Strategies.AdvancedCarry.YieldCarryMode.ClassicCarry" data-throw-if-not-resolved="false"></xref> — price-momentum carry (original behaviour).</li><li><xref href="Meridian.Backtesting.Sdk.Strategies.AdvancedCarry.YieldCarryMode.YieldSpread" data-throw-if-not-resolved="false"></xref> — long assets whose yield exceeds the risk-free rate;
            underweight or exclude low-spread assets.  The carry signal is entirely driven by
            <code>assetYield − riskFreeRate</code>.</li><li><xref href="Meridian.Backtesting.Sdk.Strategies.AdvancedCarry.YieldCarryMode.YieldRotation" data-throw-if-not-resolved="false"></xref> — ranks assets by current yield each period and
            rotates into the top-50 % yielders.  Applies an additional momentum tilt when an
            asset's implied yield has risen vs its 20-day average.</li></ul>

    Per-symbol yields can be provided explicitly (dividend yield, bond coupon rate, FX carry rate).

    When not provided the strategy estimates a proxy yield from rolling price history.
