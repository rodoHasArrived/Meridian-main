  namespace: Meridian.Execution.Margin
  summary: The margin requirement calculated for a single position or the whole portfolio.
  example: []
  syntax:
    content: public MarginRequirement(string? Symbol, decimal NotionalValue, decimal InitialMargin, decimal MaintenanceMargin, decimal ExcessLiquidity)
    parameters:
    - id: Symbol
      type: System.String
      description: Instrument symbol the requirement applies to, or <code>null</code> for portfolio-level.
    - id: NotionalValue
      type: System.Decimal
      description: Market value of the position used for the margin calculation.
    - id: InitialMargin
      type: System.Decimal
      description: Amount of capital required to open (or maintain during the session opening) the position.
    - id: MaintenanceMargin
      type: System.Decimal
      description: Minimum equity required to hold the position without triggering a margin call.
    - id: ExcessLiquidity
      type: System.Decimal
      description: >-
        Portfolio equity minus the maintenance margin requirement. Negative values indicate

        a margin-call situation.
