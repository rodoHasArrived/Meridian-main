  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Events
  summary: >-
    Domain event raised when an order fill is applied to the portfolio.

    Published by both paper-trading and live-execution paths so that

    downstream consumers (e.g. <xref href="Meridian.Execution.Events.LedgerPostingConsumer" data-throw-if-not-resolved="false"></xref>) can

    react without the portfolio holding a hard dependency on the ledger.
  example: []
  syntax:
    content: public TradeExecutedEvent(Guid FillId, string OrderId, string Symbol, OrderSide Side, long FilledQuantity, decimal FillPrice, decimal Commission, decimal RealizedPnl, decimal NewCash, DateTimeOffset OccurredAt, string? FinancialAccountId = null)
    parameters:
    - id: FillId
      type: System.Guid
      description: Unique identifier for the fill that triggered this event.
    - id: OrderId
      type: System.String
      description: The order that produced the fill.
    - id: Symbol
      type: System.String
      description: Instrument symbol.
    - id: Side
      type: Meridian.Execution.Sdk.OrderSide
      description: Buy or sell side.
    - id: FilledQuantity
      type: System.Int64
      description: Number of shares/contracts filled (always positive).
    - id: FillPrice
      type: System.Decimal
      description: Price at which the fill was executed.
    - id: Commission
      type: System.Decimal
      description: Brokerage commission charged on this fill.
    - id: RealizedPnl
      type: System.Decimal
      description: >-
        Realized P&amp;L produced by this fill (non-zero only when the fill closes or reduces

        an existing position).
    - id: NewCash
      type: System.Decimal
      description: Portfolio cash balance after applying the fill.
    - id: OccurredAt
      type: System.DateTimeOffset
      description: Wall-clock timestamp of the fill.
    - id: FinancialAccountId
      type: System.String
      description: >-
        Optional brokerage account ID. <code>null</code> when the portfolio operates on a single

        default account.
    content.vb: Public Sub New(FillId As Guid, OrderId As String, Symbol As String, Side As OrderSide, FilledQuantity As Long, FillPrice As Decimal, Commission As Decimal, RealizedPnl As Decimal, NewCash As Decimal, OccurredAt As DateTimeOffset, FinancialAccountId As String = Nothing)
