  summary: Root configuration model loaded from appsettings.json.
  example: []
  syntax:
    content: public AppConfig(string DataRoot = "data", bool? Compress = null, DataSourceKind DataSource = DataSourceKind.Synthetic, AlpacaOptions? Alpaca = null, IBOptions? IB = null, PolygonOptions? Polygon = null, StockSharpConfig? StockSharp = null, SyntheticMarketDataConfig? Synthetic = null, StorageConfig? Storage = null, SymbolConfig[]? Symbols = null, BackfillConfig? Backfill = null, SourceRegistryConfig? Sources = null, DataSourcesConfig? DataSources = null, ProviderConnectionsConfig? ProviderConnections = null, DerivativesConfig? Derivatives = null, ProviderRegistryConfig? ProviderRegistry = null, CoordinationConfig? Coordination = null, CanonicalizationConfig? Canonicalization = null, ValidationPipelineConfig? Validation = null, bool OfflineFirstMode = false, string? PluginsPath = null, bool CoLocationProfile = false)
    parameters:
    - id: DataRoot
      type: System.String
      description: Output directory root for storage sinks.
    - id: Compress
      type: System.Nullable{System.Boolean}
      description: Whether JSONL sinks should gzip. Null means use base configuration/default.
    - id: DataSource
      type: Meridian.Application.Config.DataSourceKind
      description: >-
        Market data provider selector:

        - <xref href="Meridian.Application.Config.DataSourceKind.IB" data-throw-if-not-resolved="false"></xref> uses Interactive Brokers via IMarketDataClient/IBMarketDataClient.

        - <xref href="Meridian.Application.Config.DataSourceKind.Alpaca" data-throw-if-not-resolved="false"></xref> uses Alpaca market data via WebSocket (trades; quotes optional in future).

        - <xref href="Meridian.Application.Config.DataSourceKind.StockSharp" data-throw-if-not-resolved="false"></xref> uses StockSharp connectors (Rithmic, IQFeed, CQG, IB, etc.).

        - <xref href="Meridian.Application.Config.DataSourceKind.NYSE" data-throw-if-not-resolved="false"></xref> uses the NYSE market data feed.

        - <xref href="Meridian.Application.Config.DataSourceKind.Synthetic" data-throw-if-not-resolved="false"></xref> uses the built-in synthetic historical/reference dataset for offline development.
    - id: Alpaca
      type: Meridian.Application.Config.AlpacaOptions
      description: Alpaca provider options (required if DataSource == DataSourceKind.Alpaca).
    - id: IB
      type: Meridian.Application.Config.IBOptions
      description: Interactive Brokers provider options (required if DataSource == DataSourceKind.IB).
    - id: Polygon
      type: Meridian.Application.Config.PolygonOptions
      description: Polygon provider options (required if DataSource == DataSourceKind.Polygon).
    - id: StockSharp
      type: Meridian.Application.Config.StockSharpConfig
      description: StockSharp connector configuration (required if DataSource == DataSourceKind.StockSharp).
    - id: Synthetic
      type: Meridian.Application.Config.SyntheticMarketDataConfig
      description: Synthetic market-data provider configuration for offline/backtest development.
    - id: Storage
      type: Meridian.Application.Config.StorageConfig
      description: Storage configuration options (naming convention, partitioning, etc.).
    - id: Symbols
      type: Meridian.Contracts.Configuration.SymbolConfig[]
      description: Symbol subscriptions.
    - id: Backfill
      type: Meridian.Application.Config.BackfillConfig
      description: Optional historical backfill defaults.
    - id: Sources
      type: Meridian.Application.Config.SourceRegistryConfig
      description: Source registry persistence path.
    - id: DataSources
      type: Meridian.Application.Config.DataSourcesConfig
      description: Multiple data source configurations for real-time and historical data.
    - id: ProviderConnections
      type: Meridian.Application.Config.ProviderConnectionsConfig
      description: Relationship-aware provider connections, bindings, policies, presets, and certifications.
    - id: Derivatives
      type: Meridian.Application.Config.DerivativesConfig
      description: Derivatives (options) data collection configuration.
    - id: ProviderRegistry
      type: Meridian.Application.Config.ProviderRegistryConfig
      description: Unified provider registry configuration controlling attribute-based discovery.
    - id: Coordination
      type: Meridian.Application.Config.CoordinationConfig
      description: Multi-instance coordination configuration.
    - id: Canonicalization
      type: Meridian.Application.Config.CanonicalizationConfig
      description: Canonicalization configuration for condition codes and venue MICs.
    - id: Validation
      type: Meridian.Application.Config.ValidationPipelineConfig
      description: Configuration for the F# validation pipeline stage.
    - id: OfflineFirstMode
      type: System.Boolean
      description: 'When true, enables air-gapped offline-first mode: backfill requests are queued and deferred until connectivity is restored. Default is false.'
    - id: PluginsPath
      type: System.String
      description: Optional directory path for loading external data source plugins. When set, plugins are loaded and registered dynamically.
    - id: CoLocationProfile
      type: System.Boolean
      description: 'When true, activates exchange colocation profile: low-latency GC settings and network tuning. Default is false.'
