  summary: >-
    Adjusts an open live position's quantity and cost basis to account for stock splits and

    dividends that occurred between <code>positionOpenedAt</code> and <code>asOf</code>.

    Implemented by <code>CorporateActionAdjustmentService</code> in <code>Meridian.Backtesting</code>.
