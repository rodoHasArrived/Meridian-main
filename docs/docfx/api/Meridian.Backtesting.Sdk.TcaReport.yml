  summary: >-
    Complete Transaction Cost Analysis (TCA) report generated after each simulation run.

    Contains aggregate cost attribution, per-symbol breakdowns, and outlier fills sorted

    by cost rate descending.
  example: []
  syntax:
    content: public TcaReport(DateTimeOffset GeneratedAtUtc, string? StrategyAssemblyPath, TcaCostSummary CostSummary, IReadOnlyList<SymbolTcaSummary> SymbolSummaries, IReadOnlyList<TcaFillOutlier> Outliers)
    parameters:
    - id: GeneratedAtUtc
      type: System.DateTimeOffset
      description: Wall-clock time when the report was produced.
    - id: StrategyAssemblyPath
      type: System.String
      description: >-
        Path to the strategy assembly, taken directly from <xref href="Meridian.Backtesting.Sdk.BacktestRequest.StrategyAssemblyPath" data-throw-if-not-resolved="false"></xref>.

        <code>null</code> when a strategy instance is injected directly.
    - id: CostSummary
      type: Meridian.Backtesting.Sdk.TcaCostSummary
      description: Run-level aggregate cost metrics.
    - id: SymbolSummaries
      type: System.Collections.Generic.IReadOnlyList{Meridian.Backtesting.Sdk.SymbolTcaSummary}
      description: Per-symbol cost breakdowns, ordered by total commission descending.
    - id: Outliers
      type: System.Collections.Generic.IReadOnlyList{Meridian.Backtesting.Sdk.TcaFillOutlier}
      description: Fills with commission rate &gt; 3× the run average, ordered by rate descending.
