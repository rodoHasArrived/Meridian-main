  summary: >-
    Returns the exchange rate from <code class="paramref">fromCurrency</code> to

    <code class="paramref">toCurrency</code> as of <code class="paramref">asOf</code>.
  example: []
  syntax:
    content: ValueTask<FxRate?> GetRateAsync(string fromCurrency, string toCurrency, DateTimeOffset asOf, CancellationToken ct = default)
    parameters:
    - id: fromCurrency
      type: System.String
      description: ISO 4217 source currency code (e.g., "EUR").
    - id: toCurrency
      type: System.String
      description: ISO 4217 target currency code (e.g., "USD").
    - id: asOf
      type: System.DateTimeOffset
      description: Point in time for the rate lookup.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.ValueTask{Meridian.Execution.MultiCurrency.FxRate}
