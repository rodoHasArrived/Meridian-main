  assemblies:
  - Meridian.Ui.Shared
  namespace: Meridian.Ui.Shared.Services
  summary: >-
    Extends the core BackfillCoordinator with preview functionality for UI applications.

    Wraps the core implementation and adds preview-specific methods.
  remarks: >-
    <p><b>Migration Note:</b> This class wraps the core implementation from

    <xref href="Meridian.Application.UI.BackfillCoordinator" data-throw-if-not-resolved="false"></xref> to add preview

    functionality while delegating core operations to the wrapped instance.</p>

    <p><b>Provider Discovery:</b> Uses <xref href="Meridian.Infrastructure.Adapters.Core.ProviderRegistry" data-throw-if-not-resolved="false"></xref> for unified

    provider discovery. If a registry is provided, backfill providers are discovered

    via <xref href="Meridian.Infrastructure.Adapters.Core.ProviderRegistry.GetBackfillProviders" data-throw-if-not-resolved="false"></xref>.</p>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Uses ProviderRegistry for unified provider discovery")]

      public sealed class BackfillCoordinator : IDisposable
    content.vb: >-
      <ImplementsAdr("ADR-001", "Uses ProviderRegistry for unified provider discovery")>

      Public NotInheritable Class BackfillCoordinator Implements IDisposable
