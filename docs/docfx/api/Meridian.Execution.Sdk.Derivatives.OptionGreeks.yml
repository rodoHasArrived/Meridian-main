  assemblies:
  - Meridian.Execution.Sdk
  namespace: Meridian.Execution.Sdk.Derivatives
  summary: >-
    A point-in-time snapshot of an option position's Greek sensitivities.

    All values are expressed in the standard "per share" convention;

    multiply by <xref href="Meridian.Execution.Sdk.Derivatives.OptionDetails.ContractMultiplier" data-throw-if-not-resolved="false"></xref> for the full contract impact.
  example: []
  syntax:
    content: public OptionGreeks(double Delta, double Gamma, double Theta, double Vega, double Rho, double ImpliedVolatility, DateTimeOffset AsOf)
    parameters:
    - id: Delta
      type: System.Double
      description: >-
        Rate of change of option price with respect to a $1 move in the underlying.

        Range: [−1, 0] for puts; [0, 1] for calls.
    - id: Gamma
      type: System.Double
      description: >-
        Rate of change of delta with respect to a $1 move in the underlying.

        Always positive for long options.
    - id: Theta
      type: System.Double
      description: Time decay per calendar day (negative for long positions; the option loses value daily).
    - id: Vega
      type: System.Double
      description: Sensitivity to a 1 % (100-basis-point) change in implied volatility.
    - id: Rho
      type: System.Double
      description: Sensitivity to a 1 % change in the risk-free interest rate.
    - id: ImpliedVolatility
      type: System.Double
      description: >-
        Implied annualized volatility derived from the current market price (decimal fraction;

        e.g., 0.25 = 25 %).
    - id: AsOf
      type: System.DateTimeOffset
      description: Timestamp of the Greeks snapshot.
    content.vb: Public Sub New(Delta As Double, Gamma As Double, Theta As Double, Vega As Double, Rho As Double, ImpliedVolatility As Double, AsOf As DateTimeOffset)
