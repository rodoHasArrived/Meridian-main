    id: TracedEventMetrics
    path: src/Meridian.Application/Tracing/TracedEventMetrics.cs
    startLine: 18
  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Tracing
  summary: >-
    Decorates an <xref href="Meridian.Application.Monitoring.IEventMetrics" data-throw-if-not-resolved="false"></xref> implementation with OpenTelemetry-compatible

    <xref href="System.Diagnostics.Metrics" data-throw-if-not-resolved="false"></xref> counters and histograms, enabling export to

    OTLP, Prometheus, or any configured metrics backend without modifying hot-path code.
  remarks: >-
    This decorator follows the same zero-allocation pattern as <xref href="Meridian.Application.Monitoring.DefaultEventMetrics" data-throw-if-not-resolved="false"></xref>.

    All counter increments use <xref href="System.Runtime.CompilerServices.MethodImplOptions.AggressiveInlining" data-throw-if-not-resolved="false"></xref>.

    The underlying <xref href="Meridian.Application.Monitoring.IEventMetrics" data-throw-if-not-resolved="false"></xref> is always called first to preserve existing behavior.
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-012", "OpenTelemetry metrics instrumentation for pipeline observability")]

      public sealed class TracedEventMetrics : IEventMetrics
    content.vb: >-
      <ImplementsAdr("ADR-012", "OpenTelemetry metrics instrumentation for pipeline observability")>

      Public NotInheritable Class TracedEventMetrics Implements IEventMetrics
