    discovers <code>[DataSource]</code>-decorated types, and registers them with the

    <xref href="Meridian.Infrastructure.DataSources.DataSourceRegistry" data-throw-if-not-resolved="false"></xref>. Assemblies that fail to load are skipped with a warning.
