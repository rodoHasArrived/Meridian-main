  namespace: Meridian.Execution.Margin
  summary: Calculates the aggregate portfolio-level margin requirement across all open positions.
  example: []
  syntax:
    content: MarginRequirement CalculatePortfolioRequirement(IReadOnlyDictionary<string, ExecutionPosition> positions, IReadOnlyDictionary<string, decimal> prices, decimal cash)
    parameters:
    - id: positions
      type: System.Collections.Generic.IReadOnlyDictionary{System.String,Meridian.Execution.Models.ExecutionPosition}
      description: All open positions in the portfolio.
    - id: prices
      type: System.Collections.Generic.IReadOnlyDictionary{System.String,System.Decimal}
      description: Current market prices keyed by symbol.
    - id: cash
      type: System.Decimal
      description: Available cash in the portfolio.
    return:
      type: Meridian.Execution.Margin.MarginRequirement
      description: A portfolio-level <xref href="Meridian.Execution.Margin.MarginRequirement" data-throw-if-not-resolved="false"></xref> (Symbol = null).
