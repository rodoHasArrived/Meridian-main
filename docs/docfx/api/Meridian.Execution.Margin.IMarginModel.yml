  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Margin
  summary: >-
    Calculates the margin requirement for a single position described by

    <code class="paramref">position</code>.
  example: []
  syntax:
    content: MarginRequirement CalculateForPosition(ExecutionPosition position, decimal lastPrice, decimal portfolioEquity)
    parameters:
    - id: position
      type: Meridian.Execution.Models.ExecutionPosition
      description: The position to evaluate.
    - id: lastPrice
      type: System.Decimal
      description: Current market price of the instrument.
    - id: portfolioEquity
      type: System.Decimal
      description: Current total portfolio equity (used for excess-liquidity calculation).
    return:
      type: Meridian.Execution.Margin.MarginRequirement
      description: A <xref href="Meridian.Execution.Margin.MarginRequirement" data-throw-if-not-resolved="false"></xref> for the position.
