    startLine: 22
  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Failover
  summary: >-
    A composite <xref href="Meridian.Infrastructure.IMarketDataClient" data-throw-if-not-resolved="false"></xref> that wraps multiple provider clients and

    automatically switches between them based on failover rules managed by

    <xref href="Meridian.Infrastructure.Adapters.Failover.StreamingFailoverService" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This client is transparent to callers — it implements <xref href="Meridian.Infrastructure.IMarketDataClient" data-throw-if-not-resolved="false"></xref>

    and delegates to whichever provider is currently active. When a failover event occurs,

    it disconnects the failed provider, connects the new one, and re-subscribes all active

    symbols.
  example: []
  syntax:
    content: >-
      [DataSource("failover", "Failover-Aware Streaming Client", DataSourceType.Realtime, DataSourceCategory.Aggregator, Priority = 50, EnabledByDefault = false, Description = "Composite failover client that switches between providers on failure")]

      [ImplementsAdr("ADR-001", "Failover-aware composite streaming client")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class FailoverAwareMarketDataClient : IMarketDataClient, IProviderMetadata, IAsyncDisposable
    content.vb: >-
      <DataSource("failover", "Failover-Aware Streaming Client", DataSourceType.Realtime, DataSourceCategory.Aggregator, Priority:=50, EnabledByDefault:=False, Description:="Composite failover client that switches between providers on failure")>

      <ImplementsAdr("ADR-001", "Failover-aware composite streaming client")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class FailoverAwareMarketDataClient Implements IMarketDataClient, IProviderMetadata, IAsyncDisposable
