  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.InteractiveBrokers
  summary: >-
    IB simulation client for development and testing without TWS/Gateway.

    Generates synthetic market data that mimics IB's data patterns.

    Activated when DataSource is "IB" and IBAPI is not compiled in.
  example: []
  syntax:
    content: >-
      [DataSource("ib-sim", "Interactive Brokers (Simulation)", DataSourceType.Realtime, DataSourceCategory.Broker, EnabledByDefault = false, Description = "Synthetic market data generator for IB development without TWS/Gateway")]

      [ImplementsAdr("ADR-001", "IB simulation client for non-IBAPI builds")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class IBSimulationClient : IMarketDataClient, IProviderMetadata, IAsyncDisposable
    content.vb: >-
      <DataSource("ib-sim", "Interactive Brokers (Simulation)", DataSourceType.Realtime, DataSourceCategory.Broker, EnabledByDefault:=False, Description:="Synthetic market data generator for IB development without TWS/Gateway")>

      <ImplementsAdr("ADR-001", "IB simulation client for non-IBAPI builds")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

