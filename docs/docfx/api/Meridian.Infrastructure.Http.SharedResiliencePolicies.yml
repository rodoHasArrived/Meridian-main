  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Http
  summary: >-
    Creates a circuit breaker policy to prevent cascading failures.

    Opens the circuit after consecutive failures and prevents requests for a duration.
  example: []
  syntax:
    content: public static IAsyncPolicy<HttpResponseMessage> GetCircuitBreakerPolicy(int failureThreshold = 5, TimeSpan? breakDuration = null, string? breakerName = null, Action<string, string, string?>? onStateChanged = null)
    parameters:
    - id: failureThreshold
      type: System.Int32
      description: 'Number of failures before opening circuit (default: 5).'
    - id: breakDuration
      type: System.Nullable{System.TimeSpan}
      description: 'How long circuit stays open (default: 30s).'
    - id: breakerName
      type: System.String
      description: Optional name used when reporting state transitions via <code class="paramref">onStateChanged</code>.
    - id: onStateChanged
      type: System.Action{System.String,System.String,System.String}
      description: >-
        Optional callback invoked on every state transition.

        Parameters: (breakerName, newState "Open"|"Closed"|"HalfOpen", lastError or null).
    return:
      type: Polly.IAsyncPolicy{System.Net.Http.HttpResponseMessage}
    content.vb: Public Shared Function GetCircuitBreakerPolicy(failureThreshold As Integer = 5, breakDuration As TimeSpan? = Nothing, breakerName As String = Nothing, onStateChanged As Action(Of String, String, String) = Nothing) As IAsyncPolicy(Of HttpResponseMessage)
