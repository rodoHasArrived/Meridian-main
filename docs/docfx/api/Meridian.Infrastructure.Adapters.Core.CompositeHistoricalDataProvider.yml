  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Composite provider that chains multiple data providers with automatic failover.

    Supports symbol resolution, provider health tracking, rate-limit aware rotation,

    and cross-provider validation.
  example: []
  syntax:
    content: >-
      [DataSource("composite", "Multi-Source (Auto-Failover)", DataSourceType.Historical, DataSourceCategory.Aggregator, Priority = 0, Description = "Composite provider with automatic failover across multiple historical data sources")]

      [ImplementsAdr("ADR-001", "Composite historical data provider with failover")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class CompositeHistoricalDataProvider : IHistoricalDataProvider, IProviderMetadata, IHistoricalAggregateBarProvider, IDisposable
    content.vb: >-
      <DataSource("composite", "Multi-Source (Auto-Failover)", DataSourceType.Historical, DataSourceCategory.Aggregator, Priority:=0, Description:="Composite provider with automatic failover across multiple historical data sources")>

      <ImplementsAdr("ADR-001", "Composite historical data provider with failover")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class CompositeHistoricalDataProvider Implements IHistoricalDataProvider, IProviderMetadata, IHistoricalAggregateBarProvider, IDisposable
