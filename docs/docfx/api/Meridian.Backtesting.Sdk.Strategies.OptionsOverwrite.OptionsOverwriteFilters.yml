    path: ../../src/Meridian.Backtesting.Sdk/Strategies/OptionsOverwrite/OptionsOverwriteFilters.cs
    startLine: 92
  assemblies:
  - Meridian.Backtesting.Sdk
  namespace: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite
  summary: >-
    Returns <code>true</code> when the candidate has elevated dividend-early-assignment risk

    and should therefore be <em>excluded</em>.


    <p>

    Applies only to American-style options where:


    <ol><li>Ex-dividend date is within <xref href="Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionsOverwriteParams.ExDivWindowDays" data-throw-if-not-resolved="false"></xref> days.</li><li>The option is in-the-money.</li><li>Remaining extrinsic value is less than the expected dividend amount — the rational holder
            will exercise to capture the dividend rather than sell the option.</li></ol>
    </p>
  example: []
  syntax:
    content: public static bool HasDividendAssignmentRisk(OptionCandidateInfo opt, OptionsOverwriteParams p)
    parameters:
    - id: opt
      type: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionCandidateInfo
