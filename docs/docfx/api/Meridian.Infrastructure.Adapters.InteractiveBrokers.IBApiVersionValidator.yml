    id: IBApiVersionValidator
    path: ../../src/Meridian.Infrastructure/Adapters/InteractiveBrokers/IBApiVersionValidator.cs
    startLine: 23
  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.InteractiveBrokers
  summary: >-
    Validates the IB API server and client library versions at startup.

    Throws <xref href="Meridian.Infrastructure.Adapters.InteractiveBrokers.IBApiVersionMismatchException" data-throw-if-not-resolved="false"></xref> when the connected TWS/Gateway

    server version is below the minimum required by Meridian, and logs a warning when

    the server version exceeds the highest version tested in CI.
  remarks: >-
    Version numbers used here are IB EClient/EWrapper "server version" integers exchanged

    during the initial TCP handshake (EClientSocket.ServerVersion after Connect).

    They are NOT the same as the human-readable TWS release numbers shown in the TWS

    title bar (e.g. "10.19").


    Meridian version compatibility:


    <table><tbody><tr><td class="term">Server version &lt; 70</td><td class="description">Not supported — missing reqTickByTickData, reqSmartComponents, and other modern API methods.</td></tr><tr><td class="term">70 – 178</td><td class="description">Supported and tested.</td></tr><tr><td class="term">&gt; 178</td><td class="description">Untested — Meridian will continue but log a warning.</td></tr></tbody></table>
  example: []
  syntax:
    content: public static class IBApiVersionValidator
    content.vb: Public Module IBApiVersionValidator
