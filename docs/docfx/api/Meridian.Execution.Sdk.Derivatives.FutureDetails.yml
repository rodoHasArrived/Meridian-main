  summary: Immutable specification for an exchange-traded futures contract.
  example: []
  syntax:
    content: public FutureDetails(string UnderlyingSymbol, DateOnly ContractMonth, decimal TickSize, decimal TickValue, decimal ContractMultiplier, string Exchange, string Currency = "USD")
    parameters:
    - id: UnderlyingSymbol
      type: System.String
      description: The root underlying (e.g., "ES" for E-mini S&amp;P 500).
    - id: ContractMonth
      type: System.DateOnly
      description: Delivery/expiry month (first day of delivery month convention).
    - id: TickSize
      type: System.Decimal
      description: Minimum price increment (e.g., 0.25 for ES).
    - id: TickValue
      type: System.Decimal
      description: Dollar value of one tick move (e.g., $12.50 for ES).
    - id: ContractMultiplier
      type: System.Decimal
      description: >-
        Dollar multiplier per point of underlying (e.g., $50 for ES).

        Relationship: TickValue = TickSize × ContractMultiplier.
    - id: Exchange
      type: System.String
      description: Exchange on which the contract is listed (e.g., "CME").
    - id: Currency
      type: System.String
      description: Settlement currency (e.g., "USD").
    content.vb: Public Sub New(UnderlyingSymbol As String, ContractMonth As DateOnly, TickSize As Decimal, TickValue As Decimal, ContractMultiplier As Decimal, Exchange As String, Currency As String = "USD")
