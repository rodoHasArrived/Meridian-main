  summary: >-
    Projects cash flows for a strategy run by mapping its recorded

    <xref href="Meridian.Backtesting.Sdk.CashFlowEntry" data-throw-if-not-resolved="false"></xref> items through the F# <code>CashLadder.build</code> module,

    then returning a time-bucketed <xref href="Meridian.Contracts.Workstation.RunCashFlowSummary" data-throw-if-not-resolved="false"></xref>.
