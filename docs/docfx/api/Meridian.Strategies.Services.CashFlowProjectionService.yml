  assemblies:
  - Meridian.Strategies
  namespace: Meridian.Strategies.Services
  summary: >-
    Returns a cash-flow projection for the run identified by <code class="paramref">runId</code>,

    or <code>null</code> when no run with that id exists.
  example: []
  syntax:
    content: public Task<RunCashFlowSummary?> GetAsync(string runId, DateTimeOffset? asOf = null, string? currency = null, int? bucketDays = null, CancellationToken ct = default)
    parameters:
    - id: runId
      type: System.String
      description: The strategy run identifier.
    - id: asOf
      type: System.Nullable{System.DateTimeOffset}
      description: >-
        The projection reference date. Only cash flows on or after this date appear in the

        bucketed ladder. Defaults to the run's <code>StartedAt</code> timestamp when <code>null</code>.
    - id: currency
      type: System.String
      description: Currency filter applied to the ladder. Defaults to <code>"USD"</code>.
    - id: bucketDays
      type: System.Nullable{System.Int32}
      description: Width of each time bucket in days. Defaults to 7.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{Meridian.Contracts.Workstation.RunCashFlowSummary}
    content.vb: Public Function GetAsync(runId As String, asOf As DateTimeOffset? = Nothing, currency As String = Nothing, bucketDays As Integer? = Nothing, ct As CancellationToken = Nothing) As Task(Of RunCashFlowSummary)
