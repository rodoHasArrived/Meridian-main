  assemblies:
  - Meridian.Ledger
  namespace: Meridian.Ledger
  summary: >-
    Double-entry accounting ledger.

    Holds all <xref href="Meridian.Ledger.JournalEntry" data-throw-if-not-resolved="false"></xref> records posted during a run and provides

    account-balance queries, filtered journal views, and trial-balance summaries.
  remarks: >-
    <p>

    Every economic event (fill, commission, margin interest, transfers, etc.) is recorded as

    a balanced journal entry: the sum of debits always equals the sum of credits.

    </p>

    <p>

    Normal-balance rules followed here:


    <ul><li><span class="term">Asset / Expense</span>Debit-normal (debit increases, credit decreases).</li><li><span class="term">Liability / Equity / Revenue</span>Credit-normal (credit increases, debit decreases).</li></ul>

    </p>
  example: []
  syntax:
    content: 'public sealed class Ledger : IReadOnlyLedger'
    content.vb: Public NotInheritable Class Ledger Implements IReadOnlyLedger
