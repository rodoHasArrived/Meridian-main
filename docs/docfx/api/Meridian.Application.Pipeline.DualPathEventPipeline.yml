  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Pipeline
  summary: >-
    Creates a <xref href="Meridian.Application.Pipeline.DualPathEventPipeline" data-throw-if-not-resolved="false"></xref> that wraps an existing

    <xref href="Meridian.Application.Pipeline.EventPipeline" data-throw-if-not-resolved="false"></xref> slow path.
  example: []
  syntax:
    content: public DualPathEventPipeline(EventPipeline slowPath, SymbolTable symbolTable, int ringBufferCapacity = 4096, int batchDrainSize = 256, bool startConsumers = true, ILogger<DualPathEventPipeline>? logger = null)
    parameters:
    - id: slowPath
      type: Meridian.Application.Pipeline.EventPipeline
      description: >-
        The underlying <xref href="Meridian.Application.Pipeline.EventPipeline" data-throw-if-not-resolved="false"></xref> used for non-hot-path event types

        and as a fallback when ring buffers are full.

        The caller retains ownership and must dispose it separately after this pipeline.
    - id: symbolTable
      type: Meridian.Core.Performance.SymbolTable
      description: >-
        Shared symbol intern table.  Must be the same instance used by any callers

        that invoke <xref href="Meridian.Application.Pipeline.DualPathEventPipeline.TryPublishTrade(Meridian.Core.Performance.RawTradeEvent%40)" data-throw-if-not-resolved="false"></xref> / <xref href="Meridian.Application.Pipeline.DualPathEventPipeline.TryPublishQuote(Meridian.Core.Performance.RawQuoteEvent%40)" data-throw-if-not-resolved="false"></xref> directly.
    - id: ringBufferCapacity
      type: System.Int32
      description: >-
        Capacity of each ring buffer (one for trades, one for quotes).

        Rounded up to the next power of two. Default is 4 096 slots.
    - id: batchDrainSize
      type: System.Int32
      description: Maximum events drained per consumer iteration.  Default is 256.
    - id: startConsumers
      type: System.Boolean
      description: >-
        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> the background consumer tasks are not started.

        Intended for unit tests that need to inspect ring buffer state without a

        concurrent consumer draining it.  Defaults to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>.
    - id: logger
      type: Microsoft.Extensions.Logging.ILogger{Meridian.Application.Pipeline.DualPathEventPipeline}
      description: Optional logger.
    content.vb: Public Sub New(slowPath As EventPipeline, symbolTable As SymbolTable, ringBufferCapacity As Integer = 4096, batchDrainSize As Integer = 256, startConsumers As Boolean = True, logger As ILogger(Of DualPathEventPipeline) = Nothing)
