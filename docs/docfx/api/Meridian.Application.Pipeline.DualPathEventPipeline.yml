  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Pipeline
  summary: >-
    A dual-path event pipeline that routes high-volume <xref href="Meridian.Contracts.Domain.Enums.MarketEventType.Trade" data-throw-if-not-resolved="false"></xref>

    and <xref href="Meridian.Contracts.Domain.Enums.MarketEventType.BboQuote" data-throw-if-not-resolved="false"></xref> events through a zero-allocation hot path

    (struct ring buffer), while routing all other event types through the standard

    record-based <xref href="Meridian.Application.Pipeline.EventPipeline" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    <b>Hot path (Trade / BboQuote):</b>

    The producer extracts the essential fields into a <xref href="Meridian.Core.Performance.RawTradeEvent" data-throw-if-not-resolved="false"></xref> or

    <xref href="Meridian.Core.Performance.RawQuoteEvent" data-throw-if-not-resolved="false"></xref> struct and writes it into a pre-allocated

    <xref href="Meridian.Core.Performance.SpscRingBuffer%601" data-throw-if-not-resolved="false"></xref>.  No heap allocation occurs on the producer thread.

    A dedicated background consumer drains the ring buffer in batches, reconstructs

    <xref href="Meridian.Domain.Events.MarketEvent" data-throw-if-not-resolved="false"></xref> objects, and forwards them to the <xref href="Meridian.Application.Pipeline.EventPipeline" data-throw-if-not-resolved="false"></xref>

    slow path for storage.

    </p>

    <p>

    <b>Slow path (all other event types):</b>

    Events are passed directly to the underlying <xref href="Meridian.Application.Pipeline.EventPipeline" data-throw-if-not-resolved="false"></xref>, preserving

    all existing WAL, deduplication, and validation behaviour.

    </p>

    <p>

    <b>Zero-allocation producer API:</b>

    Callers that already construct structs without a <xref href="Meridian.Domain.Events.MarketEvent" data-throw-if-not-resolved="false"></xref> intermediary

    can call <xref href="Meridian.Application.Pipeline.DualPathEventPipeline.TryPublishTrade(Meridian.Core.Performance.RawTradeEvent%40)" data-throw-if-not-resolved="false"></xref> or <xref href="Meridian.Application.Pipeline.DualPathEventPipeline.TryPublishQuote(Meridian.Core.Performance.RawQuoteEvent%40)" data-throw-if-not-resolved="false"></xref> directly.

    These overloads bypass <xref href="Meridian.Domain.Events.MarketEvent" data-throw-if-not-resolved="false"></xref> allocation entirely.

    </p>

    <p>

    <b>Ring buffer full behaviour:</b>

    When a ring buffer is full the event falls back to the slow path to prevent data loss.

    </p>
  example: []
