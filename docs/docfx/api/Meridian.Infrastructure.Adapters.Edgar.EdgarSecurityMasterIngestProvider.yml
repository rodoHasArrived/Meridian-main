  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Edgar
  summary: >-
    Pages through the SEC EDGAR <code>company_tickers.json</code> endpoint and optionally enriches

    each record with submission-level metadata (SIC code, exchanges, state of incorporation)

    by fetching individual <code>/submissions/CIK{cik}.json</code> records.

    Yields <xref href="Meridian.Contracts.SecurityMaster.CreateSecurityRequest" data-throw-if-not-resolved="false"></xref> objects ready for Security Master bulk ingest.
  remarks: >-
    No API key is required — the SEC EDGAR API is freely accessible.

    The SEC asks callers to include a <code>User-Agent</code> header identifying the application and

    to respect the 10-request-per-second rate limit.

    See https://www.sec.gov/developer for guidance.
  example: []
