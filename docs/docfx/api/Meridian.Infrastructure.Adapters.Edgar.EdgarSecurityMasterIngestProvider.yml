  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Edgar
  summary: Fetches all companies from EDGAR and returns them as Security Master create-requests.
  example: []
  syntax:
    content: public Task<IReadOnlyList<CreateSecurityRequest>> FetchAllAsync(bool enrichWithSubmissions = false, IProgress<int>? progress = null, CancellationToken ct = default)
    parameters:
    - id: enrichWithSubmissions
      type: System.Boolean
      description: >-
        When <code>true</code>, each company's <code>/submissions/CIK*.json</code> record is fetched to

        populate SIC code, exchanges, and state-of-incorporation.  This is much slower (one

        extra HTTP call per company) and is disabled by default.
    - id: progress
      type: System.IProgress{System.Int32}
      description: Optional progress callback invoked after each processed page.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.IReadOnlyList{Meridian.Contracts.SecurityMaster.CreateSecurityRequest}}
      description: All matching companies as create-security requests.
