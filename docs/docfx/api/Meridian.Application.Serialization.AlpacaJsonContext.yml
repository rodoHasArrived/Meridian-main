  summary: >-
    Dedicated JSON context for Alpaca wire messages.


    NOTE: Alpaca payloads use both "T" and "t" keys in the same object.

    They must be parsed with case-sensitive matching to avoid source-generation

    property collisions.
  example: []
  syntax:
    content: >-
      [JsonSourceGenerationOptions(WriteIndented = false, PropertyNameCaseInsensitive = false, GenerationMode = JsonSourceGenerationMode.Default)]

      [JsonSerializable(typeof(AlpacaTradeMessage))]

      [JsonSerializable(typeof(AlpacaQuoteMessage))]

      [JsonSerializable(typeof(AlpacaMessage[]))]

      public class AlpacaJsonContext : JsonSerializerContext, IJsonTypeInfoResolver
    content.vb: >-
      <JsonSourceGenerationOptions(WriteIndented:=False, PropertyNameCaseInsensitive:=False, GenerationMode:=JsonSourceGenerationMode.Default)>

      <JsonSerializable(GetType(AlpacaTradeMessage))>

      <JsonSerializable(GetType(AlpacaQuoteMessage))>

      <JsonSerializable(GetType(AlpacaMessage()))>

