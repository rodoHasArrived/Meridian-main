  summary: >-
    Returns all active tickers for the given exchange / asset-type filter as

    <xref href="Meridian.Contracts.SecurityMaster.CreateSecurityRequest" data-throw-if-not-resolved="false"></xref> objects ready for Security Master bulk import.
  example: []
  syntax:
    content: public Task<IReadOnlyList<CreateSecurityRequest>> FetchAllAsync(string? exchange = null, string? assetType = null, IProgress<int>? progress = null, CancellationToken ct = default)
    parameters:
    - id: exchange
      type: System.String
      description: Optional MIC code (e.g. "XNAS", "XNYS"). When null all exchanges are included.
    - id: assetType
      type: System.String
      description: >-
        Optional Polygon asset type code (e.g. "CS" for common stock, "ETF").

        When null all asset types are included.
    - id: progress
      type: System.IProgress{System.Int32}
      description: Optional progress callback invoked after each fetched page.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.IReadOnlyList{Meridian.Contracts.SecurityMaster.CreateSecurityRequest}}
      description: All matching tickers as create-security requests.
