  assemblies:
  - Meridian.Core
  namespace: Meridian.Core.Performance
  summary: Lock-free, single-producer/single-consumer ring buffer backed by a pre-allocated array.
  remarks: >-
    <p>

    <b>No allocation occurs on <xref href="Meridian.Core.Performance.SpscRingBuffer%601.TryWrite(%600%40)" data-throw-if-not-resolved="false"></xref> or <xref href="Meridian.Core.Performance.SpscRingBuffer%601.TryRead(%600%40)" data-throw-if-not-resolved="false"></xref> calls</b> —

    the backing array is allocated once in the constructor. This makes the buffer suitable

    for the zero-allocation hot path that handles high-frequency trade and quote events.

    </p>

    <p>

    The buffer capacity is rounded up to the nearest power of two so index masking

    (<code>index &amp; _mask</code>) replaces the modulo operation on every slot access.

    </p>

    <p>

    <b>Thread-safety contract</b>: exactly one producer thread may call

    <xref href="Meridian.Core.Performance.SpscRingBuffer%601.TryWrite(%600%40)" data-throw-if-not-resolved="false"></xref>, and exactly one consumer thread may call

    <xref href="Meridian.Core.Performance.SpscRingBuffer%601.TryRead(%600%40)" data-throw-if-not-resolved="false"></xref> / <xref href="Meridian.Core.Performance.SpscRingBuffer%601.DrainTo(System.Span%7b%600%7d%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref>. Calling either method

    from more than one thread simultaneously violates this contract.

    </p>

    <p>

    Head and tail counters are placed in separate cache-line-padded structs to

    prevent false sharing between the producer and consumer CPU cores.

    </p>
