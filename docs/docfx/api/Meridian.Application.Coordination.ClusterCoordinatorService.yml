  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Coordination
  summary: >-
    Background service that maintains a single cluster coordinator via shared-storage lease competition.

    Acquires the <code>leader/cluster-coordinator</code> lease on startup and renews it while running.

    When the lease cannot be acquired or renewed, leadership is relinquished and the instance

    transitions to follower mode.
  remarks: >-
    Registered as both <xref href="Meridian.Application.Coordination.IClusterCoordinator" data-throw-if-not-resolved="false"></xref> (singleton) and a hosted service

    so that the election loop starts automatically with the application lifetime.
  example: []
  syntax:
    content: 'public sealed class ClusterCoordinatorService : BackgroundService, IHostedService, IDisposable, IClusterCoordinator'
    content.vb: Public NotInheritable Class ClusterCoordinatorService Inherits BackgroundService Implements IHostedService, IDisposable, IClusterCoordinator
