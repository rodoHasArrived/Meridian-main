    id: .ctor
    path: src/Meridian.Application/Backfill/BackfillRequest.cs
    startLine: 29
  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Backfill
  summary: Incoming request describing a historical backfill.
  example: []
  syntax:
    content: public BackfillRequest(string Provider, IReadOnlyList<string> Symbols, DateOnly? From = null, DateOnly? To = null, DataGranularity Granularity = DataGranularity.Daily, int? MaxConcurrentSymbols = null, IReadOnlyDictionary<string, int>? SymbolPriorities = null, bool ResumeFromCheckpoint = false)
    parameters:
    - id: Provider
      type: System.String
      description: The name of the historical data provider to use.
    - id: Symbols
      type: System.Collections.Generic.IReadOnlyList{System.String}
      description: Symbols to backfill.
    - id: From
      type: System.Nullable{System.DateOnly}
      description: Optional inclusive start date.
    - id: To
      type: System.Nullable{System.DateOnly}
      description: Optional inclusive end date.
    - id: Granularity
      type: Meridian.Infrastructure.Adapters.Core.DataGranularity
      description: Requested backfill granularity. Defaults to daily bars.
    - id: MaxConcurrentSymbols
      type: System.Nullable{System.Int32}
      description: >-
        Maximum number of symbols to process concurrently. Overrides the value from

        <xref href="Meridian.Application.Config.BackfillJobsConfig.MaxConcurrentRequests" data-throw-if-not-resolved="false"></xref> when set.
    - id: SymbolPriorities
      type: System.Collections.Generic.IReadOnlyDictionary{System.String,System.Int32}
      description: >-
        Optional per-symbol priority map; lower value means processed first.

        Keys are matched case-insensitively. Symbols not listed are treated as priority 0.
    - id: ResumeFromCheckpoint
      type: System.Boolean
      description: >-
        When <code>true</code> and a <xref href="Meridian.Application.Backfill.BackfillStatusStore" data-throw-if-not-resolved="false"></xref> is provided to

        <xref href="Meridian.Application.Backfill.HistoricalBackfillService" data-throw-if-not-resolved="false"></xref>, symbols that were successfully checkpointed

        in a previous run are skipped. Symbols with a checkpoint have their <xref href="Meridian.Application.Backfill.BackfillRequest.From" data-throw-if-not-resolved="false"></xref>

        date advanced to the day after the last recorded checkpoint date, reducing redundant

        work on restart.
    content.vb: Public Sub New(Provider As String, Symbols As IReadOnlyList(Of String), From As DateOnly? = Nothing, [To] As DateOnly? = Nothing, Granularity As DataGranularity = DataGranularity.Daily, MaxConcurrentSymbols As Integer? = Nothing, SymbolPriorities As IReadOnlyDictionary(Of String, Integer) = Nothing, ResumeFromCheckpoint As Boolean = False)
