  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Canonicalization
  summary: >-
    Thread-safe in-memory counters for canonicalization events.

    Integrates with <xref href="Meridian.Application.Monitoring.PrometheusMetrics" data-throw-if-not-resolved="false"></xref> for metric export.
  remarks: >-
    Register as a DI singleton via

    <code>services.AddSingleton&lt;ICanonicalizationMetrics, DefaultCanonicalizationMetrics&gt;()</code>

    to enable test isolation (mock injection) and avoid global static state.

    The legacy static <xref href="Meridian.Application.Canonicalization.CanonicalizationMetrics" data-throw-if-not-resolved="false"></xref> façade still exists for

    call sites that have not yet been migrated to DI.
  example: []
  syntax:
