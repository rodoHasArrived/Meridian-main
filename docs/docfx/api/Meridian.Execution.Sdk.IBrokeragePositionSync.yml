  assemblies:
  - Meridian.Execution.Sdk
  namespace: Meridian.Execution.Sdk
  summary: >-
    Provides read-only access to live positions and account summaries from a connected brokerage.

    Implement this interface on each <xref href="Meridian.Execution.Sdk.IBrokerageGateway" data-throw-if-not-resolved="false"></xref> that supports position queries.


    <p>

    Return types use primitive/value representations so that <code>Meridian.Execution.Sdk</code>

    has no dependency on <code>Meridian.Execution.Models</code> types.

    </p>
  example: []
  syntax:
    content: public interface IBrokeragePositionSync
    content.vb: Public Interface IBrokeragePositionSync
