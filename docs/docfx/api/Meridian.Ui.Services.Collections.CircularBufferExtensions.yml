    id: CalculatePercentageChange
    path: src/Meridian.Ui.Services/Collections/CircularBuffer.cs
    startLine: 290
  assemblies:
  - Meridian.Ui.Services
  namespace: Meridian.Ui.Services.Collections
  summary: Calculates the percentage change between two values at specified offsets from the newest element.
  remarks: >-
    Formula: ((toValue - fromValue) / fromValue) * 100

    Returns null if fromValue is zero to avoid division by zero.
  example: []
  syntax:
    content: public static double? CalculatePercentageChange(this CircularBuffer<double> buffer, int fromOffset, int toOffset)
    parameters:
    - id: buffer
      type: Meridian.Ui.Services.Collections.CircularBuffer{System.Double}
      description: The buffer to calculate percentage change for.
    - id: fromOffset
      type: System.Int32
      description: Offset of the base value from newest (1 = second newest).
    - id: toOffset
      type: System.Int32
      description: Offset of the comparison value from newest (0 = newest).
    return:
      type: System.Nullable{System.Double}
      description: The percentage change, or null if division by zero or insufficient data.
    content.vb: Public Shared Function CalculatePercentageChange(buffer As CircularBuffer(Of Double), fromOffset As Integer, toOffset As Integer) As Double?
  overload: Meridian.Ui.Services.Collections.CircularBufferExtensions.CalculatePercentageChange*
  nameWithType.vb: CircularBufferExtensions.CalculatePercentageChange(CircularBuffer(Of Double), Integer, Integer)
  fullName.vb: Meridian.Ui.Services.Collections.CircularBufferExtensions.CalculatePercentageChange(Meridian.Ui.Services.Collections.CircularBuffer(Of Double), Integer, Integer)
  name.vb: CalculatePercentageChange(CircularBuffer(Of Double), Integer, Integer)
