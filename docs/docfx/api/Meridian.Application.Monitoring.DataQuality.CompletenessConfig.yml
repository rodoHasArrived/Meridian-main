    path: ../../src/Meridian.Application/Monitoring/DataQuality/CompletenessScoreCalculator.cs
    startLine: 453
  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Monitoring.DataQuality
  summary: >-
    Enables automatic calibration of expected events per hour based on the

    observed event rate after the initial calibration window has elapsed.

    When enabled and no explicit liquidity profile has been registered for a

    symbol, the calculator will adjust its expectation to match the symbol's

    observed activity, preventing grossly incorrect scores for symbols whose

    actual rate differs from <xref href="Meridian.Application.Monitoring.DataQuality.CompletenessConfig.ExpectedEventsPerHour" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public bool EnableAutoCalibration { get; init; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property EnableAutoCalibration As Boolean
  overload: Meridian.Application.Monitoring.DataQuality.CompletenessConfig.EnableAutoCalibration*
