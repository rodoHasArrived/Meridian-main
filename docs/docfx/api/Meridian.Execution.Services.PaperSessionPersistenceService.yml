  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Services
  summary: >-
    Manages paper trading session lifecycle and persistence.

    Tracks session metadata, portfolio snapshots, and order history

    across session boundaries.
  remarks: >-
    When constructed with an <xref href="Meridian.Execution.Services.IPaperSessionStore" data-throw-if-not-resolved="false"></xref> all session

    metadata, fills, and order updates are written to durable storage.

    Call <xref href="Meridian.Execution.Services.PaperSessionPersistenceService.InitialiseAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> on startup to reload sessions and

    reconstruct portfolio state from the persisted fill log.

    Without a store the service falls back to in-memory operation and

    sessions are lost on process restart.
  example: []
