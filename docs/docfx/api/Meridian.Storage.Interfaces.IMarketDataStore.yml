  namespace: Meridian.Storage.Interfaces
  summary: >-
    Unified read abstraction over all stored market data.

    Replaces the fragmented query paths across <code>HistoricalDataQueryService</code>,

    <code>MemoryMappedJsonlReader</code>, <code>JsonlReplayer</code>, <code>StorageSearchService</code>,

    and <code>StorageCatalogService</code> with a single testable, optimised entry point.
