    path: ../../src/Meridian.Storage/Archival/WriteAheadLog.cs
    startLine: 985
  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Archival
  summary: >-
    Controls how the WAL behaves when corrupted records are detected during recovery.

    Defaults to <xref href="Meridian.Storage.Archival.WalCorruptionMode.Skip" data-throw-if-not-resolved="false"></xref> to preserve backwards compatibility.

    Set to <xref href="Meridian.Storage.Archival.WalCorruptionMode.Alert" data-throw-if-not-resolved="false"></xref> in production so monitoring systems are

    notified, or <xref href="Meridian.Storage.Archival.WalCorruptionMode.Halt" data-throw-if-not-resolved="false"></xref> to require manual operator review.
  example: []
  syntax:
    content: public WalCorruptionMode CorruptionMode { get; set; }
    parameters: []
    return:
      type: Meridian.Storage.Archival.WalCorruptionMode
    content.vb: Public Property CorruptionMode As WalCorruptionMode
  overload: Meridian.Storage.Archival.WalOptions.CorruptionMode*
