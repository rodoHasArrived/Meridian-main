  summary: >-
    Contract for a feature-oriented service registration module.

    Each implementation registers a cohesive set of services into the DI container,

    gated by the corresponding <xref href="Meridian.Application.Composition.CompositionOptions" data-throw-if-not-resolved="false"></xref> flags.
  remarks: >-
    Implementations are consumed by <xref href="Meridian.Application.Composition.ServiceCompositionRoot.AddMarketDataServices(Microsoft.Extensions.DependencyInjection.IServiceCollection%2cMeridian.Application.Composition.CompositionOptions)" data-throw-if-not-resolved="false"></xref>

    which delegates to each feature module in dependency order.
