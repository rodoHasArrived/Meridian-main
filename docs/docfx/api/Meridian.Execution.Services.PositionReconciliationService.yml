  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Services
  summary: >-
    Periodically reconciles live paper/brokerage portfolio positions against

    the positions reported by a connected <xref href="Meridian.Execution.Sdk.IBrokeragePositionSync" data-throw-if-not-resolved="false"></xref> provider.


    <p>

    Which provider is queried first is controlled by <xref href="Meridian.Execution.Services.PositionSyncOptions.ProviderPriority" data-throw-if-not-resolved="false"></xref>,

    allowing users to set <code>InteractiveBrokers</code> or <code>Alpaca</code> as the primary source.

    </p>
