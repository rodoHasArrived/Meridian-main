    path: ../../src/Meridian.Backtesting.Sdk/Strategies/OptionsOverwrite/CoveredCallOverwriteStrategy.cs
    startLine: 31
  assemblies:
  - Meridian.Backtesting.Sdk
  namespace: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite
  summary: Conservative covered-call (options overwrite) backtest strategy.
  remarks: >-
    <p>

    The strategy assumes the user already holds a long position in <xref href="Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.CoveredCallOverwriteStrategy.UnderlyingSymbol" data-throw-if-not-resolved="false"></xref>

    at the start of the backtest (either entered prior to the backtest window or at the first bar).

    On each trading day, it:


    <ol><li>Marks all open short-call positions to market using Black-Scholes.</li><li>Manages open positions (take-profit roll, delta-risk roll, dividend-risk roll, assignment at expiry).</li><li>When no short call is open and conditions are met, scans the option chain and sells the best candidate.</li></ol>

    </p>

    <p>

    <b>Option fills are simulated internally</b> rather than routed through the backtest engine's

    order system, because standard OHLCV bar data does not contain option chain snapshots.

    The underlying stock position <em>is</em> tracked via the engine (placed via

    <xref href="Meridian.Backtesting.Sdk.IBacktestContext.PlaceMarketOrder(System.String%2cSystem.Int64)" data-throw-if-not-resolved="false"></xref>).

    </p>

    <p>

    Provide an <xref href="Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.IOptionChainProvider" data-throw-if-not-resolved="false"></xref> implementation that returns

    <xref href="Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite.OptionCandidateInfo" data-throw-if-not-resolved="false"></xref> objects for each scan date.  A test double

    (e.g. a lambda-based stub) is sufficient for unit tests.

    </p>
