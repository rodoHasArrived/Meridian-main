  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Robinhood
  summary: >-
    Symbol search provider backed by Robinhood's public instruments API.

    No authentication required.
  remarks: >-
    Instruments search endpoint:

    GET https://api.robinhood.com/instruments/?query={symbol}
  example: []
  syntax:
    content: >-
      [DataSource("robinhood-symbols", "Robinhood (Symbol Search)", DataSourceType.Historical, DataSourceCategory.Free, Priority = 25, Description = "Symbol search via Robinhood's public instruments API")]

      [ImplementsAdr("ADR-001", "Robinhood symbol search provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class RobinhoodSymbolSearchProvider : BaseSymbolSearchProvider, IFilterableSymbolSearchProvider, ISymbolSearchProvider, IProviderMetadata, IDisposable
    content.vb: >-
      <DataSource("robinhood-symbols", "Robinhood (Symbol Search)", DataSourceType.Historical, DataSourceCategory.Free, Priority:=25, Description:="Symbol search via Robinhood's public instruments API")>

