      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class RobinhoodSymbolSearchProvider Inherits BaseSymbolSearchProvider Implements IFilterableSymbolSearchProvider, ISymbolSearchProvider, IProviderMetadata, IDisposable
