    path: ../../src/Meridian.Execution.Sdk/IPosition.cs
    startLine: 15
  assemblies:
  - Meridian.Execution.Sdk
  namespace: Meridian.Execution.Sdk
  summary: >-
    Cross-pillar abstraction for a position held in any portfolio — simulated (backtesting)

    or live (execution). Allows generic portfolio rendering, attribution, and reconciliation

    code to work with both <code>Meridian.Backtesting.Sdk.Position</code> and

    <code>Meridian.Execution.Models.ExecutionPosition</code> without branching on the concrete type.
  remarks: >-
    Adopt this interface wherever portfolio code currently branches on

    <code>is Position</code> or <code>is ExecutionPosition</code>.

    Default implementations of <xref href="Meridian.Execution.Sdk.IPosition.IsShort" data-throw-if-not-resolved="false"></xref>, <xref href="Meridian.Execution.Sdk.IPosition.AbsoluteQuantity" data-throw-if-not-resolved="false"></xref>,

    and <xref href="Meridian.Execution.Sdk.IPosition.NotionalValue(System.Decimal)" data-throw-if-not-resolved="false"></xref> are provided so concrete types that already expose

    equivalent members are not required to redeclare them.
  example: []
  syntax:
    content: public interface IPosition
    content.vb: Public Interface IPosition
  derivedClasses:
  - Meridian.Execution.Models.ExecutionPosition
  extensionMethods:
  - Meridian.Execution.Sdk.IPosition.Meridian.Execution.Sdk.PositionExtensions.ToDisplayTuple
