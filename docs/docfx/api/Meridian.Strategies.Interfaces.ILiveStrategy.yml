  assemblies:
  - Meridian.Strategies
  namespace: Meridian.Strategies.Interfaces
  summary: >-
    A strategy that can participate in both the backtest engine and live execution.

    Combines the <xref href="Meridian.Backtesting.Sdk.IBacktestStrategy" data-throw-if-not-resolved="false"></xref> replay callbacks with the

    <xref href="Meridian.Strategies.Interfaces.IStrategyLifecycle" data-throw-if-not-resolved="false"></xref> live-mode management contract.
  remarks: >-
    Not all strategies need live execution capability. Strategies that implement

    this interface are intended to support both backtesting and live execution,

    while strategies that only implement <xref href="Meridian.Backtesting.Sdk.IBacktestStrategy" data-throw-if-not-resolved="false"></xref> remain

    backtest-only.
  example: []
  syntax:
    content: 'public interface ILiveStrategy : IBacktestStrategy, IStrategyLifecycle'
    content.vb: Public Interface ILiveStrategy Inherits IBacktestStrategy, IStrategyLifecycle
