    startLine: 24
  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.SecurityMaster
  summary: >-
    Seeds the <xref href="Meridian.Contracts.Catalog.ICanonicalSymbolRegistry" data-throw-if-not-resolved="false"></xref> from the Security Master projection cache

    on startup, and maintains a reverse lookup from canonical ticker to security ID for

    per-event enrichment in the canonicalization pipeline.
  remarks: >-
    <p>

    This service is called by <xref href="Meridian.Application.SecurityMaster.SecurityMasterProjectionWarmupService" data-throw-if-not-resolved="false"></xref> after the

    projection cache has been populated.  It is safe to call <xref href="Meridian.Application.SecurityMaster.SecurityMasterCanonicalSymbolSeedService.SeedAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> multiple

    times (idempotent: the last call wins).

    </p>

    <p>

    The <xref href="Meridian.Application.SecurityMaster.SecurityMasterCanonicalSymbolSeedService.TryGetSecurityId(System.String)" data-throw-if-not-resolved="false"></xref> method is thread-safe and suitable for use in

    hot-path event processing.  It reads a volatile snapshot reference so it sees the most

    recent seed without any per-call locking.

    </p>
  example: []
  syntax:
