  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution
  summary: Checks whether <code class="paramref">symbol</code> resolves to an active security in the Security Master.
  example: []
  syntax:
    content: Task<SecurityMasterGateResult> CheckAsync(string symbol, CancellationToken ct = default)
    parameters:
    - id: symbol
      type: System.String
      description: Ticker or identifier to check.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{Meridian.Execution.SecurityMasterGateResult}
      description: >-
        <xref href="Meridian.Execution.SecurityMasterGateResult.IsApproved" data-throw-if-not-resolved="false"></xref> is <code>true</code> when the symbol resolves;

        <code>false</code> with a rejection <xref href="Meridian.Execution.SecurityMasterGateResult.Reason" data-throw-if-not-resolved="false"></xref> otherwise.
    content.vb: Function CheckAsync(symbol As String, ct As CancellationToken = Nothing) As Task(Of SecurityMasterGateResult)
