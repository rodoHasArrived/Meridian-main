  assemblies:
  - Meridian.Backtesting
  namespace: Meridian.Backtesting
  summary: >-
    Returns an adjusted <xref href="Meridian.Application.SecurityMaster.PositionCorporateActionAdjustment" data-throw-if-not-resolved="false"></xref> for the given position.

    If no corporate actions are found or the symbol cannot be resolved, returns an adjustment

    with the original values unchanged.
  example: []
  syntax:
    content: public Task<PositionCorporateActionAdjustment> AdjustPositionAsync(string ticker, decimal quantity, decimal costBasis, DateTimeOffset positionOpenedAt, CancellationToken ct = default)
    parameters:
    - id: ticker
      type: System.String
      description: Ticker symbol of the security.
    - id: quantity
      type: System.Decimal
      description: Current position quantity (positive for long, negative for short).
    - id: costBasis
      type: System.Decimal
      description: Current average cost basis per share.
    - id: positionOpenedAt
      type: System.DateTimeOffset
      description: Timestamp when the position was first opened (UTC).
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{Meridian.Application.SecurityMaster.PositionCorporateActionAdjustment}
    content.vb: Public Function AdjustPositionAsync(ticker As String, quantity As Decimal, costBasis As Decimal, positionOpenedAt As DateTimeOffset, ct As CancellationToken = Nothing) As Task(Of PositionCorporateActionAdjustment)
