  assemblies:
  - Meridian.Core
  namespace: Meridian.Core.Performance
  summary: >-
    Zero-allocation struct representation of a Best-Bid/Offer quote event for the hot path.

    Uses <xref href="System.Runtime.InteropServices.LayoutKind.Sequential" data-throw-if-not-resolved="false"></xref> for predictable memory layout in

    the <xref href="Meridian.Core.Performance.SpscRingBuffer%601" data-throw-if-not-resolved="false"></xref> backing array.
  remarks: >-
    The symbol is stored as a pre-computed integer ID from <xref href="Meridian.Core.Performance.SymbolTable" data-throw-if-not-resolved="false"></xref>

    to avoid string references on the producer thread.

    Mid-price and spread are intentionally omitted — they are derived fields that the

    consumer can recompute from bid/ask without extra storage.
  example: []
  syntax:
    content: public readonly struct RawQuoteEvent
    content.vb: Public Structure RawQuoteEvent
