  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Allocation
  summary: >-
    Allocates <code class="paramref">totalQuantity</code> shares/contracts of <code class="paramref">symbol</code>

    executed at <code class="paramref">fillPrice</code> across the slices defined in

    <code class="paramref">rule</code>.
  example: []
  syntax:
    content: AllocationResult Allocate(string symbol, long totalQuantity, decimal fillPrice, AllocationRule rule, DateTimeOffset allocatedAt)
    parameters:
    - id: symbol
      type: System.String
      description: Instrument symbol of the block trade.
    - id: totalQuantity
      type: System.Int64
      description: Unsigned quantity of the block (always positive; direction is implied by context).
    - id: fillPrice
      type: System.Decimal
      description: Execution price of the block trade.
    - id: rule
      type: Meridian.Execution.Allocation.AllocationRule
      description: The allocation rule that defines slice weights.
    - id: allocatedAt
      type: System.DateTimeOffset
      description: Timestamp of the block fill.
    return:
      type: Meridian.Execution.Allocation.AllocationResult
      description: An <xref href="Meridian.Execution.Allocation.AllocationResult" data-throw-if-not-resolved="false"></xref> containing the per-slice distribution.
    content.vb: Function Allocate(symbol As String, totalQuantity As Long, fillPrice As Decimal, rule As AllocationRule, allocatedAt As DateTimeOffset) As AllocationResult
