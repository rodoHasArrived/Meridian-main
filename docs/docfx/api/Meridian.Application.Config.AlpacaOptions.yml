  assemblies:
  - Meridian.Core
  namespace: Meridian.Application.Config
  summary: Alpaca Market Data configuration.
  remarks: >-
    <p><b>Authentication:</b> Uses Trading API keys with WebSocket message authentication.</p>

    <p><b>Security Best Practices:</b></p>

    <ul><li>Use environment variables: <code>ALPACA_KEY_ID</code>, <code>ALPACA_SECRET_KEY</code></li><li>Use a secure vault service (Azure Key Vault, AWS Secrets Manager, HashiCorp Vault)</li><li>Use .NET User Secrets for local development: <code>dotnet user-secrets</code></li><li>Ensure <code>appsettings.json</code> with real credentials is in <code>.gitignore</code></li></ul>

    <p>See <a href="https://docs.alpaca.markets/docs/real-time-stock-pricing-data">Alpaca Real-Time Data Docs</a></p>
