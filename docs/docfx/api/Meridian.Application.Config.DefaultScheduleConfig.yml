    - id: Symbols
      type: System.String[]
      description: Symbols to backfill (empty = use default symbols).
    - id: LookbackDays
      type: System.Int32
      description: Number of days to look back for gaps.
    - id: Enabled
      type: System.Boolean
      description: Whether the schedule is enabled.
