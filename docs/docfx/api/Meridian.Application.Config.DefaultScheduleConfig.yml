    content: public DefaultScheduleConfig(string Name, string? Preset = null, string? CronExpression = null, string[]? Symbols = null, int LookbackDays = 30, bool Enabled = true)
    parameters:
    - id: Name
      type: System.String
      description: Schedule name.
    - id: Preset
      type: System.String
      description: 'Preset to use: "daily", "weekly", "eod", "monthly".'
    - id: CronExpression
      type: System.String
