  assemblies:
  - Meridian.Backtesting.Sdk
  namespace: Meridian.Backtesting.Sdk
  summary: >-
    Context object passed to every strategy callback. Provides read-only portfolio state

    and order submission methods. All order methods are fire-and-forget within the same

    simulated tick; fills are delivered via <xref href="Meridian.Backtesting.Sdk.IBacktestStrategy.OnOrderFill(Meridian.Backtesting.Sdk.FillEvent%2cMeridian.Backtesting.Sdk.IBacktestContext)" data-throw-if-not-resolved="false"></xref>.
