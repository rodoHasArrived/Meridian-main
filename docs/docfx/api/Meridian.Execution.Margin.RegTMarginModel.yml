  - Meridian.Execution
  namespace: Meridian.Execution.Margin
  summary: Initialises a Reg T model with the standard FINRA/SEC defaults or custom rates.
  example: []
  syntax:
    content: public RegTMarginModel(decimal longInitialRate = 0.50, decimal longMaintenanceRate = 0.25, decimal shortInitialRate = 1.50, decimal shortMaintenanceRate = 1.30)
    parameters:
    - id: longInitialRate
      type: System.Decimal
      description: Initial margin rate for long positions. Defaults to 0.50 (50 %).
    - id: longMaintenanceRate
      type: System.Decimal
      description: Maintenance margin rate for long positions. Defaults to 0.25 (25 %).
    - id: shortInitialRate
      type: System.Decimal
      description: >-
        Initial margin rate for short positions expressed as a fraction of notional.

        Defaults to 1.50 (150 % — the broker retains the proceeds plus 50 %).
    - id: shortMaintenanceRate
      type: System.Decimal
      description: Maintenance margin rate for short positions. Defaults to 1.30 (130 %).
    content.vb: Public Sub New(longInitialRate As Decimal = 0.50, longMaintenanceRate As Decimal = 0.25, shortInitialRate As Decimal = 1.50, shortMaintenanceRate As Decimal = 1.30)
