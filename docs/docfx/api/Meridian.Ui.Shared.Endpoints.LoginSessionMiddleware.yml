  assemblies:
  - Meridian.Ui.Shared
  namespace: Meridian.Ui.Shared.Endpoints
  summary: >-
    Middleware that enforces session-based authentication.


    <ul><li>Health probes (/healthz, /readyz, /livez) are always exempt.</li><li>The login page (/login) and auth API endpoints (/api/auth/*) are exempt when authentication is configured.</li><li>Unauthenticated API requests receive a 401 JSON response.</li><li>Unauthenticated browser (non-/api) requests are redirected to /login.</li><li>Authentication is optional in Development/Test and required elsewhere by default.</li></ul>
