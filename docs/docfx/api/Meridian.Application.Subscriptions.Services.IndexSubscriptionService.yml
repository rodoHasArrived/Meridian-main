  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Subscriptions.Services
  summary: Service for auto-subscribing to index components.
  remarks: >-
    <p><b>Current Implementation:</b> Uses built-in static index component data for major indices

    (SPX, NDX, DJI, RUT, MID). This data is suitable for development and testing.</p>

    <p><b>Production Enhancement:</b> For production use with real-time index rebalancing,

    implement an external API integration (e.g., S&amp;P Global, NASDAQ, IEX Cloud) by extending

    <xref href="Meridian.Application.Subscriptions.Services.IndexSubscriptionService.GetIndexComponentsAsync(System.String%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> to fetch live constituent data.</p>
