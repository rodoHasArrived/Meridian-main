    id: ConfigurationService
    path: src/Meridian.Application/Services/ConfigurationService.cs
    startLine: 36
  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Services
  summary: >-
    Unified configuration service that consolidates all configuration-related operations.

    This is the single entry point for wizard, auto-config, validation, provider detection,

    credential resolution, self-healing fixes, and hot reload.
  remarks: >-
    <p><b>Consolidation Goal:</b> All CLI paths and UI workflows should route through this

    service to eliminate duplicate validation and environment detection logic.</p>

    <p><b>Key Responsibilities:</b></p>

    <ul><li>Provider detection and enumeration</li><li>Credential resolution from environment variables and config</li><li>Configuration validation with detailed error reporting</li><li>Self-healing fixes for common configuration issues</li><li>Configuration hot reload monitoring</li><li>Unified pipeline producing ValidatedConfig from any entry point</li></ul>
  example: []
  syntax:
