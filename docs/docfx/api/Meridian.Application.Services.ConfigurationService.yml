  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Services
  summary: >-
    Applies self-healing fixes to a configuration and returns the fixed config

    along with lists of applied fixes and advisory warnings.
  example: []
  syntax:
    content: public (AppConfig Config, IReadOnlyList<string> AppliedFixes, IReadOnlyList<string> Warnings) ApplySelfHealingFixes(AppConfig config, SelfHealingStrictness strictness = SelfHealingStrictness.Development)
    parameters:
    - id: config
      type: Meridian.Application.Config.AppConfig
      description: The configuration to fix.
    - id: strictness
      type: Meridian.Application.Config.SelfHealingStrictness
      description: >-
        Controls which fixes are applied.

        <xref href="Meridian.Application.Config.SelfHealingStrictness.Development" data-throw-if-not-resolved="false"></xref> (default) applies all fixes and logs

        significant (<xref href="Meridian.Application.Config.SelfHealingSeverity.Warn" data-throw-if-not-resolved="false"></xref>) ones as warnings.

        <xref href="Meridian.Application.Config.SelfHealingStrictness.Production" data-throw-if-not-resolved="false"></xref> applies only safe

        (<xref href="Meridian.Application.Config.SelfHealingSeverity.AutoFix" data-throw-if-not-resolved="false"></xref>) changes and leaves

        <xref href="Meridian.Application.Config.SelfHealingSeverity.Warn" data-throw-if-not-resolved="false"></xref>-level fixes unapplied.
    return:
      type: System.ValueTuple{Meridian.Application.Config.AppConfig,System.Collections.Generic.IReadOnlyList{System.String},System.Collections.Generic.IReadOnlyList{System.String}}
    content.vb: Public Function ApplySelfHealingFixes(config As AppConfig, strictness As SelfHealingStrictness = SelfHealingStrictness.Development) As (Config As AppConfig, AppliedFixes As IReadOnlyList(Of String), Warnings As IReadOnlyList(Of String))
  overload: Meridian.Application.Services.ConfigurationService.ApplySelfHealingFixes*
