  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Composition
  summary: >-
    Adapter interface for host-specific behavior.

    Each host type (console, web, desktop) can customize endpoint exposure

    while sharing the same service graph from <xref href="Meridian.Application.Composition.ServiceCompositionRoot" data-throw-if-not-resolved="false"></xref>

    and the same startup abstractions used by <xref href="Meridian.Application.Composition.HostStartup" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Host adapters for mode-specific behavior")]

      public interface IHostAdapter
    content.vb: >-
      <ImplementsAdr("ADR-001", "Host adapters for mode-specific behavior")>

      Public Interface IHostAdapter
  derivedClasses:
