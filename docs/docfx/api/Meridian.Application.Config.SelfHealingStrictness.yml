  namespace: Meridian.Application.Config
  summary: >-
    All self-healing fixes are applied.  <xref href="Meridian.Application.Config.SelfHealingSeverity.Warn" data-throw-if-not-resolved="false"></xref>-level

    changes are applied but logged as <code>Warning</code>.  Suitable for local development

    and CI environments where operator attention is not required for every startup.
  example: []
  syntax:
    content: Development = 0
    return:
      type: Meridian.Application.Config.SelfHealingStrictness
- uid: Meridian.Application.Config.SelfHealingStrictness.Production
