  source:
    remote:
      path: src/Meridian.Application/Config/ConfigurationPipeline.cs
      branch: main
      repo: https://github.com/rodoHasArrived/Meridian-main.git
    id: Production
    path: src/Meridian.Application/Config/ConfigurationPipeline.cs
    startLine: 945
  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Config
  summary: >-
    Only safe cosmetic fixes (<xref href="Meridian.Application.Config.SelfHealingSeverity.AutoFix" data-throw-if-not-resolved="false"></xref>) are applied

    silently.  <xref href="Meridian.Application.Config.SelfHealingSeverity.Warn" data-throw-if-not-resolved="false"></xref>-level fixes are <b>refused</b>

    and surfaced as validation errors so that the process cannot start until a human

    corrects the configuration.  Use <code>MDC_CONFIG_STRICTNESS=production</code> to enable.
  example: []
  syntax:
    content: Production = 1
    return:
      type: Meridian.Application.Config.SelfHealingStrictness
