  namespace: Meridian.Infrastructure.Adapters.InteractiveBrokers
  summary: >-
    Stub IB historical data provider for non-IBAPI builds.

    Registers in the provider list so users can see IB is available but requires IBAPI.
  example: []
  syntax:
    content: >-
      [DataSource("ibkr", "Interactive Brokers", DataSourceType.Historical, DataSourceCategory.Broker, Priority = 80, Description = "Stub provider — build with IBAPI to enable real IB historical data")]

      [ImplementsAdr("ADR-001", "Interactive Brokers historical data provider stub")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class IBHistoricalDataProvider : IHistoricalDataProvider, IProviderMetadata, IDisposable
    content.vb: >-
      <DataSource("ibkr", "Interactive Brokers", DataSourceType.Historical, DataSourceCategory.Broker, Priority:=80, Description:="Stub provider — build with IBAPI to enable real IB historical data")>

      <ImplementsAdr("ADR-001", "Interactive Brokers historical data provider stub")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class IBHistoricalDataProvider Implements IHistoricalDataProvider, IProviderMetadata, IDisposable
