    content: public FSharpEventValidator(SymbolConfig[]? symbolConfigs = null, bool useRealTimeMode = false, ILogger<FSharpEventValidator>? logger = null)
    parameters:
    - id: symbolConfigs
      type: Meridian.Contracts.Configuration.SymbolConfig[]
      description: >-
        Optional array of configured symbols. Symbols with <code>UseRelaxedValidation = true</code>

        are validated with the lenient historical preset instead of the default preset.
    - id: useRealTimeMode
      type: System.Boolean
      description: >-
        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, the strict real-time preset is applied for non-relaxed symbols

        (5-second max timestamp age). When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> (default), the standard default

        preset is used (5-minute max timestamp age).
    - id: logger
