  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Pipeline
  summary: >-
    Validates <xref href="Meridian.Domain.Events.MarketEvent" data-throw-if-not-resolved="false"></xref> instances by delegating to the F# Railway-Oriented

    validation pipeline (<code>Meridian.FSharp.Validation</code>).
  remarks: >-
    <p>Trade and BBO-quote events are validated against the F# validators.

    All other event types (L2 snapshots, order-flow, integrity, heartbeat, historical bars, etc.)

    pass through unconditionally — only data that was produced in real-time from a provider

    carries the invariants the validators check.</p>


    <p>Per-symbol relaxation is opt-in: add <code>"UseRelaxedValidation": true</code> to a symbol's

    entry in <code>appsettings.json</code> to apply the historical (lenient) F# preset — useful for

    illiquid instruments, preferreds, or wide-spread options where the default 5-minute timestamp

    window or strict spread check would produce excessive false positives.</p>


    <p>Validation outcomes are tracked by <xref href="Meridian.Application.Monitoring.ValidationMetrics" data-throw-if-not-resolved="false"></xref> and exported to

    Prometheus via <xref href="Meridian.Application.Monitoring.PrometheusMetrics" data-throw-if-not-resolved="false"></xref> on the periodic update cycle.</p>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-007", "F# validation gate before WAL/sink persistence")]

      public sealed class FSharpEventValidator : IEventValidator
    content.vb: >-
      <ImplementsAdr("ADR-007", "F# validation gate before WAL/sink persistence")>

      Public NotInheritable Class FSharpEventValidator Implements IEventValidator
