  summary: >-
    Default canonicalization implementation that resolves symbols, maps condition codes,

    and normalizes venue identifiers using in-memory lookup tables.

    Follows the <code>with</code> expression pattern established by <xref href="Meridian.Domain.Events.MarketEvent.StampReceiveTime(System.Nullable%7bSystem.DateTimeOffset%7d)" data-throw-if-not-resolved="false"></xref>.
