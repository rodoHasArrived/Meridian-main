  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Http
  summary: >-
    Registers all named HttpClient configurations with circuit breaker state-change reporting.

    Each HTTP circuit breaker calls <code class="paramref">onStateChanged</code> when it transitions state,

    enabling the <code>CircuitBreakerStatusService</code> to surface breaker health in the dashboard.
  example: []
  syntax:
    content: public static IServiceCollection AddMarketDataHttpClientsTracked(this IServiceCollection services, Action<string, string, string?> onStateChanged)
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection to configure.
    - id: onStateChanged
      type: System.Action{System.String,System.String,System.String}
      description: >-
        Callback invoked on every circuit breaker state transition.

        Parameters: (breakerName, newState "Open"|"Closed"|"HalfOpen", lastError or null).
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
    content.vb: Public Shared Function AddMarketDataHttpClientsTracked(services As IServiceCollection, onStateChanged As Action(Of String, String, String)) As IServiceCollection
