  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Config.Credentials
  summary: >-
    Centralized credential resolver for all market data providers.

    Resolves credentials from multiple sources with environment variables taking precedence.
  remarks: >-
    <p><b>Resolution Order (first match wins):</b></p>

    <ol><li>Environment variables (recommended for production)</li><li>Secrets file (for local development)</li><li>Configuration file (not recommended for sensitive data)</li></ol>

    <p><b>Environment Variables:</b></p>

    <ul><li>ALPACA_KEY_ID, ALPACA_SECRET_KEY - Alpaca Markets</li><li>POLYGON_API_KEY - Polygon.io</li><li>TIINGO_API_TOKEN - Tiingo</li><li>FINNHUB_API_KEY - Finnhub</li><li>ALPHA_VANTAGE_API_KEY - Alpha Vantage</li><li>FRED_API_KEY - FRED Economic Data</li><li>NASDAQ_API_KEY - Nasdaq Data Link</li><li>OPENFIGI_API_KEY - OpenFIGI</li><li>NYSE_API_KEY, NYSE_API_SECRET, NYSE_CLIENT_ID - NYSE</li><li>RABBITMQ_USERNAME, RABBITMQ_PASSWORD - RabbitMQ</li><li>AZURE_SERVICEBUS_CONNECTION_STRING - Azure Service Bus</li></ul>
