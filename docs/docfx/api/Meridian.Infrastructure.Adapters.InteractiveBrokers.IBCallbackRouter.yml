  namespace: Meridian.Infrastructure.Adapters.InteractiveBrokers
  summary: >-
    Handles an IB tickOptionComputation callback (tickType 10=Bid, 11=Ask, 12=Last, 13=Model).

    Only model ticks (tickType == 13) are used to populate greeks — bid/ask/last option computation

    ticks use the same IB callback but carry less reliable IV/greeks values.
  example: []
  syntax:
    content: public void OnTickOptionComputation(int tickerId, int tickType, double impliedVol, double delta, double optPrice, double pvDividend, double gamma, double vega, double theta, double undPrice)
    parameters:
    - id: tickerId
      type: System.Int32
      description: The IB request id that identifies the option contract.
    - id: tickType
      type: System.Int32
      description: 'IB tick type: 10=BidOption, 11=AskOption, 12=LastOption, 13=ModelOption.'
    - id: impliedVol
      type: System.Double
      description: Implied volatility (IB transmits -1 when not available).
    - id: delta
      type: System.Double
      description: Option delta (-1 to +1; IB transmits -2 when not available).
    - id: optPrice
      type: System.Double
      description: Option price; IB transmits -1 when not available.
    - id: pvDividend
      type: System.Double
      description: Present value of dividends expected before expiry.
    - id: gamma
      type: System.Double
      description: Option gamma; IB transmits -2 when not available.
    - id: vega
      type: System.Double
      description: Option vega; IB transmits -2 when not available.
    - id: theta
      type: System.Double
      description: Option theta; IB transmits -2 when not available.
    - id: undPrice
      type: System.Double
      description: Underlying price at time of computation; IB transmits -1 when not available.
    content.vb: Public Sub OnTickOptionComputation(tickerId As Integer, tickType As Integer, impliedVol As Double, delta As Double, optPrice As Double, pvDividend As Double, gamma As Double, vega As Double, theta As Double, undPrice As Double)
