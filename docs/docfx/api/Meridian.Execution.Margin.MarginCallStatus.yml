  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Margin
  summary: >-
    Captures the current margin health for one account at a given point in time.

    Returned by <xref href="Meridian.Execution.Services.PaperTradingPortfolio.CheckMarginStatus(System.String%2cSystem.Collections.Generic.IReadOnlyDictionary%7bSystem.String%2cSystem.Decimal%7d)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public MarginCallStatus(string AccountId, MarginRequirement PortfolioRequirement, IReadOnlyList<MarginRequirement> PositionRequirements, bool IsMarginCall, decimal MarginDeficiency)
    parameters:
    - id: AccountId
      type: System.String
      description: The account that was evaluated.
    - id: PortfolioRequirement
      type: Meridian.Execution.Margin.MarginRequirement
      description: Aggregate margin requirement across all open positions in the account.
    - id: PositionRequirements
      type: System.Collections.Generic.IReadOnlyList{Meridian.Execution.Margin.MarginRequirement}
      description: >-
        Per-symbol margin requirements.

        Empty when the account has no open positions or no margin model is active.
    - id: IsMarginCall
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> when the portfolio maintenance margin exceeds the account equity,

        meaning the broker would issue a margin call.
    - id: MarginDeficiency
      type: System.Decimal
      description: >-
        The shortfall amount when <code class="paramref">IsMarginCall</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>;

        otherwise 0.  This is the cash amount the account holder must deposit to restore the

        account to compliance.
    content.vb: Public Sub New(AccountId As String, PortfolioRequirement As MarginRequirement, PositionRequirements As IReadOnlyList(Of MarginRequirement), IsMarginCall As Boolean, MarginDeficiency As Decimal)
