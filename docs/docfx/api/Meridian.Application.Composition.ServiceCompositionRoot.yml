  namespace: Meridian.Application.Composition
  summary: >-
    Initializes the circuit breaker callback router with the built service provider.

    Call this once after the DI container is built (i.e., after <code>WebApplication.Build()</code>

    or <code>ServiceCollection.BuildServiceProvider()</code>) to connect Polly state-change

    callbacks to <xref href="Meridian.Application.Monitoring.CircuitBreakerStatusService" data-throw-if-not-resolved="false"></xref>.
