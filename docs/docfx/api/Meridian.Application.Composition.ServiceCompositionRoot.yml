  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Composition
  summary: >-
    Centralizes all shared service registration for the application.

    This composition root is consumed by <xref href="Meridian.Application.Composition.HostStartup" data-throw-if-not-resolved="false"></xref>, <xref href="Meridian.Application.Composition.HostBuilder" data-throw-if-not-resolved="false"></xref>,

    and the extracted startup orchestration layer so every host mode builds from the same graph.
  remarks: >-
    <p><b>Design Philosophy:</b></p>

    <ul><li>Single source of truth for service registration</li><li>Host-agnostic core services shared across console, web, desktop, and MCP hosts</li><li>Canonical <xref href="Meridian.Application.Composition.CompositionOptions" data-throw-if-not-resolved="false"></xref> presets select optional capabilities</li><li>Feature registration delegated to <xref href="Meridian.Application.Composition.Features.IServiceFeatureRegistration" data-throw-if-not-resolved="false"></xref> modules</li></ul>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Centralized composition root for service configuration")]

      public static class ServiceCompositionRoot
