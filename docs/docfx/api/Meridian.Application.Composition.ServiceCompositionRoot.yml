  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Composition
  summary: >-
    Registers all core services required by any host type.

    This is the minimum set of services needed for the application to function.
  remarks: >-
    <p><b>Service Registration Order:</b></p>

    <ol><li>Core configuration services (always required)</li><li>Storage services (always required)</li><li>Credential services (before providers for credential resolution)</li><li>Provider services (ProviderRegistry, ProviderFactory - before dependent services)</li><li>Symbol management services (depends on ProviderFactory/Registry)</li><li>Backfill services (depends on ProviderRegistry/Factory)</li><li>Other services (maintenance, diagnostic, pipeline, collector)</li></ol>
  example: []
  syntax:
    content: public static IServiceCollection AddMarketDataServices(this IServiceCollection services, CompositionOptions? options = null)
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection to configure.
    - id: options
      type: Meridian.Application.Composition.CompositionOptions
      description: Composition options controlling which services to register.
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The configured service collection for chaining.
    content.vb: Public Shared Function AddMarketDataServices(services As IServiceCollection, options As CompositionOptions = Nothing) As IServiceCollection
