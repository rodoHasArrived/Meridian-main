  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Fred
  summary: >-
    Historical provider for FRED economic time series.

    FRED observations are normalized into synthetic daily bars where OHLC are all equal to the observation value.
  example: []
  syntax:
    content: >-
      [DataSource("fred", "FRED Economic Data", DataSourceType.Historical, DataSourceCategory.Free, Priority = 28, Description = "Federal Reserve Economic Data time series mapped to synthetic daily bars")]

      [ImplementsAdr("ADR-001", "FRED historical provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      [RequiresCredential("FRED_API_KEY", EnvironmentVariables = new string[] { "FRED_API_KEY", "FRED__APIKEY" }, DisplayName = "API Key", Description = "FRED API key from https://fred.stlouisfed.org/docs/api/api_key.html")]

      public sealed class FredHistoricalDataProvider : BaseHistoricalDataProvider, IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
    content.vb: >-
      <DataSource("fred", "FRED Economic Data", DataSourceType.Historical, DataSourceCategory.Free, Priority:=28, Description:="Federal Reserve Economic Data time series mapped to synthetic daily bars")>

      <ImplementsAdr("ADR-001", "FRED historical provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      <RequiresCredential("FRED_API_KEY", EnvironmentVariables:=New String() { "FRED_API_KEY", "FRED__APIKEY" }, DisplayName:="API Key", Description:="FRED API key from https://fred.stlouisfed.org/docs/api/api_key.html")>

      Public NotInheritable Class FredHistoricalDataProvider Inherits BaseHistoricalDataProvider Implements IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
