    - id: From
      type: System.Nullable{System.DateTimeOffset}
      description: >-
        Inclusive lower bound on the event timestamp.
            When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, there is no lower bound.
    - id: To
      type: System.Nullable{System.DateTimeOffset}
      description: >-
        Exclusive upper bound on the event timestamp.
            When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, there is no upper bound.
    - id: EventType
      type: System.Nullable{Meridian.Contracts.Domain.Enums.MarketEventType}
      description: >-
        Restrict results to a specific <xref href="Meridian.Contracts.Domain.Enums.MarketEventType" data-throw-if-not-resolved="false"></xref>.
            When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, all event types are returned.
