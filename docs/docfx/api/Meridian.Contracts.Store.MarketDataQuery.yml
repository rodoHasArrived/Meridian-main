      type: System.String
      description: >-
        Restrict results to a named data source (e.g. <code>"alpaca"</code>).
            When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, all sources are returned.
    - id: Limit
      type: System.Nullable{System.Int32}
      description: >-
