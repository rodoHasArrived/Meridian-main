    content: public MarketDataQuery(SymbolId? Symbol = null, DateTimeOffset? From = null, DateTimeOffset? To = null, MarketEventType? EventType = null, string? Source = null, int? Limit = null)
    parameters:
    - id: Symbol
      type: System.Nullable{Meridian.Contracts.Domain.SymbolId}
      description: >-
        Restrict results to a single instrument.  When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>,
