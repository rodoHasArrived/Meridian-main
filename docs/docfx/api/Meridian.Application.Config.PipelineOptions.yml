    path: ../../src/Meridian.Application/Config/ConfigurationPipeline.cs
    startLine: 884
  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Config
  summary: >-
    Controls how aggressively self-healing behaviours are applied.

    <xref href="Meridian.Application.Config.SelfHealingStrictness.Development" data-throw-if-not-resolved="false"></xref> (default) applies all fixes and logs

    significant ones as warnings.  <xref href="Meridian.Application.Config.SelfHealingStrictness.Production" data-throw-if-not-resolved="false"></xref> applies

    only cosmetic <xref href="Meridian.Application.Config.SelfHealingSeverity.AutoFix" data-throw-if-not-resolved="false"></xref> changes and refuses

    <xref href="Meridian.Application.Config.SelfHealingSeverity.Warn" data-throw-if-not-resolved="false"></xref>-level fixes with a startup error so that

    operators must correct the configuration manually.
  example: []
  syntax:
    content: public SelfHealingStrictness HealingStrictness { get; init; }
    parameters: []
    return:
      type: Meridian.Application.Config.SelfHealingStrictness
    content.vb: Public Property HealingStrictness As SelfHealingStrictness
  overload: Meridian.Application.Config.PipelineOptions.HealingStrictness*
