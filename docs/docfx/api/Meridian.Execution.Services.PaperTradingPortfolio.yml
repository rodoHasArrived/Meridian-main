      description: Annual interest rate expressed as a decimal (e.g. 0.065 = 6.5 %).
    - id: days
      type: System.Int32
      description: Number of days to accrue interest for. Defaults to 1 (daily).
    content.vb: Public Sub AccrueMarginInterest(annualRate As Decimal, days As Integer = 1)
