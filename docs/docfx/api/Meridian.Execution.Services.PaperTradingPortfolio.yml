  namespace: Meridian.Execution.Services
  summary: Accrues interest on any outstanding margin loans in all margin accounts.
  remarks: >-
    Call this once per interest period (e.g. daily).  The charge is deducted from the

    account's <code>Cash</code> balance and added to <code>MarginBorrowed</code> on each affected

    position so that equity (and therefore buying power) is reduced accordingly.
  example: []
  syntax:
