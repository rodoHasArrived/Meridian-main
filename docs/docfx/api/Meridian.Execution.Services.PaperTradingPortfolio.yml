  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Services
  summary: >-
    Tracks cash, positions, and realised P&amp;L for a paper trading session.

    Supports both single-account (backward-compatible) and multi-account modes.

    Optionally posts double-entry journal entries to a <xref href="Meridian.Execution.Services.PaperTradingPortfolio.Ledger" data-throw-if-not-resolved="false"></xref> after each fill.
