  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Fluent builder that produces a fully functional <xref href="Meridian.Infrastructure.Adapters.Core.IHistoricalDataProvider" data-throw-if-not-resolved="false"></xref>

    from delegate functions, without requiring inheritance from

    <xref href="Meridian.Infrastructure.Adapters.Core.BaseHistoricalDataProvider" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Use this builder for new provider implementations where the full HTTP/rate-limit

    infrastructure of <xref href="Meridian.Infrastructure.Adapters.Core.BaseHistoricalDataProvider" data-throw-if-not-resolved="false"></xref> is not needed, or when

    wrapping a third-party SDK that manages its own HTTP layer.


    Existing providers built on <xref href="Meridian.Infrastructure.Adapters.Core.BaseHistoricalDataProvider" data-throw-if-not-resolved="false"></xref> remain unchanged

    until the module migration is complete; the builder is the preferred path for any

    provider added from this point onward.


    Minimal example:


    <pre><code class="lang-csharp">IHistoricalDataProvider provider = ProviderBehaviorBuilder.Create()
        .WithName("my-provider")
        .WithDisplayName("My Provider")
        .WithCapabilities(HistoricalDataCapabilities.BarsOnly)
        .WithDailyBars(async (symbol, from, to, ct) =&gt;
        {
            var bars = await _sdk.FetchBarsAsync(symbol, from, to, ct);
            return bars.Select(MapBar).ToList();
        })
        .Build();</code></pre>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Delegate-based IHistoricalDataProvider factory alternative to base-class inheritance")]

      [ImplementsAdr("ADR-004", "All delegate signatures carry CancellationToken")]

      public sealed class ProviderBehaviorBuilder
    content.vb: >-
      <ImplementsAdr("ADR-001", "Delegate-based IHistoricalDataProvider factory alternative to base-class inheritance")>

