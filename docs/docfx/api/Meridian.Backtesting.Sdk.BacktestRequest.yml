  summary: Parameters for a single backtest run.
  example: []
  syntax:
    content: public BacktestRequest(DateOnly From, DateOnly To, IReadOnlyList<string>? Symbols = null, decimal InitialCash = 100000, double AnnualMarginRate = 0.05, double AnnualShortRebateRate = 0.02, IReadOnlyList<FinancialAccount>? Accounts = null, string DefaultBrokerageAccountId = "primary-brokerage", string DataRoot = "./data", string? StrategyAssemblyPath = null, IReadOnlyList<AssetEvent>? AssetEvents = null, BacktestEngineMode EngineMode = BacktestEngineMode.Managed, ExecutionModel DefaultExecutionModel = ExecutionModel.Auto, decimal SlippageBasisPoints = 5, BacktestCommissionKind CommissionKind = BacktestCommissionKind.PerShare, decimal CommissionRate = 0.005, decimal CommissionMinimum = 1.00, decimal CommissionMaximum = 79228162514264337593543950335, decimal MarketImpactCoefficient = 0.1, bool AdjustForCorporateActions = true, double RiskFreeRate = 0.04, decimal MaxParticipationRate = 0, bool FailOnUnknownSymbols = false)
    parameters:
    - id: From
      type: System.DateOnly
      description: Inclusive start date.
    - id: To
      type: System.DateOnly
      description: Inclusive end date.
    - id: Symbols
      type: System.Collections.Generic.IReadOnlyList{System.String}
      description: Symbols to restrict to; <code>null</code> means use the entire discovered universe.
    - id: InitialCash
      type: System.Decimal
      description: Legacy starting cash balance in USD, used when <xref href="Meridian.Backtesting.Sdk.BacktestRequest.Accounts" data-throw-if-not-resolved="false"></xref> is omitted.
    - id: AnnualMarginRate
      type: System.Double
      description: Legacy annual margin interest rate, used when <xref href="Meridian.Backtesting.Sdk.BacktestRequest.Accounts" data-throw-if-not-resolved="false"></xref> is omitted.
    - id: AnnualShortRebateRate
      type: System.Double
      description: Legacy annual short rebate rate, used when <xref href="Meridian.Backtesting.Sdk.BacktestRequest.Accounts" data-throw-if-not-resolved="false"></xref> is omitted.
    - id: Accounts
      type: System.Collections.Generic.IReadOnlyList{Meridian.Backtesting.Sdk.FinancialAccount}
      description: Optional explicit account definitions for multi-bank / multi-brokerage simulations.
    - id: DefaultBrokerageAccountId
      type: System.String
      description: Account used when an order does not explicitly name an account. Must reference a brokerage account.
    - id: DataRoot
      type: System.String
      description: Root directory of the locally-collected JSONL data.
    - id: StrategyAssemblyPath
      type: System.String
      description: >-
        Optional path to a compiled strategy .dll; <code>null</code> means the strategy instance is supplied

        directly to <code>BacktestEngine.RunAsync</code>.
    - id: AssetEvents
      type: System.Collections.Generic.IReadOnlyList{Meridian.Backtesting.Sdk.AssetEvent}
      description: Optional sequence of asset events (dividends, splits) to apply during the simulation.
    - id: EngineMode
      type: Meridian.Backtesting.Sdk.BacktestEngineMode
      description: Selects the managed or CppTrader-backed replay engine.
    - id: DefaultExecutionModel
      type: Meridian.Backtesting.Sdk.ExecutionModel
      description: >-
        Fallback fill model used when an order's own <xref href="Meridian.Backtesting.Sdk.ExecutionModel" data-throw-if-not-resolved="false"></xref> is <xref href="Meridian.Backtesting.Sdk.ExecutionModel.Auto" data-throw-if-not-resolved="false"></xref>.

        Defaults to <xref href="Meridian.Backtesting.Sdk.ExecutionModel.Auto" data-throw-if-not-resolved="false"></xref>, which lets the engine pick the most detailed model available.
    - id: SlippageBasisPoints
      type: System.Decimal
      description: >-
        Bid-ask slippage applied by the <xref href="Meridian.Backtesting.Sdk.BacktestCommissionKind.PerShare" data-throw-if-not-resolved="false"></xref> and

        <xref href="Meridian.Backtesting.Sdk.ExecutionModel.BarMidpoint" data-throw-if-not-resolved="false"></xref> fill models. Expressed in basis points (default: 5 = 0.05%).
    - id: CommissionKind
      type: Meridian.Backtesting.Sdk.BacktestCommissionKind
      description: Selects how execution commissions are calculated. Defaults to per-share.
    - id: CommissionRate
      type: System.Decimal
      description: >-
        Interpretation depends on <xref href="Meridian.Backtesting.Sdk.BacktestRequest.CommissionKind" data-throw-if-not-resolved="false"></xref>:


        <ul><li><xref href="Meridian.Backtesting.Sdk.BacktestCommissionKind.PerShare" data-throw-if-not-resolved="false"></xref> — dollar amount per share (default: $0.005).</li><li><xref href="Meridian.Backtesting.Sdk.BacktestCommissionKind.Percentage" data-throw-if-not-resolved="false"></xref> — commission in basis points (default: 5 = 0.05%).</li><li><xref href="Meridian.Backtesting.Sdk.BacktestCommissionKind.Free" data-throw-if-not-resolved="false"></xref> — ignored.</li></ul>
    - id: CommissionMinimum
      type: System.Decimal
      description: 'Minimum commission charge per order (default: $1.00). Ignored when <xref href="Meridian.Backtesting.Sdk.BacktestRequest.CommissionKind" data-throw-if-not-resolved="false"></xref> is <xref href="Meridian.Backtesting.Sdk.BacktestCommissionKind.Free" data-throw-if-not-resolved="false"></xref>.'
    - id: CommissionMaximum
      type: System.Decimal
      description: 'Maximum commission charge per order (default: uncapped). Ignored when <xref href="Meridian.Backtesting.Sdk.BacktestRequest.CommissionKind" data-throw-if-not-resolved="false"></xref> is not <xref href="Meridian.Backtesting.Sdk.BacktestCommissionKind.PerShare" data-throw-if-not-resolved="false"></xref>.'
    - id: MarketImpactCoefficient
      type: System.Decimal
      description: >-
        Scales the square-root market-impact formula used by the <xref href="Meridian.Backtesting.Sdk.ExecutionModel.MarketImpact" data-throw-if-not-resolved="false"></xref> fill model.

        Higher values simulate stronger price impact from large orders (default: 0.1).
    - id: AdjustForCorporateActions
      type: System.Boolean
      description: 'When true, adjusts historical bar prices for splits and dividends using Security Master data (default: true).'
    - id: RiskFreeRate
      type: System.Double
      description: >-
        Annualised risk-free rate used by <xref href="Meridian.Backtesting.Sdk.BacktestMetrics.SharpeRatio" data-throw-if-not-resolved="false"></xref> and

        <xref href="Meridian.Backtesting.Sdk.BacktestMetrics.SortinoRatio" data-throw-if-not-resolved="false"></xref> calculations (e.g. 0.04 for 4%). Defaults to 0.04.
    - id: MaxParticipationRate
      type: System.Decimal
      description: >-
        Maximum fraction of a bar's traded volume that the <xref href="Meridian.Backtesting.Sdk.ExecutionModel.BarMidpoint" data-throw-if-not-resolved="false"></xref> fill

        model is allowed to fill in a single bar. When set to a value greater than zero (e.g. 0.05 for

        5 % participation), large orders will receive partial fills across multiple bars, improving

        fill-realism for strategies that trade illiquid names or hold large positions. Set to zero

        (default) to use the original unconstrained behaviour.
    - id: FailOnUnknownSymbols
      type: System.Boolean
    content.vb: Public Sub New(From As DateOnly, [To] As DateOnly, Symbols As IReadOnlyList(Of String) = Nothing, InitialCash As Decimal = 100000, AnnualMarginRate As Double = 0.05, AnnualShortRebateRate As Double = 0.02, Accounts As IReadOnlyList(Of FinancialAccount) = Nothing, DefaultBrokerageAccountId As String = "primary-brokerage", DataRoot As String = "./data", StrategyAssemblyPath As String = Nothing, AssetEvents As IReadOnlyList(Of AssetEvent) = Nothing, EngineMode As BacktestEngineMode = BacktestEngineMode.Managed, DefaultExecutionModel As ExecutionModel = ExecutionModel.Auto, SlippageBasisPoints As Decimal = 5, CommissionKind As BacktestCommissionKind = BacktestCommissionKind.PerShare, CommissionRate As Decimal = 0.005, CommissionMinimum As Decimal = 1.00, CommissionMaximum As Decimal = 79228162514264337593543950335, MarketImpactCoefficient As Decimal = 0.1, AdjustForCorporateActions As Boolean = True, RiskFreeRate As Double = 0.04, MaxParticipationRate As Decimal = 0, FailOnUnknownSymbols As Boolean = False)
