    id: TryReconnectAsync
    path: ../../src/Meridian.Infrastructure/Shared/WebSocketReconnectionHelper.cs
    startLine: 71
  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Shared
  summary: >-
    Attempts reconnection with exponential backoff and jitter.

    Guarantees only one reconnection attempt runs at a time via semaphore gating.

    On successful reconnection, raises the <xref href="Meridian.Infrastructure.Shared.WebSocketReconnectionHelper.Reconnected" data-throw-if-not-resolved="false"></xref> event

    with the disconnect/reconnect timestamps for gap backfill.
  example: []
  syntax:
    content: public Task<bool> TryReconnectAsync(Func<CancellationToken, Task> reconnectAction, CancellationToken ct = default)
    parameters:
    - id: reconnectAction
      type: System.Func{System.Threading.CancellationToken,System.Threading.Tasks.Task}
      description: >-
        The async action that performs the actual reconnection
            (connect WebSocket, authenticate, resubscribe).
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Boolean}
      description: True if reconnection succeeded; false if max attempts exhausted.
    content.vb: Public Function TryReconnectAsync(reconnectAction As Func(Of CancellationToken, Task), ct As CancellationToken = Nothing) As Task(Of Boolean)
