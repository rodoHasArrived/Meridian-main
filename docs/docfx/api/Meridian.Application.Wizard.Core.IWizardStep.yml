  namespace: Meridian.Application.Wizard.Core
  summary: >-
    Contract that every wizard step must implement.

    Steps are independent units: each one reads from and writes to

    <xref href="Meridian.Application.Wizard.Core.WizardContext" data-throw-if-not-resolved="false"></xref>, then returns a <xref href="Meridian.Application.Wizard.Core.WizardStepResult" data-throw-if-not-resolved="false"></xref>

    that tells the <xref href="Meridian.Application.Wizard.Core.WizardCoordinator" data-throw-if-not-resolved="false"></xref> what to do next.
