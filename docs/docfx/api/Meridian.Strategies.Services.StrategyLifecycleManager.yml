  summary: >-
    Manages the lifecycle of registered <xref href="Meridian.Strategies.Interfaces.ILiveStrategy" data-throw-if-not-resolved="false"></xref> instances.

    Tracks status transitions and coordinates startup, pause, and stop across strategies.

    Enforced by ADR-016.
