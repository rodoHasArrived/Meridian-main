  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Backfill
  summary: Per-symbol completeness signal produced at the end of a backfill run.
  example: []
  syntax:
    content: public SymbolValidationSignal(string Symbol, string Status, long BarsWritten, long? CheckpointBarsWritten, DateOnly? EffectiveFrom, DateOnly? EffectiveTo, string? Reason = null)
    parameters:
    - id: Symbol
      type: System.String
      description: The ticker symbol this signal relates to.
    - id: Status
      type: System.String
      description: >-
        <code>"Pass"</code> — symbol fetched (or confirmed already covered) with at least one bar.

        <code>"Warn"</code> — symbol fetched successfully but the provider returned zero bars.

        <code>"Fail"</code> — symbol could not be fetched due to an error.
    - id: BarsWritten
      type: System.Int64
      description: >-
        Bars written during this run. Zero for symbols that were skipped because their

        checkpoint already covered the requested range.
    - id: CheckpointBarsWritten
      type: System.Nullable{System.Int64}
      description: >-
        Bar count stored in the checkpoint from the previous run.

        Non-null only when <xref href="Meridian.Application.Backfill.SymbolValidationSignal.Status" data-throw-if-not-resolved="false"></xref> is <code>"Pass"</code> and the symbol was skipped

        (resume mode, fully covered). Allows callers to reconcile expected vs. actual counts.
    - id: EffectiveFrom
      type: System.Nullable{System.DateOnly}
      description: Inclusive start date actually fetched this run (post-resume-advance).
    - id: EffectiveTo
      type: System.Nullable{System.DateOnly}
      description: Inclusive end date actually fetched this run.
    - id: Reason
      type: System.String
      description: Human-readable explanation for non-Pass statuses.
    content.vb: Public Sub New(Symbol As String, Status As String, BarsWritten As Long, CheckpointBarsWritten As Long?, EffectiveFrom As DateOnly?, EffectiveTo As DateOnly?, Reason As String = Nothing)
