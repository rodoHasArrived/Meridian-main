  assemblies:
  - Meridian.ProviderSdk
  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Discovers, validates, and loads <xref href="Meridian.Infrastructure.Adapters.Core.IProviderModule" data-throw-if-not-resolved="false"></xref> implementations from one or

    more assemblies into a DI service collection.
  remarks: >-
    <xref href="Meridian.Infrastructure.Adapters.Core.ProviderModuleLoader" data-throw-if-not-resolved="false"></xref> separates module lifecycle management from

    <xref href="Meridian.Infrastructure.DataSources.DataSourceRegistry" data-throw-if-not-resolved="false"></xref>, which handles attribute-based discovery.

    The two systems are complementary:


    <ul><li>Attribute discovery (<code>[DataSource]</code>) — single-class registration</li><li>Module loading — multi-capability, grouped registration per provider</li></ul>


    Typical usage:


    <pre><code class="lang-csharp">var loader = new ProviderModuleLoader();

    var report = await loader.LoadFromAssembliesAsync(services, registry, ct,
        typeof(AlpacaProviderModule).Assembly);</code></pre>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Centralized module-based provider loading")]

      [ImplementsAdr("ADR-005", "Assembly-scanning provider discovery for modules")]

      public sealed class ProviderModuleLoader
    content.vb: >-
      <ImplementsAdr("ADR-001", "Centralized module-based provider loading")>

      <ImplementsAdr("ADR-005", "Assembly-scanning provider discovery for modules")>

      Public NotInheritable Class ProviderModuleLoader
