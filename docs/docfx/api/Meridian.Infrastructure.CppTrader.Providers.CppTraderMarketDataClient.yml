  assemblies:
  - Meridian.Infrastructure.CppTrader
  namespace: Meridian.Infrastructure.CppTrader.Providers
  summary: >-
    Streaming market-data provider backed by a CppTrader ITCH ingestion session.

    Receives <xref href="Meridian.Infrastructure.CppTrader.Protocol.CppTraderProtocolNames.TradePrint" data-throw-if-not-resolved="false"></xref> and

    <xref href="Meridian.Infrastructure.CppTrader.Protocol.CppTraderProtocolNames.BookSnapshot" data-throw-if-not-resolved="false"></xref> events from the native host and

    forwards them to the domain <xref href="Meridian.Domain.Collectors.TradeDataCollector" data-throw-if-not-resolved="false"></xref> and

    <xref href="Meridian.Domain.Collectors.MarketDepthCollector" data-throw-if-not-resolved="false"></xref> for pipeline processing.
  example: []
  syntax:
    content: >-
      [DataSource("cpptrader", "CppTrader", DataSourceType.Realtime, DataSourceCategory.Premium, Priority = 50, Description = "External CppTrader-native market data and execution host")]

      public sealed class CppTraderMarketDataClient : IMarketDataClient, IProviderMetadata, IAsyncDisposable
