  assemblies:
  - Meridian.Backtesting.Sdk
  namespace: Meridian.Backtesting.Sdk.Strategies.OptionsOverwrite
  summary: >-
    Solves for the implied volatility of a European call given a market price.

    Uses Newton-Raphson iteration seeded with the Brenner-Subrahmanyam approximation.
  example: []
  syntax:
    content: public static double? ImpliedVolatility(double marketPrice, double underlyingPrice, double strike, double riskFreeRate, double timeToExpiryYears, double tolerance = 1E-06, int maxIterations = 100)
    parameters:
    - id: marketPrice
      type: System.Double
      description: Observed market price (use mid for fair value).
    - id: underlyingPrice
      type: System.Double
      description: Current underlying price S.
    - id: strike
      type: System.Double
      description: Strike price K.
    - id: riskFreeRate
      type: System.Double
      description: Continuously compounded risk-free rate r.
    - id: timeToExpiryYears
      type: System.Double
      description: Time to expiration in years T.
    - id: tolerance
      type: System.Double
      description: Convergence tolerance (default 1e-6).
    - id: maxIterations
      type: System.Int32
      description: Maximum Newton-Raphson iterations (default 100).
    return:
      type: System.Nullable{System.Double}
      description: Implied volatility, or <code>null</code> when no convergence is achieved.
    content.vb: Public Shared Function ImpliedVolatility(marketPrice As Double, underlyingPrice As Double, strike As Double, riskFreeRate As Double, timeToExpiryYears As Double, tolerance As Double = 1E-06, maxIterations As Integer = 100) As Double?
