  summary: Calculates a relevance score for a search result based on how well it matches the query.
  example: []
  syntax:
    content: public static int CalculateMatchScore(string query, string symbol, string? name, int position, int positionPenaltyMax = 20, int positionPenaltyFactor = 2)
    parameters:
    - id: query
      type: System.String
      description: The search query.
    - id: symbol
      type: System.String
      description: The ticker symbol.
    - id: name
      type: System.String
      description: Optional company name.
    - id: position
      type: System.Int32
      description: Position in search results (0-based).
    - id: positionPenaltyMax
      type: System.Int32
      description: Maximum position penalty (default 20).
    - id: positionPenaltyFactor
      type: System.Int32
      description: Multiplier for position penalty (default 2).
    return:
      type: System.Int32
      description: Score from 0-100 where higher is better match.
    content.vb: Public Shared Function CalculateMatchScore(query As String, symbol As String, name As String, position As Integer, positionPenaltyMax As Integer = 20, positionPenaltyFactor As Integer = 2) As Integer
