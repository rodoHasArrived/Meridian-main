  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Archival
  summary: >-
    Skip corrupt records but fire the <xref href="Meridian.Storage.Archival.WriteAheadLog.CorruptionDetected" data-throw-if-not-resolved="false"></xref> event

    so monitoring systems can alert operators. Recommended for production deployments.
  example: []
  syntax:
    content: Alert = 1
    return:
      type: Meridian.Storage.Archival.WalCorruptionMode
