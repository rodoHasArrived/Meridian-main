    id: Halt
    path: ../../src/Meridian.Storage/Archival/WriteAheadLog.cs
    startLine: 1030
  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Archival
  summary: >-
    Throw an <xref href="System.IO.InvalidDataException" data-throw-if-not-resolved="false"></xref> when any corrupt record is found.

    Use this when data integrity is non-negotiable and manual operator review

    is required before the application can start.
  example: []
  syntax:
    content: Halt = 2
    return:
      type: Meridian.Storage.Archival.WalCorruptionMode
