  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Composition
  summary: >-
    Unified host graph surface used by the shared startup/orchestration layer.

    All host modes flow through this class, which delegates to <xref href="Meridian.Application.Composition.ServiceCompositionRoot" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p><b>Design Philosophy:</b></p>

    <ul><li>Single host graph construction surface for console, desktop, and utility flows</li><li>Uses <xref href="Meridian.Application.Composition.ServiceCompositionRoot" data-throw-if-not-resolved="false"></xref> for all DI registration</li><li>Shared startup orchestrators choose canonical <xref href="Meridian.Application.Composition.CompositionOptions" data-throw-if-not-resolved="false"></xref> presets</li><li>Eliminates duplicated service wiring across hosts</li></ul>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Unified host startup for all deployment modes")]

      public sealed class HostStartup : IAsyncDisposable
    content.vb: >-
      <ImplementsAdr("ADR-001", "Unified host startup for all deployment modes")>

      Public NotInheritable Class HostStartup Implements IAsyncDisposable
