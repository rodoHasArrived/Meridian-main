  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.TaxLotAccounting
  summary: >-
    Selects lots from <code class="paramref">openLots</code> to satisfy a closing trade of

    <code class="paramref">quantityToClose</code> shares/contracts at <code class="paramref">closePrice</code>.
  example: []
  syntax:
    content: TaxLotReliefResult Relieve(IReadOnlyList<TaxLot> openLots, long quantityToClose, decimal closePrice)
    parameters:
    - id: openLots
      type: System.Collections.Generic.IReadOnlyList{Meridian.Execution.Sdk.TaxLot}
      description: All currently open lots for the symbol being closed.
    - id: quantityToClose
      type: System.Int64
      description: Unsigned number of shares/contracts to close.
    - id: closePrice
      type: System.Decimal
      description: Execution price of the closing trade.
    return:
      type: Meridian.Execution.TaxLotAccounting.TaxLotReliefResult
      description: >-
        A <xref href="Meridian.Execution.TaxLotAccounting.TaxLotReliefResult" data-throw-if-not-resolved="false"></xref> listing which lots were consumed and the

        updated remaining lot list.
    content.vb: Function Relieve(openLots As IReadOnlyList(Of TaxLot), quantityToClose As Long, closePrice As Decimal) As TaxLotReliefResult
  overload: Meridian.Execution.TaxLotAccounting.ITaxLotSelector.Relieve*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: When <code class="paramref">quantityToClose</code> exceeds the aggregate open quantity.
  nameWithType.vb: ITaxLotSelector.Relieve(IReadOnlyList(Of TaxLot), Long, Decimal)
