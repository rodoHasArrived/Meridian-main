  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Base class for historical data providers to eliminate duplicate code patterns

    across all backfill provider implementations. Provides common functionality for:

    - Rate limiting initialization and management

    - HTTP client setup and error handling

    - HTTP resilience (retry, circuit breaker, timeout)

    - Credential validation

    - Symbol normalization

    - Disposed state tracking
  remarks: >-
    Derived classes inherit:

    - <xref href="Meridian.Infrastructure.Adapters.Core.IRateLimitAwareProvider" data-throw-if-not-resolved="false"></xref> implementation with virtual <xref href="Meridian.Infrastructure.Adapters.Core.BaseHistoricalDataProvider.OnRateLimitHit" data-throw-if-not-resolved="false"></xref> event

    - Centralized HTTP error handling via <xref href="Meridian.Infrastructure.Adapters.Core.BaseHistoricalDataProvider.HandleHttpResponseAsync(System.Net.Http.HttpResponseMessage%2cSystem.String%2cSystem.String%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>

    - HTTP resilience pipeline for transient fault handling

    - Rate limit tracking and Retry-After extraction
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Base historical data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      public abstract class BaseHistoricalDataProvider : IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
    content.vb: >-
      <ImplementsAdr("ADR-001", "Base historical data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      Public MustInherit Class BaseHistoricalDataProvider Implements IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
