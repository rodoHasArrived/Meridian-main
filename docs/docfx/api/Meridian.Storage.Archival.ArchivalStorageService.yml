  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Archival
  summary: >-
    Archival-first storage service with Write-Ahead Logging for crash-safe persistence.

    Implements the storage pipeline pattern: WAL -&gt; Buffer -&gt; Primary Storage -&gt; Archive.
  example: []
  syntax:
    content: >-
      [StorageSink("archival", "Archival storage with WAL durability", EnabledByDefault = false, Description = "WAL-backed archival sink; buffer events in memory and flush to a primary IStorageSink with crash-safe Write-Ahead Logging.")]

      public sealed class ArchivalStorageService : IStorageSink, IAsyncDisposable, IFlushable
    content.vb: >-
      <StorageSink("archival", "Archival storage with WAL durability", EnabledByDefault:=False, Description:="WAL-backed archival sink; buffer events in memory and flush to a primary IStorageSink with crash-safe Write-Ahead Logging.")>

