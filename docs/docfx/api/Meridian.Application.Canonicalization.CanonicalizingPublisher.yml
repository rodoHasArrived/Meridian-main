  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Canonicalization
  summary: >-
    Decorator that canonicalizes events before forwarding them to the inner publisher.

    Wraps any <xref href="Meridian.Domain.Events.IMarketEventPublisher" data-throw-if-not-resolved="false"></xref> to apply symbol resolution, venue

    normalization, and condition code mapping transparently.
  remarks: >-
    <p><b>Phase 2 (Dual-Write):</b> When <code>DualWriteEnabled</code> is true,

    the raw event is published first, then the canonicalized version. This allows

    downstream consumers to validate parity between raw and enriched paths.</p>

    <p><b>Phase 3 (Canonical-only):</b> When dual-write is off,

    only the canonicalized event is published.</p>

    <p>Pilot symbol filtering limits canonicalization to a configurable subset

    during rollout. Events for non-pilot symbols pass through unchanged.</p>

    <p><b>Quarantine Sink:</b> When a <xref href="Meridian.Application.Pipeline.DeadLetterSink" data-throw-if-not-resolved="false"></xref> is provided via

    the <code>quarantine</code> constructor parameter, events whose symbol cannot be resolved are written

    to the quarantine file in addition to being published with raw data.

    This prevents unmappable events from silently accumulating with no audit trail.</p>
  example: []
  syntax:
    content: 'public sealed class CanonicalizingPublisher : IMarketEventPublisher'
    content.vb: Public NotInheritable Class CanonicalizingPublisher Implements IMarketEventPublisher
