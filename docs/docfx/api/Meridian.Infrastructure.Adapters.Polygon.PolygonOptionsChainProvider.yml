  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Polygon
  summary: >-
    Options chain provider using the Polygon.io REST API (v3).

    Provides option chain snapshots, greeks, and contract discovery for US equity options.

    Free tier supports delayed quotes; a paid subscription unlocks real-time data.
  remarks: >-
    API Documentation:
      Chain snapshots:   GET /v3/snapshot/options/{underlyingAsset}
      Single contract:   GET /v3/snapshot/options/{underlyingAsset}/{optionsTicker}
      Expirations:       GET /v3/reference/options/contracts?underlying_ticker={symbol}
  example: []
  syntax:
    content: >-
      [DataSource("polygon-options", "Polygon.io Options", DataSourceType.Realtime, DataSourceCategory.Aggregator, Priority = 15, Description = "US equity option chains with greeks, IV, and open interest via Polygon.io REST API")]

      [ImplementsAdr("ADR-001", "Options chain provider implementation following provider abstraction contract")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      [ImplementsAdr("ADR-010", "HttpClient sourced via IHttpClientFactory; never instantiated directly")]

      [RequiresCredential("POLYGON_API_KEY", EnvironmentVariables = new string[] { "POLYGON_API_KEY", "POLYGON__APIKEY" }, DisplayName = "API Key", Description = "Polygon.io API key from https://polygon.io/dashboard/api-keys")]

      public sealed class PolygonOptionsChainProvider : IOptionsChainProvider, IProviderMetadata
    content.vb: >-
      <DataSource("polygon-options", "Polygon.io Options", DataSourceType.Realtime, DataSourceCategory.Aggregator, Priority:=15, Description:="US equity option chains with greeks, IV, and open interest via Polygon.io REST API")>

      <ImplementsAdr("ADR-001", "Options chain provider implementation following provider abstraction contract")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      <ImplementsAdr("ADR-010", "HttpClient sourced via IHttpClientFactory; never instantiated directly")>

      <RequiresCredential("POLYGON_API_KEY", EnvironmentVariables:=New String() { "POLYGON_API_KEY", "POLYGON__APIKEY" }, DisplayName:="API Key", Description:="Polygon.io API key from https://polygon.io/dashboard/api-keys")>

      Public NotInheritable Class PolygonOptionsChainProvider Implements IOptionsChainProvider, IProviderMetadata
