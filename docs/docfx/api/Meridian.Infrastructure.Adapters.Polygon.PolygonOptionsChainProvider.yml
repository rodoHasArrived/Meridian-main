  syntax:
    content: public Task<OptionChainSnapshot?> GetChainSnapshotAsync(string underlyingSymbol, DateOnly expiration, int? strikeRange = null, CancellationToken ct = default)
    parameters:
    - id: underlyingSymbol
      type: System.String
      description: The underlying symbol.
    - id: expiration
      type: System.DateOnly
      description: The expiration date.
    - id: strikeRange
      type: System.Nullable{System.Int32}
      description: >-
        Optional number of strikes above and below ATM to include.

        If null, returns all available strikes.
    - id: ct
