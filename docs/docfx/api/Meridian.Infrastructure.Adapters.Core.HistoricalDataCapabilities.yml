  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Consolidated capability flags for historical data providers.

    Instead of checking individual boolean properties, consumers can check

    a single Capabilities object for all supported features.
  remarks: >-
    Common capability combinations can be created using static factory methods:

    - <xref href="Meridian.Infrastructure.Adapters.Core.HistoricalDataCapabilities.BarsOnly" data-throw-if-not-resolved="false"></xref> for basic daily bar providers

    - <xref href="Meridian.Infrastructure.Adapters.Core.HistoricalDataCapabilities.FullFeatured" data-throw-if-not-resolved="false"></xref> for providers supporting all data types
