  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.InteractiveBrokers
  summary: No-op connection manager stub for builds without the Interactive Brokers API.
  remarks: >-
    <p>

    This stub enables the project to compile without requiring external IB API dependencies.

    All operations are no-ops that return immediately with success indicators.

    </p>

    <p>

    For production use with Interactive Brokers, compile with the IBAPI define to use

    <xref href="Meridian.Infrastructure.Adapters.InteractiveBrokers.EnhancedIBConnectionManager" data-throw-if-not-resolved="false"></xref> which provides full TWS/Gateway integration.

    </p>
