  summary: >-
    Registers a factory function for creating a streaming client for the specified provider ID.

    Provider IDs are case-insensitive strings (e.g. "alpaca", "ib", "polygon").

    This is the primary registration path; it does not require extending <xref href="Meridian.Application.Config.DataSourceKind" data-throw-if-not-resolved="false"></xref>.
