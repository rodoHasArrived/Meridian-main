    startLine: 22
  assemblies:
  - Meridian.Strategies
  namespace: Meridian.Strategies.Interfaces
  summary: >-
    Starts the strategy against the provided execution context. Transitions the strategy

    from <xref href="Meridian.Strategies.Models.StrategyStatus.Registered" data-throw-if-not-resolved="false"></xref> (or <xref href="Meridian.Strategies.Models.StrategyStatus.Stopped" data-throw-if-not-resolved="false"></xref>)

    to <xref href="Meridian.Strategies.Models.StrategyStatus.WarmingUp" data-throw-if-not-resolved="false"></xref> and then <xref href="Meridian.Strategies.Models.StrategyStatus.Running" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: Task StartAsync(IExecutionContext ctx, CancellationToken ct = default)
    parameters:
    - id: ctx
      type: Meridian.Execution.Interfaces.IExecutionContext
    - id: ct
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task
    content.vb: Function StartAsync(ctx As IExecutionContext, ct As CancellationToken = Nothing) As Task
  overload: Meridian.Strategies.Interfaces.IStrategyLifecycle.StartAsync*
