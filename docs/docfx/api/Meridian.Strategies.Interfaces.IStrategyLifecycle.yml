  assemblies:
  - Meridian.Strategies
  namespace: Meridian.Strategies.Interfaces
  summary: >-
    Manages the lifecycle of a strategy that can run in live or paper execution mode.

    Extends <xref href="Meridian.Backtesting.Sdk.IBacktestStrategy" data-throw-if-not-resolved="false"></xref> so a single class can serve both backtest

    and live contexts. Enforced by ADR-016.
