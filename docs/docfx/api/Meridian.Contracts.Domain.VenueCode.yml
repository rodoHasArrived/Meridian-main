  assemblies:
  - Meridian.Contracts
  namespace: Meridian.Contracts.Domain
  summary: >-
    Zero-cost value object representing a trading-venue or exchange code.

    Prevents accidental interchange of venue codes with <xref href="Meridian.Contracts.Domain.SymbolId" data-throw-if-not-resolved="false"></xref> or <xref href="Meridian.Contracts.Domain.ProviderId" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Venue codes follow MIC (ISO 10383) convention in uppercase (e.g. <code>"XNAS"</code>, <code>"XNYS"</code>).

    Common short-form names (e.g. <code>"NYSE"</code>, <code>"NASDAQ"</code>) are also accepted and stored as-is.
