  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Finnhub
  summary: >-
    Historical data provider using Finnhub API (free tier with API key).

    Generous free tier: 60 API calls/minute.

    Coverage: 60,000+ global securities with company fundamentals.

    Best for: Earnings data, fundamentals, news, and high-frequency backfill operations.

    Extends BaseHistoricalDataProvider for common functionality including:

    - HTTP resilience (retry, circuit breaker)

    - Rate limit tracking with IRateLimitAwareProvider

    - Centralized error handling
  example: []
  syntax:
    content: >-
      [DataSource("finnhub", "Finnhub (free tier)", DataSourceType.Historical, DataSourceCategory.Free, Priority = 18, Description = "Historical OHLCV data via Finnhub free tier API")]

      [ImplementsAdr("ADR-001", "Finnhub historical data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      [RequiresCredential("FINNHUB_API_KEY", EnvironmentVariables = new string[] { "FINNHUB_API_KEY", "FINNHUB__APIKEY" }, DisplayName = "API Key", Description = "Finnhub API key from https://finnhub.io/dashboard")]

      public sealed class FinnhubHistoricalDataProvider : BaseHistoricalDataProvider, IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
    content.vb: >-
      <DataSource("finnhub", "Finnhub (free tier)", DataSourceType.Historical, DataSourceCategory.Free, Priority:=18, Description:="Historical OHLCV data via Finnhub free tier API")>

      <ImplementsAdr("ADR-001", "Finnhub historical data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      <RequiresCredential("FINNHUB_API_KEY", EnvironmentVariables:=New String() { "FINNHUB_API_KEY", "FINNHUB__APIKEY" }, DisplayName:="API Key", Description:="Finnhub API key from https://finnhub.io/dashboard")>

      Public NotInheritable Class FinnhubHistoricalDataProvider Inherits BaseHistoricalDataProvider Implements IHistoricalDataProvider, IProviderMetadata, IRateLimitAwareProvider, IDisposable
