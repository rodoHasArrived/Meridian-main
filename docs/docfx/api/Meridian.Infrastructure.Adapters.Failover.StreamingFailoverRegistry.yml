  summary: >-
    Singleton registry that holds the runtime <xref href="Meridian.Infrastructure.Adapters.Failover.StreamingFailoverService" data-throw-if-not-resolved="false"></xref> instance.

    Allows API endpoints (in the Ui.Shared layer) to access the failover service

    without requiring a direct project reference to the runtime.
  remarks: >-
    Register this as a singleton in DI. Set <xref href="Meridian.Infrastructure.Adapters.Failover.StreamingFailoverRegistry.Service" data-throw-if-not-resolved="false"></xref> from Program.cs

    after creating the failover service. API endpoints can then resolve it to

    query live failover state and trigger manual failovers.
