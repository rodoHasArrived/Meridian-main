  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Derivatives
  summary: >-
    Performs an end-of-day mark-to-market cash settlement.

    Returns the cash flow for this settlement (positive = credit to account).

    The <xref href="Meridian.Execution.Derivatives.FuturePosition.LastSettlementPrice" data-throw-if-not-resolved="false"></xref> is updated and the cumulative

    <xref href="Meridian.Execution.Derivatives.FuturePosition.RealizedPnl" data-throw-if-not-resolved="false"></xref> is increased by the settlement amount.
  example: []
  syntax:
    content: public decimal SettleDaily(decimal newSettlementPrice)
    parameters:
    - id: newSettlementPrice
      type: System.Decimal
      description: Today's official settlement price.
    return:
      type: System.Decimal
      description: Cash amount to credit (or debit if negative) to the portfolio's cash balance.
    content.vb: Public Function SettleDaily(newSettlementPrice As Decimal) As Decimal
