  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Services
  summary: >-
    Loads all <code>*.dll</code> files (non-recursive) in <code class="paramref">pluginsDirectory</code>,

    discovers <code>[DataSource]</code>-decorated types, and registers them with the

    <xref href="Meridian.Infrastructure.DataSources.DataSourceRegistry" data-throw-if-not-resolved="false"></xref>. Assemblies that fail to load are skipped with a warning.
  example: []
  syntax:
    content: Task<IReadOnlyList<PluginLoadResult>> LoadPluginsAsync(string pluginsDirectory, CancellationToken ct)
    parameters:
    - id: pluginsDirectory
      type: System.String
    - id: ct
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.IReadOnlyList{Meridian.Application.Services.PluginLoadResult}}
    content.vb: Function LoadPluginsAsync(pluginsDirectory As String, ct As CancellationToken) As Task(Of IReadOnlyList(Of PluginLoadResult))
