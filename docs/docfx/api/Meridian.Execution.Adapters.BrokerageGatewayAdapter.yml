  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Adapters
  summary: >-
    Bridges an <xref href="Meridian.Execution.Sdk.IBrokerageGateway" data-throw-if-not-resolved="false"></xref> (from Execution.Sdk) to the

    <xref href="Meridian.Execution.Interfaces.IOrderGateway" data-throw-if-not-resolved="false"></xref> contract used by <xref href="Meridian.Execution.Interfaces.IExecutionContext" data-throw-if-not-resolved="false"></xref>.

    This allows any brokerage provider to plug into the existing execution framework

    without modifying the strategy-facing interfaces.
  example: []
  syntax:
    content: 'public sealed class BrokerageGatewayAdapter : IOrderGateway, IAsyncDisposable'
