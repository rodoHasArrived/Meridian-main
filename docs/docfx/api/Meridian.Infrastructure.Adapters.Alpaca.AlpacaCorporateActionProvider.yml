  namespace: Meridian.Infrastructure.Adapters.Alpaca
  summary: >-
    Fetches all available corporate actions (dividends, splits, mergers, etc.) for

    <code class="paramref">ticker</code> and <code class="paramref">securityId</code> from the upstream

    data source.
  example: []
  syntax:
    content: public Task<IReadOnlyList<CorporateActionCommand>> FetchAsync(string ticker, Guid securityId, CancellationToken ct = default)
    parameters:
    - id: ticker
      type: System.String
      description: The canonical ticker string (e.g., "AAPL").
    - id: securityId
      type: System.Guid
      description: The Security Master identifier for the security.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.IReadOnlyList{Meridian.Infrastructure.Adapters.Core.CorporateActionCommand}}
      description: >-
        Zero or more <xref href="Meridian.Infrastructure.Adapters.Core.CorporateActionCommand" data-throw-if-not-resolved="false"></xref> objects ready to be dispatched

        to the Security Master event store.  The caller is responsible for deduplication.
    content.vb: Public Function FetchAsync(ticker As String, securityId As Guid, ct As CancellationToken = Nothing) As Task(Of IReadOnlyList(Of CorporateActionCommand))
