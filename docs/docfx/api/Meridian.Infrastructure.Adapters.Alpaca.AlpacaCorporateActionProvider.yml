  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Alpaca
  summary: >-
    Fetches corporate action history (dividends and stock splits) from the Alpaca REST API.

    Implements <xref href="Meridian.Infrastructure.Adapters.Core.ICorporateActionProvider" data-throw-if-not-resolved="false"></xref> following the same attribute-based

    discovery pattern as <xref href="Meridian.Infrastructure.Adapters.Core.IHistoricalDataProvider" data-throw-if-not-resolved="false"></xref> implementations.
  remarks: >-
    Endpoints used:


    <ul><li><code>GET /v2/corporate-actions/announcements?ca_types=dividend&amp;symbol={ticker}</code></li><li><code>GET /v2/corporate-actions/announcements?ca_types=split&amp;symbol={ticker}</code></li></ul>


    The Alpaca announcements endpoint requires a Broker API key pair or a standard

    Alpaca data subscription.  Requests are authenticated via the <code>APCA-API-KEY-ID</code>

    and <code>APCA-API-SECRET-KEY</code> headers read from the environment / configuration.
  example: []
  syntax:
    content: >-
      [DataSource("alpaca-corp-actions", "Alpaca Corporate Actions", DataSourceType.Historical, DataSourceCategory.Broker)]

      [ImplementsAdr("ADR-001", "Corporate action data provider following ICorporateActionProvider contract")]

      [ImplementsAdr("ADR-010", "Uses IHttpClientFactory; never instantiates HttpClient directly")]

      public sealed class AlpacaCorporateActionProvider : ICorporateActionProvider
    content.vb: >-
      <DataSource("alpaca-corp-actions", "Alpaca Corporate Actions", DataSourceType.Historical, DataSourceCategory.Broker)>

      <ImplementsAdr("ADR-001", "Corporate action data provider following ICorporateActionProvider contract")>

      <ImplementsAdr("ADR-010", "Uses IHttpClientFactory; never instantiates HttpClient directly")>

      Public NotInheritable Class AlpacaCorporateActionProvider Implements ICorporateActionProvider
