  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Backfill
  summary: >-
    Records that <code class="paramref">symbol</code> was successfully backfilled up to and including

    <code class="paramref">lastCompletedDate</code> with <code class="paramref">barsWritten</code> bars.

    Subsequent calls update the stored date if the new value is later than the previously

    recorded one; the bar count is replaced unconditionally when the date advances.

    Thread-safe: concurrent writes are serialized through an internal lock.
  example: []
  syntax:
    content: public Task WriteSymbolCheckpointAsync(string symbol, DateOnly lastCompletedDate, long barsWritten = 0, CancellationToken ct = default)
    parameters:
    - id: symbol
      type: System.String
    - id: lastCompletedDate
      type: System.DateOnly
    - id: barsWritten
      type: System.Int64
    - id: ct
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task
    content.vb: Public Function WriteSymbolCheckpointAsync(symbol As String, lastCompletedDate As DateOnly, barsWritten As Long = 0, ct As CancellationToken = Nothing) As Task
