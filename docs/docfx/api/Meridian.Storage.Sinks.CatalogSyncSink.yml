  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Sinks
  summary: >-
    Decorator around any <xref href="Meridian.Storage.Interfaces.IStorageSink" data-throw-if-not-resolved="false"></xref> that automatically updates the

    <xref href="Meridian.Storage.Interfaces.IStorageCatalogService" data-throw-if-not-resolved="false"></xref> whenever data is flushed to disk.

    This keeps directory indexes and the global catalog in sync with live writes

    without requiring periodic <code>RebuildCatalogAsync</code> calls.
