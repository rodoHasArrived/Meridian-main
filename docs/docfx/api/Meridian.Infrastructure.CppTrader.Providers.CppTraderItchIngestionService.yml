  example: []
  syntax:
    content: public Task<string> OpenFeedAsync(string sourceId, CancellationToken ct = default)
    parameters:
    - id: sourceId
      type: System.String
      description: Logical source identifier (e.g. feed name or venue code) passed as the session name.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.String}
      description: The session ID assigned by the host.
