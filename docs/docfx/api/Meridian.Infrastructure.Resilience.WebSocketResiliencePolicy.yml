  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Resilience
  summary: >-
    Creates a resilience pipeline for WebSocket connection attempts.

    Uses exponential backoff with jitter to avoid thundering herd.
  example: []
  syntax:
    content: public static ResiliencePipeline<WebSocketReceiveResult> CreateReceivePipeline(int maxRetries = 5, TimeSpan? baseDelay = null, TimeSpan? maxDelay = null)
    parameters:
    - id: maxRetries
      type: System.Int32
      description: 'Maximum number of retry attempts (default: 5)'
    - id: baseDelay
      type: System.Nullable{System.TimeSpan}
      description: 'Base delay for exponential backoff (default: 2 seconds)'
    - id: maxDelay
      type: System.Nullable{System.TimeSpan}
      description: 'Maximum delay between retries (default: 30 seconds)'
    return:
      type: Polly.ResiliencePipeline{System.Net.WebSockets.WebSocketReceiveResult}
    content.vb: Public Shared Function CreateReceivePipeline(maxRetries As Integer = 5, baseDelay As TimeSpan? = Nothing, maxDelay As TimeSpan? = Nothing) As ResiliencePipeline(Of WebSocketReceiveResult)
