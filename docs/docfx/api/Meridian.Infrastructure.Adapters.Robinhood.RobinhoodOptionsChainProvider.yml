  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Robinhood
  summary: >-
    Robinhood options chain provider that retrieves option chain data via the unofficial Robinhood API.


    <p>

    <b>Important:</b> Robinhood does not publish an official public API.

    This provider targets the same endpoints used by the Robinhood mobile application.

    Set <code>ROBINHOOD_ACCESS_TOKEN</code> to your personal access token.

    </p>


    <p>

    API flow:


    <ol><li>Resolve the equity instrument ID from <code>/instruments/?symbol=…</code></li><li>Fetch option chain metadata from <code>/options/chains/?equity_instrument_ids=…</code></li><li>Enumerate expiration dates and contracts from <code>/options/instruments/?chain_id=…&amp;expiration_date=…</code></li><li>Fetch market data from <code>/marketdata/options/?instruments=…</code></li></ol>

    </p>
  example: []
  syntax:
    content: >-
      [DataSource("robinhood-options", "Robinhood Options Chain", DataSourceType.Realtime, DataSourceCategory.Broker, Priority = 35, Description = "Robinhood options chain data via unofficial API (requires personal access token)")]

      [ImplementsAdr("ADR-001", "Robinhood options chain provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      [ImplementsAdr("ADR-010", "Uses IHttpClientFactory for HTTP connections")]

      [ImplementsAdr("ADR-014", "JSON serialization uses source generators")]

      public sealed class RobinhoodOptionsChainProvider : IOptionsChainProvider, IProviderMetadata
