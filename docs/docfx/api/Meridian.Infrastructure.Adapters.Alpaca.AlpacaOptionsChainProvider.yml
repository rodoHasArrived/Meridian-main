  assemblies:
  - Meridian.Infrastructure
  namespace: Meridian.Infrastructure.Adapters.Alpaca
  summary: >-
    Options chain provider using the Alpaca Markets Data API v1beta1.

    Provides option chain snapshots, greeks, and contract discovery for US equity options.

    Requires a funded Alpaca brokerage account with options trading enabled.
  remarks: >-
    API Documentation:
      Chain snapshot:    GET /v1beta1/options/snapshots/{underlying_symbol}
      Contract details:  GET /v1beta1/options/contracts/{symbol}
      Available tickers: GET /v1beta1/options/contracts?underlying_symbols={symbol}
    Reference: https://docs.alpaca.markets/reference/optionsnapshots
  example: []
  syntax:
    content: >-
      [DataSource("alpaca-options", "Alpaca Options", DataSourceType.Realtime, DataSourceCategory.Broker, Priority = 8, Description = "US equity option chains with greeks and IV via Alpaca Markets Data API")]

      [ImplementsAdr("ADR-001", "Options chain provider implementation following provider abstraction contract")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      [ImplementsAdr("ADR-010", "HttpClient sourced via IHttpClientFactory; never instantiated directly")]

      [RequiresCredential("ALPACA_KEY_ID", EnvironmentVariables = new string[] { "ALPACA_KEY_ID", "ALPACA__KEYID" }, DisplayName = "API Key ID", Description = "Alpaca API key ID from https://app.alpaca.markets/brokerage/papers")]

      [RequiresCredential("ALPACA_SECRET_KEY", EnvironmentVariables = new string[] { "ALPACA_SECRET_KEY", "ALPACA__SECRETKEY" }, DisplayName = "API Secret Key", Description = "Alpaca API secret key from https://app.alpaca.markets/brokerage/papers")]

      public sealed class AlpacaOptionsChainProvider : IOptionsChainProvider, IProviderMetadata
    content.vb: >-
      <DataSource("alpaca-options", "Alpaca Options", DataSourceType.Realtime, DataSourceCategory.Broker, Priority:=8, Description:="US equity option chains with greeks and IV via Alpaca Markets Data API")>

      <ImplementsAdr("ADR-001", "Options chain provider implementation following provider abstraction contract")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      <ImplementsAdr("ADR-010", "HttpClient sourced via IHttpClientFactory; never instantiated directly")>

      <RequiresCredential("ALPACA_KEY_ID", EnvironmentVariables:=New String() { "ALPACA_KEY_ID", "ALPACA__KEYID" }, DisplayName:="API Key ID", Description:="Alpaca API key ID from https://app.alpaca.markets/brokerage/papers")>

      <RequiresCredential("ALPACA_SECRET_KEY", EnvironmentVariables:=New String() { "ALPACA_SECRET_KEY", "ALPACA__SECRETKEY" }, DisplayName:="API Secret Key", Description:="Alpaca API secret key from https://app.alpaca.markets/brokerage/papers")>

      Public NotInheritable Class AlpacaOptionsChainProvider Implements IOptionsChainProvider, IProviderMetadata
