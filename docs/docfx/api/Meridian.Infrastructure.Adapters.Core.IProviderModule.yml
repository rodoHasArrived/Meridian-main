      repo: https://github.com/rodoHasArrived/Meridian-main.git
    id: IProviderModule
    path: src/Meridian.ProviderSdk/IProviderModule.cs
    startLine: 18
  assemblies:
  - Meridian.ProviderSdk
  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Defines a self-describing provider module that bundles all capability types for a single

    external data provider (streaming, historical, symbol search, brokerage) behind one DI

    registration entry point.
  remarks: >-
    Implement once per external provider (e.g., <code>AlpacaProviderModule</code>).

    Use <xref href="Meridian.Infrastructure.Adapters.Core.ProviderModuleLoader" data-throw-if-not-resolved="false"></xref> to discover and load modules from assemblies.


    All new properties have default interface implementations so existing callers of

    <xref href="Meridian.Infrastructure.Adapters.Core.IProviderModule.Register(Microsoft.Extensions.DependencyInjection.IServiceCollection%2cMeridian.Infrastructure.DataSources.DataSourceRegistry)" data-throw-if-not-resolved="false"></xref> remain source-compatible without changes.
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Module-based provider registration entry point")]

      [ImplementsAdr("ADR-005", "Module-based provider discovery alongside attribute-based discovery")]

      public interface IProviderModule
    content.vb: >-
      <ImplementsAdr("ADR-001", "Module-based provider registration entry point")>

      <ImplementsAdr("ADR-005", "Module-based provider discovery alongside attribute-based discovery")>

      Public Interface IProviderModule
  derivedClasses:
  - Meridian.Infrastructure.Adapters.Alpaca.AlpacaProviderModule
  attributes:
  - type: Meridian.Infrastructure.Contracts.ImplementsAdrAttribute
    ctor: Meridian.Infrastructure.Contracts.ImplementsAdrAttribute.#ctor(System.String,System.String)
    arguments:
    - type: System.String
      value: ADR-001
    - type: System.String
      value: Module-based provider registration entry point
  - type: Meridian.Infrastructure.Contracts.ImplementsAdrAttribute
    ctor: Meridian.Infrastructure.Contracts.ImplementsAdrAttribute.#ctor(System.String,System.String)
    arguments:
