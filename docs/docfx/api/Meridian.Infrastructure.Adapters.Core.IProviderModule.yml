  namespace: Meridian.Infrastructure.Adapters.Core
  summary: >-
    Validates that prerequisites for this module are satisfied before registration.

    Default implementation always returns <xref href="Meridian.Infrastructure.Adapters.Core.ModuleValidationResult.Valid" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Override to check credential availability, required services, or version

    compatibility. Returning an invalid result causes <xref href="Meridian.Infrastructure.Adapters.Core.ProviderModuleLoader" data-throw-if-not-resolved="false"></xref>

    to skip this module and record a failure instead of throwing.
