  assemblies:
  - Meridian.Application
  namespace: Meridian.Application.Monitoring
  summary: >-
    Registers or updates a circuit breaker's state.

    Call this from resilience policy callbacks (OnOpened, OnClosed, OnHalfOpened).
  example: []
  syntax:
    content: public void RecordStateTransition(string name, CircuitBreakerState newState, string? lastError = null, int? failureCount = null, TimeSpan? breakDuration = null)
    parameters:
    - id: name
      type: System.String
      description: Unique name identifying this circuit breaker.
    - id: newState
      type: Meridian.Application.Monitoring.CircuitBreakerState
      description: The new state being transitioned to.
    - id: lastError
      type: System.String
      description: Optional error message that caused the transition.
    - id: failureCount
      type: System.Nullable{System.Int32}
      description: Optional number of failures that triggered the transition.
    - id: breakDuration
      type: System.Nullable{System.TimeSpan}
      description: Optional break duration (stored for cooldown computation when state is Open).
    content.vb: Public Sub RecordStateTransition(name As String, newState As CircuitBreakerState, lastError As String = Nothing, failureCount As Integer? = Nothing, breakDuration As TimeSpan? = Nothing)
