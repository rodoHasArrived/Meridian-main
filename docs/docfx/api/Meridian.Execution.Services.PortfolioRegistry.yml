  namespace: Meridian.Execution.Services
  summary: >-
    Thread-safe registry that tracks all live <xref href="Meridian.Execution.Models.IMultiAccountPortfolioState" data-throw-if-not-resolved="false"></xref> instances

    by their strategy run ID.  Strategies call <xref href="Meridian.Execution.Services.PortfolioRegistry.Register(System.String%2cMeridian.Execution.Models.IMultiAccountPortfolioState)" data-throw-if-not-resolved="false"></xref> on start and

    <xref href="Meridian.Execution.Services.PortfolioRegistry.Deregister(System.String)" data-throw-if-not-resolved="false"></xref> on stop so that cross-strategy aggregation and the REST API can

    discover all currently active portfolios.
