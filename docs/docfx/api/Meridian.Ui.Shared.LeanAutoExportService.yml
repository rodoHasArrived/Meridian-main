    startLine: 26
  assemblies:
  - Meridian.Ui.Shared
  namespace: Meridian.Ui.Shared
  summary: >-
    Background service that continuously exports collected market data to a Lean-compatible

    directory layout.  Runs on a configurable interval and converts JSONL files found under

    the Meridian data root into the Lean zip-CSV format expected by the QuantConnect Lean Engine.
  remarks: >-
    <p>

    Configuration is driven by two environment variables:


    <ul><li><code>LEAN_DATA_PATH</code> — target directory where Lean data is written.
            If unset the service starts but does nothing until the path is supplied via
            <xref href="Meridian.Ui.Shared.LeanAutoExportService.Configure(System.String%2cSystem.Nullable%7bSystem.Boolean%7d%2cSystem.Int32%2cSystem.Collections.Generic.IEnumerable%7bSystem.String%7d)" data-throw-if-not-resolved="false"></xref>.</li><li><code>LEAN_EXPORT_INTERVAL_SECONDS</code> — export polling interval (default 300 s).</li></ul>
    </p>

    <p>

    The service can also be reconfigured at runtime through <xref href="Meridian.Ui.Shared.LeanAutoExportService.Configure(System.String%2cSystem.Nullable%7bSystem.Boolean%7d%2cSystem.Int32%2cSystem.Collections.Generic.IEnumerable%7bSystem.String%7d)" data-throw-if-not-resolved="false"></xref> and

    paused / resumed through <xref href="Meridian.Ui.Shared.LeanAutoExportService.Enabled" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: 'public sealed class LeanAutoExportService : BackgroundService, IHostedService, IDisposable'
    content.vb: Public NotInheritable Class LeanAutoExportService Inherits BackgroundService Implements IHostedService, IDisposable
