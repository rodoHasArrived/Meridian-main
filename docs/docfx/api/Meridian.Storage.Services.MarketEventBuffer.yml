  source:
    remote:
      path: src/Meridian.Storage/Services/EventBuffer.cs
      branch: main
      repo: https://github.com/rodoHasArrived/Meridian-main.git
    id: DrainBySymbol
    path: src/Meridian.Storage/Services/EventBuffer.cs
    startLine: 246
  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Services
  summary: >-
    Drain events for a specific symbol in a single lock acquisition.

    Non-matching events remain in the buffer and preserve their original ordering.
  remarks: >-
    The previous implementation called <xref href="Meridian.Storage.Services.EventBuffer%601.DrainAll" data-throw-if-not-resolved="false"></xref> followed by

    <xref href="Meridian.Storage.Services.EventBuffer%601.AddRange(System.Collections.Generic.IEnumerable%7b%600%7d)" data-throw-if-not-resolved="false"></xref> in two separate lock acquisitions, creating a

    race window where concurrently produced events could be silently reordered. This

    implementation partitions events in a single pass under one lock.
  example: []
  syntax:
    content: public IReadOnlyList<MarketEvent> DrainBySymbol(string symbol)
    parameters:
    - id: symbol
      type: System.String
    return:
      type: System.Collections.Generic.IReadOnlyList{Meridian.Domain.Events.MarketEvent}
    content.vb: Public Function DrainBySymbol(symbol As String) As IReadOnlyList(Of MarketEvent)
  overload: Meridian.Storage.Services.MarketEventBuffer.DrainBySymbol*
  nameWithType.vb: MarketEventBuffer.DrainBySymbol(String)
  fullName.vb: Meridian.Storage.Services.MarketEventBuffer.DrainBySymbol(String)
  name.vb: DrainBySymbol(String)
