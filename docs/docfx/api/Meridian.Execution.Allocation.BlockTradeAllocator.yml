  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Allocation
  summary: >-
    Applies an <xref href="Meridian.Execution.Allocation.AllocationResult" data-throw-if-not-resolved="false"></xref> to a <xref href="Meridian.Ledger.FundLedgerBook" data-throw-if-not-resolved="false"></xref> by posting

    proportional buy/sell journal entries to each destination sleeve or entity ledger.
  remarks: >-
    <p>

    The allocator posts to sleeve ledgers by default. It uses the

    <xref href="Meridian.Ledger.LedgerAccounts.AllocationControl" data-throw-if-not-resolved="false"></xref> clearing account to ensure the parent

    fund ledger remains balanced: each sleeve debit has a corresponding credit on the

    fund-level allocation control account, and the net effect across all sleeve postings

    is zero on the fund ledger.

    </p>

    <p>

    Usage pattern:


    <pre><code class="lang-csharp">var engine = new ProportionalAllocationEngine();

    var result = engine.Allocate("AAPL", 1000, 180m, rule, DateTimeOffset.UtcNow);

    BlockTradeAllocator.PostToFundLedger(book, result, side: OrderSide.Buy);</code></pre>

    </p>
  example: []
  syntax:
    content: public static class BlockTradeAllocator
    content.vb: Public Module BlockTradeAllocator
