  assemblies:
  - Meridian.Execution
  namespace: Meridian.Execution.Allocation
  summary: >-
    Posts sleeve-level journal entries for a block-trade allocation.

    Each destination in <code class="paramref">result</code> maps to a sleeve ledger accessed via

    <code class="paramref">book</code>.
  example: []
  syntax:
    content: public static void PostToSleeveLedgers(FundLedgerBook book, AllocationResult result, bool isBuy)
    parameters:
    - id: book
      type: Meridian.Ledger.FundLedgerBook
      description: The fund ledger book owning the sleeve ledgers.
    - id: result
      type: Meridian.Execution.Allocation.AllocationResult
      description: The allocation result produced by an <xref href="Meridian.Execution.Allocation.IAllocationEngine" data-throw-if-not-resolved="false"></xref>.
    - id: isBuy
      type: System.Boolean
      description: >-
        <code>true</code> when the block trade is a purchase (Dr Securities / Cr Cash);

        <code>false</code> when it is a sale (Dr Cash / Cr Securities).
