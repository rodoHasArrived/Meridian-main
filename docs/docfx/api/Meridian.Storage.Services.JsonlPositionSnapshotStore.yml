  assemblies:
  - Meridian.Storage
  namespace: Meridian.Storage.Services
  summary: >-
    JSONL-backed implementation of <xref href="Meridian.Contracts.Domain.IPositionSnapshotStore" data-throw-if-not-resolved="false"></xref>.


    <p>

    Path convention: <code>{StorageRoot}/portfolios/{runId}/{accountId}/snapshots.jsonl</code>

    This path falls under <code>StorageOptions.RootPath</code> so the

    <xref href="Meridian.Storage.Services.LifecyclePolicyEngine" data-throw-if-not-resolved="false"></xref> automatically picks it up for tiered-storage

    lifecycle enforcement (ADR-002).  Each snapshot is a single JSON line appended

    atomically (ADR-007) — position snapshots are idempotent (latest wins), so

    recovery simply reads to the last successfully written line.

    </p>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-007", "WAL/atomic write pattern for crash-safe position snapshot persistence")]

      [ImplementsAdr("ADR-002", "Snapshot files stored under StorageRoot so LifecyclePolicyEngine governs retention")]

      [ImplementsAdr("ADR-014", "Serialisation via ExecutionSnapshotJsonContext — no reflection")]

      public sealed class JsonlPositionSnapshotStore : IPositionSnapshotStore
    content.vb: >-
      <ImplementsAdr("ADR-007", "WAL/atomic write pattern for crash-safe position snapshot persistence")>

      <ImplementsAdr("ADR-002", "Snapshot files stored under StorageRoot so LifecyclePolicyEngine governs retention")>

      <ImplementsAdr("ADR-014", "Serialisation via ExecutionSnapshotJsonContext — no reflection")>

      Public NotInheritable Class JsonlPositionSnapshotStore Implements IPositionSnapshotStore
