  assemblies:
  - Meridian.ProviderSdk
  namespace: Meridian.Infrastructure.Contracts
  summary: >-
    Resolves provider credentials by scanning <xref href="Meridian.Infrastructure.Contracts.RequiresCredentialAttribute" data-throw-if-not-resolved="false"></xref>

    declarations on a provider type and reading the first matching non-empty environment

    variable from each attribute's <xref href="Meridian.Infrastructure.Contracts.RequiresCredentialAttribute.EnvironmentVariables" data-throw-if-not-resolved="false"></xref>

    list, with an optional config-value fallback.
  remarks: >-
    <p>

    This is the preferred credential resolution mechanism for new providers.

    The legacy per-provider credential resolver interface requires a dedicated method per provider

    and is preserved only for backward compatibility with existing providers.

    </p>

    <p><b>Usage:</b></p>

    <pre><code class="lang-csharp">var context = AttributeCredentialResolver.ForType(typeof(MyProvider));

    var apiKey = context.Get("API_KEY");</code></pre>
  example: []
