  summary: >-
    Creates an <xref href="Meridian.Infrastructure.Contracts.AttributeCredentialResolver" data-throw-if-not-resolved="false"></xref> for <code class="paramref">providerType</code>

    by reading all <xref href="Meridian.Infrastructure.Contracts.RequiresCredentialAttribute" data-throw-if-not-resolved="false"></xref> declarations on that type.
  example: []
  syntax:
    content: public static AttributeCredentialResolver ForType(Type providerType, Func<string, string?>? configLookup = null)
    parameters:
    - id: providerType
      type: System.Type
      description: The provider class to inspect.
    - id: configLookup
      type: System.Func{System.String,System.String}
      description: >-
        Optional fallback called with the logical credential name when no environment variable

        yields a value. Return <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if not available via config either.
    return:
      type: Meridian.Infrastructure.Contracts.AttributeCredentialResolver
